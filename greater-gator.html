<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Greater Gator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a3a2a;
      --muted: #3c5c4a;
      --panel: #fcfffb;
      --line: #b8e0c8;
      --good: #1d9d63;
      --warn: #e04940;
      --sky: #d4f0d0;
      --button: #fff8dd;
      --button-line: #c4a94e;
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --shadow: 0 8px 32px rgba(19, 67, 39, 0.14), 0 2px 8px rgba(19, 67, 39, 0.08);
      --glow-good: 0 0 18px rgba(29, 157, 99, 0.35);
      --glow-warn: 0 0 18px rgba(224, 73, 64, 0.3);
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes popIn {
      0% { transform: scale(0.7); opacity: 0; }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(29, 157, 99, 0.15); }
      50% { box-shadow: 0 0 22px rgba(29, 157, 99, 0.4); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      40% { transform: scale(1.12); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes btnShine {
      0% { left: -75%; }
      100% { left: 125%; }
    }
    @keyframes streakPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Quicksand', 'Fredoka', "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 12%, rgba(255, 235, 173, 0.5), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(180, 229, 157, 0.5), transparent 36%),
        radial-gradient(circle at 50% 50%, rgba(200, 240, 200, 0.3), transparent 60%),
        radial-gradient(circle at 18% 90%, rgba(108, 194, 171, 0.32), transparent 34%),
        radial-gradient(circle at 84% 90%, rgba(197, 234, 255, 0.35), transparent 42%),
        var(--sky);
    }

    .app {
      width: min(1200px, calc(100% - 1rem));
      margin: 0.65rem auto 1rem;
      display: grid;
      gap: 0.7rem;
    }

    .topbar {
      background: linear-gradient(145deg, #ffffff, #f2ffef);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 0.7rem 0.95rem;
      display: grid;
      gap: 0.62rem;
    }

    .heading {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.4rem 1rem;
    }

    h1 {
      margin: 0;
      font-family: 'Fredoka', 'Quicksand', sans-serif;
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.08;
      background: linear-gradient(135deg, #1a6b3a, #2a9d5c, #1a6b3a);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    .subtitle {
      margin: 0.2rem 0 0;
      font-family: 'Quicksand', sans-serif;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.45rem;
    }

    .toolbar label {
      display: flex;
      align-items: center;
      gap: 0.42rem;
      background: linear-gradient(135deg, #f4fff4, #e8fae8);
      border: 1.5px solid #b8e0c2;
      border-radius: 999px;
      padding: 0.36rem 0.75rem;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.86rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .toolbar label:hover {
      border-color: #88c8a0;
      box-shadow: 0 2px 12px rgba(29, 157, 99, 0.12);
    }

    select,
    .tool-btn,
    .symbol-btn {
      font-family: 'Fredoka', 'Quicksand', sans-serif;
      color: inherit;
      border-radius: 999px;
      border: 1.5px solid #b8ddc2;
      background: #fff;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    select {
      min-height: 44px;
      padding: 0.2rem 0.55rem;
      font-weight: 600;
    }

    .tool-btn {
      min-height: 44px;
      padding: 0.46rem 0.9rem;
      font-weight: 600;
      background: linear-gradient(140deg, #ffffff, #f0fbf2);
      position: relative;
      overflow: hidden;
    }

    .tool-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(29, 157, 99, 0.18);
      border-color: #7cc49a;
    }

    .tool-btn:active {
      transform: translateY(0px) scale(0.97);
    }

    .tool-btn.primary {
      border: 1.5px solid #6cc490;
      background: linear-gradient(140deg, #c9f8d8, #a8efc0);
      font-weight: 700;
    }

    .tool-btn.primary:hover {
      background: linear-gradient(140deg, #b8f0cc, #98e8b4);
      box-shadow: 0 4px 20px rgba(29, 157, 99, 0.25);
    }

    .tool-btn:focus-visible,
    select:focus-visible,
    .symbol-btn:focus-visible {
      outline: 3px solid rgba(27, 152, 107, 0.4);
      outline-offset: 2px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
    }

    .pill {
      border-radius: 999px;
      border: 1.5px solid #a8d4b4;
      background: linear-gradient(145deg, #ffffff, #eef8f0);
      padding: 0.38rem 0.82rem;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 0.92rem;
      min-width: 92px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .pill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: skewX(-20deg);
    }

    .pill.pop {
      animation: streakPulse 0.35s ease;
    }

    .surface {
      background: linear-gradient(180deg, #ffffff, #f6fff5);
      border: 1px solid #c8e4cf;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .canvas-wrap {
      padding: 0.55rem;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(251, 255, 248, 0.9), rgba(230, 246, 227, 0.9));
    }

    canvas {
      width: min(100%, 1120px);
      aspect-ratio: 16 / 9;
      display: block;
      border-radius: 16px;
      border: 1px solid #aac7b0;
      background: #dbf3d7;
    }

    .control-panel {
      border-top: 1px solid var(--line);
      padding: 0.65rem;
      display: grid;
      gap: 0.58rem;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(244, 255, 244, 0.95));
    }

    .prompt {
      margin: 0;
      text-align: center;
      font-family: 'Fredoka', sans-serif;
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .symbol-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.58rem;
      width: min(760px, 100%);
      margin: 0 auto;
    }

    .symbol-btn {
      min-height: 76px;
      padding: 0.38rem 0.4rem;
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 700;
      background: linear-gradient(150deg, #fff9e0, #ffe99c, #fff2c6);
      background-size: 200% 200%;
      border: 2.5px solid var(--button-line);
      box-shadow: 0 6px 20px rgba(154, 131, 69, 0.22), inset 0 1px 0 rgba(255,255,255,0.6);
      touch-action: manipulation;
      line-height: 1;
      position: relative;
      overflow: hidden;
    }

    .symbol-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-20deg);
      transition: left 0.5s ease;
    }

    .symbol-btn:hover::before {
      animation: btnShine 0.6s ease;
    }

    .symbol-btn:hover:not([disabled]) {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 28px rgba(154, 131, 69, 0.3), inset 0 1px 0 rgba(255,255,255,0.6);
      border-color: #d4a830;
    }

    .symbol-btn:active:not([disabled]) {
      transform: translateY(1px) scale(0.97);
      box-shadow: 0 2px 8px rgba(154, 131, 69, 0.2);
    }

    .symbol-btn[disabled] {
      opacity: 0.6;
      cursor: default;
      filter: saturate(0.5);
    }

    .symbol-btn.correct-flash {
      animation: popIn 0.4s ease;
      border-color: var(--good);
      box-shadow: var(--glow-good);
    }

    .symbol-btn.wrong-flash {
      animation: wiggle 0.4s ease;
      border-color: var(--warn);
      box-shadow: var(--glow-warn);
    }

    .feedback {
      margin: 0;
      text-align: center;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      min-height: 1.5rem;
      color: var(--ink);
      transition: all 0.3s ease;
    }

    .feedback.correct {
      color: var(--good);
      text-shadow: 0 0 12px rgba(29, 157, 99, 0.2);
      animation: popIn 0.35s ease;
    }

    .feedback.wrong {
      color: var(--warn);
      text-shadow: 0 0 12px rgba(224, 73, 64, 0.2);
      animation: wiggle 0.35s ease;
    }

    .shop-panel {
      width: min(960px, 100%);
      margin: 0.1rem auto 0;
      border: 1.5px solid #b0d4ba;
      border-radius: 20px;
      background: linear-gradient(180deg, #f8fff6, #edf8f0);
      padding: 0.75rem;
      display: grid;
      gap: 0.6rem;
      box-shadow: 0 8px 30px rgba(19, 67, 39, 0.1);
    }

    .shop-panel[hidden] {
      display: none;
    }

    .shop-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.3rem 0.8rem;
      align-items: center;
      padding: 0.1rem 0;
    }

    .shop-title {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: #1a5e36;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .shop-title-icon {
      font-size: 1.4rem;
    }

    .shop-coins-badge {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: linear-gradient(135deg, #fff8dd, #ffecaa);
      border: 1.5px solid #d4a830;
      border-radius: 999px;
      padding: 0.3rem 0.75rem;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #7a5c00;
      box-shadow: 0 2px 8px rgba(180, 140, 30, 0.12);
    }

    .shop-coins-icon {
      font-size: 1.1rem;
    }

    .shop-sub {
      margin: 0;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.88rem;
      color: #4a7a5c;
      font-weight: 600;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 0.6rem;
    }

    .shop-card {
      border-radius: 16px;
      padding: 0;
      display: grid;
      overflow: hidden;
      transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .shop-card:hover {
      transform: translateY(-3px);
    }

    .shop-card-icon-row {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 0.5rem 0.35rem;
      font-size: 2.2rem;
      position: relative;
    }

    .shop-rarity-badge {
      position: absolute;
      top: 0.45rem;
      right: 0.55rem;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .shop-card-body {
      padding: 0 0.7rem 0.65rem;
      display: grid;
      gap: 0.3rem;
    }

    .shop-card h3 {
      margin: 0;
      font-family: 'Fredoka', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.15;
      color: #1a3a2a;
    }

    .shop-card p {
      margin: 0;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.8rem;
      color: #4c705a;
      font-weight: 600;
      min-height: 1.8rem;
      line-height: 1.35;
    }

    .shop-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.3rem;
      padding-top: 0.15rem;
    }

    .shop-meta {
      font-family: 'Fredoka', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .shop-action {
      min-height: 36px;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      border: 1.5px solid #9ec5a9;
      background: linear-gradient(140deg, #ffffff, #eefbf0);
      color: #17452f;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .shop-action::before {
      content: '';
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: skewX(-20deg);
    }

    .shop-action:hover:not([disabled])::before {
      animation: btnShine 0.5s ease;
    }

    .shop-action:hover:not([disabled]) {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 4px 14px rgba(29, 157, 99, 0.2);
    }

    .shop-action:active:not([disabled]) {
      transform: translateY(0) scale(0.97);
    }

    .shop-action.buy-btn {
      background: linear-gradient(140deg, #fff8dd, #ffe99c);
      border-color: #c4a94e;
      color: #6b4e00;
    }

    .shop-action.buy-btn:hover:not([disabled]) {
      background: linear-gradient(140deg, #ffe99c, #ffd94e);
      box-shadow: 0 4px 16px rgba(180, 140, 30, 0.25);
    }

    .shop-action.equip-btn {
      background: linear-gradient(140deg, #d8f5e0, #b8efc8);
      border-color: #6cc490;
      color: #1a5e36;
    }

    .shop-action.equip-btn:hover:not([disabled]) {
      background: linear-gradient(140deg, #b8efc8, #98e8b4);
    }

    .shop-action.unequip-btn {
      background: linear-gradient(140deg, #f5f5f5, #e8e8e8);
      border-color: #bbb;
      color: #555;
    }

    .shop-action[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      filter: saturate(0.4);
    }

    .shop-card.equipped {
      box-shadow: 0 0 0 2px rgba(86, 183, 111, 0.25) inset, 0 4px 16px rgba(86, 183, 111, 0.12);
    }

    .shop-card.locked {
      opacity: 0.7;
    }

    .shop-card.locked:hover {
      opacity: 0.85;
    }

    .shop-equipped-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #4caf6a, #2e8b4a);
      padding: 0.12rem 0.5rem;
      border-radius: 999px;
      letter-spacing: 0.3px;
    }

    @keyframes cardPurchase {
      0% { transform: scale(0.9); opacity: 0.5; }
      50% { transform: scale(1.06); }
      100% { transform: scale(1); opacity: 1; }
    }

    .shop-card.just-bought {
      animation: cardPurchase 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @media (max-width: 920px) {
      .app {
        width: min(100%, calc(100% - 0.55rem));
      }

      .topbar {
        padding: 0.62rem 0.72rem;
      }

      .control-panel {
        padding: 0.55rem;
      }

      .symbol-btn {
        min-height: 78px;
      }
    }

    @media (max-width: 640px) {
      .subtitle {
        font-size: 0.88rem;
      }

      .toolbar {
        gap: 0.38rem;
      }

      .tool-btn,
      select {
        min-height: 48px;
      }

      .symbol-row {
        gap: 0.42rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="Greater Gator header">
      <div class="heading">
        <div>
          <h1>Greater Gator</h1>
          <p class="subtitle">Pick the right sign. The gator chomps the bigger number.</p>
        </div>
      </div>
      <div class="toolbar" aria-label="Game controls">
        <label for="levelSelect">Level
          <select id="levelSelect" aria-label="Difficulty level">
            <option value="1">Level 1 (1-10)</option>
            <option value="2">Level 2 (1-20)</option>
            <option value="3">Level 3 (10-99)</option>
          </select>
        </label>
        <label for="modeSelect">Mode
          <select id="modeSelect" aria-label="Number representation mode">
            <option value="numerals">Numerals</option>
            <option value="fish">Fish</option>
            <option value="mixed">Mixed</option>
          </select>
        </label>
        <button id="soundBtn" class="tool-btn" type="button">Sound: On</button>
        <button id="resetBtn" class="tool-btn" type="button">Reset Score</button>
        <button id="shopBtn" class="tool-btn" type="button">Swamp Shop</button>
        <button id="fullscreenBtn" class="tool-btn primary" type="button">Fullscreen (F)</button>
      </div>
      <div class="stats" aria-live="polite">
        <div class="pill" id="scorePill">Score 0</div>
        <div class="pill" id="streakPill">Streak 0</div>
        <div class="pill" id="bestPill">Best 0</div>
        <div class="pill" id="trailPill">Trail 0/5</div>
        <div class="pill" id="coinsPill">Coins 0</div>
        <div class="pill" id="fishPill">Total Fish 0</div>
      </div>
    </section>

    <section id="shopPanel" class="shop-panel" hidden aria-label="Swamp decoration shop">
      <div class="shop-head">
        <span class="shop-title"><span class="shop-title-icon">&#x1F3EA;</span> Swamp Shop</span>
        <span id="shopCoinsLabel" class="shop-coins-badge"><span class="shop-coins-icon">&#x1FA99;</span> <span id="shopCoinsValue">0</span> coins</span>
      </div>
      <p class="shop-sub">Earn coins by answering correctly, then deck out your swamp!</p>
      <div id="shopGrid" class="shop-grid"></div>
    </section>

    <section class="surface">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="1280" height="720" aria-label="Greater Gator play area"></canvas>
      </div>
      <div class="control-panel">
        <p class="prompt">Choose the sign</p>
        <div class="symbol-row" role="group" aria-label="Comparison symbol choices">
          <button id="lessBtn" class="symbol-btn" type="button" data-symbol="<" aria-label="Less than">&lt;</button>
          <button id="greaterBtn" class="symbol-btn" type="button" data-symbol=">" aria-label="Greater than">&gt;</button>
          <button id="equalBtn" class="symbol-btn" type="button" data-symbol="=" aria-label="Equal to">=</button>
        </div>
        <p id="feedback" class="feedback" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const levelSelect = document.getElementById("levelSelect");
      const modeSelect = document.getElementById("modeSelect");
      const soundBtn = document.getElementById("soundBtn");
      const resetBtn = document.getElementById("resetBtn");
      const shopBtn = document.getElementById("shopBtn");
      const fullscreenBtn = document.getElementById("fullscreenBtn");
      const feedbackEl = document.getElementById("feedback");
      const scorePill = document.getElementById("scorePill");
      const streakPill = document.getElementById("streakPill");
      const bestPill = document.getElementById("bestPill");
      const trailPill = document.getElementById("trailPill");
      const coinsPill = document.getElementById("coinsPill");
      const fishPill = document.getElementById("fishPill");
      const shopPanel = document.getElementById("shopPanel");
      const shopGrid = document.getElementById("shopGrid");
      const shopCoinsLabel = document.getElementById("shopCoinsLabel");
      const symbolButtons = Array.from(document.querySelectorAll(".symbol-btn"));

      const WIDTH = canvas.width;
      const HEIGHT = canvas.height;
      const FIXED_DT = 1 / 60;
      const NEXT_ROUND_DELAY = 0.76;
      const EQUAL_CHANCE = 0.2;

      const LEVELS = {
        1: { min: 1, max: 10 },
        2: { min: 1, max: 20 },
        3: { min: 10, max: 99 }
      };
      const PRAISE_MESSAGES = [
        "Great compare!",
        "Nice thinking!",

          coins: state.coins,
          fishEaten: state.fishEaten,
          decorUnlocked: state.decorUnlocked,

        };

      function saveProgress() {
        try {
          window.localStorage.setItem(SAVE_KEY, JSON.stringify(getPersistedPayload()));
        } catch (err) {
          // Ignore storage failures in restricted contexts.
        }
      }

      function loadProgress() {
        try {
          const raw = window.localStorage.getItem(SAVE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return;

          if (Number.isFinite(parsed.coins)) {
            state.coins = Math.max(0, Math.floor(parsed.coins));
          }
          if (Number.isFinite(parsed.fishEaten)) {
            state.fishEaten = Math.max(0, Math.floor(parsed.fishEaten));
          }

          SHOP_ITEMS.forEach((item) => {
            const unlocked = Boolean(parsed.decorUnlocked && parsed.decorUnlocked[item.id]);
            const equipped = Boolean(parsed.decorEquipped && parsed.decorEquipped[item.id]);
            state.decorUnlocked[item.id] = unlocked;
            state.decorEquipped[item.id] = unlocked && equipped;
          });
        } catch (err) {
          // Ignore malformed save state.
        }
      }

      function setShopOpen(open) {
        state.shopOpen = Boolean(open);
        shopPanel.hidden = !state.shopOpen;
        shopBtn.textContent = state.shopOpen ? "Close Shop" : "Swamp Shop";

      function renderShop() {
        var coinsValueEl = document.getElementById("shopCoinsValue");
        if (coinsValueEl) coinsValueEl.textContent = state.coins;

        const cards = SHOP_ITEMS.map((item) => {
          const unlocked = Boolean(state.decorUnlocked[item.id]);
          const equipped = Boolean(state.decorEquipped[item.id]);
          const canBuy = state.coins >= item.cost;
          const rarity = RARITY_CONFIG[item.rarity] || RARITY_CONFIG.common;

          var actionLabel;
          var actionClass;
          var disabled = "";
          if (unlocked) {
            if (equipped) {
              actionLabel = "Unequip";
              actionClass = "unequip-btn";
            } else {
              actionLabel = "Equip";
              actionClass = "equip-btn";
            }
          } else {
            actionLabel = "\uD83E\uDE99 " + item.cost + " coins";
            actionClass = "buy-btn";
            if (!canBuy) disabled = "disabled";
          }

          var dataAction = unlocked ? (equipped ? "unequip" : "equip") : "buy";
          var cardClass = "shop-card";
          if (equipped) cardClass += " equipped";
          if (!unlocked && !canBuy) cardClass += " locked";

          var equippedTag = equipped
            ? "<span class=\"shop-equipped-tag\">\u2713 Active</span>"
            : "";

          var statusText;
          if (unlocked) {
            statusText = equipped ? "" : "<span style=\"color:#5a8a6a\">\u2713 Owned</span>";
          } else {
            var pct = Math.min(100, Math.floor((state.coins / item.cost) * 100));
            statusText = "<span style=\"color:" + rarity.color + "\">" + pct + "% saved</span>";
          }

          return (
            "<article class=\"" + cardClass + "\" style=\"border:1.5px solid " + rarity.border + ";background:" + rarity.bg + ";box-shadow:" + (equipped ? "0 0 0 2px rgba(86,183,111,0.25) inset," : "") + rarity.glow + "\">" +

                "<span class=\"shop-rarity-badge\" style=\"color:" + rarity.color + ";background:" + rarity.color + "18;border:1px solid " + rarity.color + "30\">" + rarity.label + "</span>" +
              "</div>" +

      function playPurchaseSound() {

      function buyShopItem(itemId) {
        const item = getShopItem(itemId);
        if (!item) return;
        if (state.decorUnlocked[item.id]) return;
        if (state.coins < item.cost) {
          setFeedback("Need " + item.cost + " coins for " + item.name + ".", "wrong");
          playWrongSound();
          return;
        }

        state.coins -= item.cost;
        state.decorUnlocked[item.id] = true;
        state.decorEquipped[item.id] = true;

        resumeAudioIfNeeded();

      function resolveRepresentationForValue(value) {
        if (state.mode === "numerals") return "numerals";
        if (state.mode === "fish") return value <= 20 ? "fish" : "numerals";
        if (value > 20) return "numerals";
        return "fish";
      }

      function pickRoundRepresentations(leftValue, rightValue) {
        if (state.mode !== "mixed") {
          if (state.mode === "numerals") {
            return {
              leftRepresentation: "numerals",
              rightRepresentation: "numerals"
            };
          }

          return {
            leftRepresentation: resolveRepresentationForValue(leftValue),
            rightRepresentation: resolveRepresentationForValue(rightValue)
          };
        }

        let leftRepresentation = resolveRepresentationForValue(leftValue);
        let rightRepresentation = resolveRepresentationForValue(rightValue);
        const leftFishFriendly = leftValue <= 20;
        const rightFishFriendly = rightValue <= 20;

        if (leftFishFriendly && rightFishFriendly) {
          if (Math.random() < 0.5) {
            leftRepresentation = "fish";
            rightRepresentation = "numerals";
          } else {
            leftRepresentation = "numerals";
            rightRepresentation = "fish";
          }
        } else if (leftFishFriendly && !rightFishFriendly) {
          leftRepresentation = Math.random() < 0.7 ? "fish" : "numerals";
          rightRepresentation = "numerals";
        } else if (!leftFishFriendly && rightFishFriendly) {
          leftRepresentation = "numerals";
          rightRepresentation = Math.random() < 0.7 ? "fish" : "numerals";
        } else {
          leftRepresentation = "numerals";
          rightRepresentation = "numerals";
        }

        return {
          leftRepresentation,
          rightRepresentation
        };
      }

      function showRewardBanner(text, seconds, color) {
        state.rewardBanner.text = text;
        state.rewardBanner.timer = seconds;
        state.rewardBanner.color = color || "#ffffff";
      }

      function createRound() {
        const level = LEVELS[state.level];
        const includeEqual = Math.random() < EQUAL_CHANCE;
        let left;
        let right;

        if (includeEqual) {
          left = randomInt(level.min, level.max);
          right = left;
        } else {
          const first = randomInt(level.min, level.max);
          let second = randomInt(level.min, level.max);
          while (second === first) {
            second = randomInt(level.min, level.max);
          }

          const high = Math.max(first, second);
          const low = Math.min(first, second);
          if (Math.random() < 0.5) {
            left = high;
            right = low;
          } else {
            left = low;
            right = high;
          }
        }

        const answer = left > right ? ">" : left < right ? "<" : "=";
        const representations = pickRoundRepresentations(left, right);
        state.round = {
          left,
          right,
          answer,
          leftRepresentation: representations.leftRepresentation,
          rightRepresentation: representations.rightRepresentation
        };
        state.cardPulse.left = 0;
        state.cardPulse.right = 0;

        if (!state.feedback || state.feedbackTone === "neutral") {
          setFeedback("Tap the correct sign.", "neutral");
        }
      }

      function ensureAudio() {
        if (audio.ctx) return;
        const AudioContextRef = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextRef) return;

        audio.ctx = new AudioContextRef();
        audio.master = audio.ctx.createGain();
        audio.master.gain.value = 0.22;
        audio.master.connect(audio.ctx.destination);
      }

      function resumeAudioIfNeeded() {
        ensureAudio();
        if (!audio.ctx || !state.audioEnabled) return;
        if (audio.ctx.state === "suspended") {
          audio.ctx.resume().catch(() => {
            // Ignore gesture timing errors.
          });
        }
      }

      function playTone(freq, duration, type, volume, endFreq) {
        if (!state.audioEnabled) return;
        ensureAudio();
        if (!audio.ctx || !audio.master) return;
        if (audio.ctx.state === "suspended") return;

        const now = audio.ctx.currentTime;
        const osc = audio.ctx.createOscillator();
        const gain = audio.ctx.createGain();

        osc.type = type || "sine";
        osc.frequency.setValueAtTime(freq, now);
        if (endFreq && endFreq !== freq) {
          osc.frequency.exponentialRampToValueAtTime(Math.max(15, endFreq), now + duration);
        }

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        osc.connect(gain);
        gain.connect(audio.master);
        osc.start(now);
        osc.stop(now + duration + 0.02);
      }

      function playCorrectSound() {
        const combo = Math.min(state.comboLevel, 6);
        const baseFreq = 520 + combo * 40;
        playTone(baseFreq, 0.11, "triangle", 0.14, baseFreq * 1.42);
        playTone(baseFreq * 1.5, 0.14, "sine", 0.1, baseFreq * 1.88);
        playTone(baseFreq * 0.75, 0.08, "triangle", 0.06, baseFreq * 0.6);
        if (combo >= 3) {
          playTone(baseFreq * 2, 0.18, "sine", 0.07, baseFreq * 2.5);
        }
        if (combo >= 5) {
          playTone(baseFreq * 0.5, 0.22, "sine", 0.05, baseFreq * 0.75);
          playTone(baseFreq * 3, 0.12, "sine", 0.04, baseFreq * 3.5);
        }
      }

      function playWrongSound() {
        playTone(280, 0.18, "sawtooth", 0.1, 170);
        playTone(160, 0.2, "triangle", 0.08, 120);
        playTone(220, 0.12, "square", 0.05, 160);
      }

      function playChompSound() {
        playTone(220, 0.07, "square", 0.1, 140);
        playTone(300, 0.06, "square", 0.06, 200);
      }

      function playEqualSound() {
        playTone(460, 0.1, "triangle", 0.1, 460);
        playTone(580, 0.12, "sine", 0.07, 580);
      }

      function playStreakSound(streak) {
        const base = 400 + Math.min(streak, 10) * 30;
        playTone(base, 0.08, "sine", 0.09, base * 1.2);
        playTone(base * 1.25, 0.1, "sine", 0.07, base * 1.5);
        playTone(base * 1.5, 0.12, "sine", 0.06, base * 1.88);
        playTone(base * 2, 0.16, "sine", 0.04, base * 2.5);
      }

      function getMilestoneText(streak, answer) {
        if (answer === "=") {
          return "Match! Perfect equals.";
        }
        if (streak > 0 && streak % 10 === 0) {
          return "Gator champion! " + streak + " in a row!";
        }
        if (streak > 0 && streak % 5 === 0) {
          return "Checkpoint reached! Streak " + streak + "!";
        }
        if (STREAK_MILESTONES.includes(streak)) {
          return "Hot streak: " + streak + "!";
        }
        return PRAISE_MESSAGES[randomInt(0, PRAISE_MESSAGES.length - 1)];
      }

      function setGatorAnimation(emotion, duration, dir) {
        const clampedDir = clamp(Number(dir) || 0, -1, 1);
        state.gator.emotion = emotion;
        state.gator.timer = duration;
        state.gator.duration = Math.max(duration, 0.001);
        state.gator.dir = clampedDir;
        state.gator.targetDirection = clampedDir;
        if (emotion === "chomp" && clampedDir !== 0) {
          state.gator.headDirection = clampedDir * 0.3;
        }
      }

      function handleCorrectAnswer() {
        const answer = state.round.answer;
        const dir = answer === ">" ? -1 : answer === "<" ? 1 : 0;
        const fishThisRound = Math.max(state.round.left, state.round.right);

        if (answer === "=") {
          setGatorAnimation("equal", 0.62, 0);
          playEqualSound();
        } else {
          setGatorAnimation("chomp", 0.62, dir);
          playChompSound();
        }

        state.score += 1;
        state.streak += 1;
        state.comboLevel = state.streak;
        state.bestStreak = Math.max(state.bestStreak, state.streak);
        state.fishEaten += fishThisRound;
        let coinGain = COINS_PER_CORRECT;
        if (state.streak % STREAK_COIN_INTERVAL === 0) {
          coinGain += 2;
        }
        state.coins += coinGain;

        playCorrectSound();

        const target = dir < 0 ? leftNumberPos : dir > 0 ? rightNumberPos : { x: gatorPos.x, y: gatorPos.y - 10 };
        createStars(target.x, target.y - 20);
        createStars(gatorPos.x, gatorPos.y - 40);
        createSparkles(target.x, target.y, 8);
        triggerScreenFlash("rgba(200, 255, 200, 0.25)");

        createFloatingText(gatorPos.x, gatorPos.y - 80, "+" + coinGain, "#ffd700", 32);
        createFloatingText(gatorPos.x + 60, gatorPos.y - 60, "+" + fishThisRound + " fish", "#4ec5ef", 22);

        if (state.streak >= 3) {
          createConfetti(gatorPos.x, gatorPos.y - 40, Math.min(state.streak * 5, 50));
          if (state.streak % 5 === 0) {
            playStreakSound(state.streak);
            createConfetti(WIDTH * 0.25, HEIGHT * 0.3, 30);
            createConfetti(WIDTH * 0.75, HEIGHT * 0.3, 30);
            triggerScreenFlash("rgba(255, 215, 0, 0.2)");
            createFloatingText(gatorPos.x, gatorPos.y - 120, "STREAK " + state.streak + "!", "#ff6b6b", 42);
          }
        }

        if (answer === ">") {
          state.cardPulse.left = 1;
        } else if (answer === "<") {
          state.cardPulse.right = 1;
        } else {
          state.cardPulse.left = 0.9;
          state.cardPulse.right = 0.9;
        }

        const correctBtn = symbolButtons.find((b) => b.dataset.symbol === answer);
        if (correctBtn) {
          correctBtn.classList.add("correct-flash");
          setTimeout(() => correctBtn.classList.remove("correct-flash"), 450);
        }
        scorePill.classList.add("pop");
        streakPill.classList.add("pop");
        coinsPill.classList.add("pop");
        setTimeout(() => {
          scorePill.classList.remove("pop");
          streakPill.classList.remove("pop");
          coinsPill.classList.remove("pop");
        }, 400);

        showRewardBanner(
          getMilestoneText(state.streak, answer) + " +" + fishThisRound + " fish, +" + coinGain + " coin" + (coinGain === 1 ? "" : "s"),
          1.3,
          answer === "=" ? "#0f7f6e" : "#0f7a4e"
        );
        setFeedback("Correct: " + state.round.left + " " + answer + " " + state.round.right, "correct");
        updateHud();
        renderShop();
        saveProgress();

        state.queuedRoundAt = state.time + NEXT_ROUND_DELAY;
        setButtonsDisabled(true);
      }

      function handleWrongAnswer() {
        state.streak = 0;
        state.comboLevel = 0;
        updateHud();
        setGatorAnimation("wrong", 0.55, 0);
        createBubbles();
        state.cardPulse.left = 0.12;
        state.cardPulse.right = 0.12;
        triggerScreenFlash("rgba(224, 73, 64, 0.15)");
        showRewardBanner("Keep going. You can do this!", 0.9, "#b24a3e");
        playWrongSound();

        symbolButtons.forEach((btn) => {
          btn.classList.add("wrong-flash");
          setTimeout(() => btn.classList.remove("wrong-flash"), 450);
        });

        setFeedback("Try again: " + state.round.left + " " + state.round.answer + " " + state.round.right, "wrong");
      }

      function submitAnswer(symbol) {
        if (!state.round || state.queuedRoundAt > 0) return;
        resumeAudioIfNeeded();

        if (symbol === state.round.answer) {
          handleCorrectAnswer();
        } else {
          handleWrongAnswer();
        }
      }

      function roundedRectPath(context, x, y, w, h, r) {
        const radius = Math.min(r, w * 0.5, h * 0.5);
        context.beginPath();
        context.moveTo(x + radius, y);
        context.lineTo(x + w - radius, y);
        context.quadraticCurveTo(x + w, y, x + w, y + radius);
        context.lineTo(x + w, y + h - radius);
        context.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        context.lineTo(x + radius, y + h);
        context.quadraticCurveTo(x, y + h, x, y + h - radius);
        context.lineTo(x, y + radius);
        context.quadraticCurveTo(x, y, x + radius, y);
        context.closePath();
      }

      function drawBackground() {
        const topGradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
        topGradient.addColorStop(0, "#d8f1c9");
        topGradient.addColorStop(0.54, "#8ecf9d");
        topGradient.addColorStop(1, "#6ab993");
        ctx.fillStyle = topGradient;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        state.clouds.forEach((cloud) => {
          ctx.save();
          ctx.globalAlpha = cloud.opacity;
          ctx.translate(cloud.x, cloud.y);
          ctx.scale(cloud.scale, cloud.scale);
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.ellipse(0, 0, 60, 22, 0, 0, Math.PI * 2);
          ctx.ellipse(-30, -10, 35, 18, 0, 0, Math.PI * 2);
          ctx.ellipse(35, -8, 40, 20, 0, 0, Math.PI * 2);
          ctx.ellipse(10, -16, 30, 16, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        if (isDecorEquipped("sunset_sky")) {
          var sunset = ctx.createLinearGradient(0, 0, 0, HEIGHT * 0.75);
          sunset.addColorStop(0, "rgba(255, 160, 80, 0.38)");
          sunset.addColorStop(0.2, "rgba(255, 130, 100, 0.3)");
          sunset.addColorStop(0.45, "rgba(255, 170, 140, 0.18)");
          sunset.addColorStop(0.7, "rgba(255, 200, 160, 0.08)");
          sunset.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = sunset;
          ctx.fillRect(0, 0, WIDTH, HEIGHT);

          var sunX = WIDTH * 0.82;
          var sunY = 70 + Math.sin(state.time * 0.3) * 4;
          var sunR = 38;

          ctx.save();
          ctx.globalAlpha = 0.12;
          var sunGlow = ctx.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 5);
          sunGlow.addColorStop(0, "rgba(255, 200, 100, 0.6)");
          sunGlow.addColorStop(0.3, "rgba(255, 160, 80, 0.3)");
          sunGlow.addColorStop(1, "rgba(255, 160, 80, 0)");
          ctx.fillStyle = sunGlow;
          ctx.beginPath();
          ctx.arc(sunX, sunY, sunR * 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          ctx.save();
          ctx.globalAlpha = 0.15;
          for (var ray = 0; ray < 8; ray += 1) {
            var rayAngle = (ray / 8) * Math.PI * 2 + state.time * 0.08;
            var rayLen = sunR * 3.5 + Math.sin(state.time * 1.5 + ray) * sunR * 0.8;
            ctx.strokeStyle = "rgba(255, 200, 120, 0.5)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(sunX + Math.cos(rayAngle) * sunR * 1.2, sunY + Math.sin(rayAngle) * sunR * 1.2);
            ctx.lineTo(sunX + Math.cos(rayAngle) * rayLen, sunY + Math.sin(rayAngle) * rayLen);
            ctx.stroke();
          }
          ctx.restore();

          ctx.save();
          ctx.globalAlpha = 0.55;
          var sunFill = ctx.createRadialGradient(sunX - 6, sunY - 6, 0, sunX, sunY, sunR);
          sunFill.addColorStop(0, "#fff8e0");
          sunFill.addColorStop(0.5, "#ffe080");
          sunFill.addColorStop(1, "#ffb840");
          ctx.fillStyle = sunFill;
          ctx.beginPath();
          ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        for (let i = 0; i < 4; i += 1) {
          const waveY = HEIGHT * 0.61 + i * 30;
          ctx.fillStyle = i % 2 === 0 ? "rgba(198, 239, 213, 0.2)" : "rgba(146, 220, 177, 0.18)";
          ctx.beginPath();
          ctx.moveTo(0, waveY);
          for (let x = 0; x <= WIDTH + 40; x += 40) {
            const wobble = Math.sin((x * 0.012) + state.time * (0.8 + i * 0.2)) * 10;
            ctx.lineTo(x, waveY + wobble);
          }
          ctx.lineTo(WIDTH, HEIGHT);
          ctx.lineTo(0, HEIGHT);
          ctx.closePath();
          ctx.fill();
        }

        if (isDecorEquipped("rainbow_water")) {
          var rbShift = state.time * 0.18;
          var rbColors = [
            [255, 70, 110], [255, 150, 50], [255, 230, 50],
            [70, 220, 100], [50, 150, 255], [140, 90, 255], [210, 70, 220]
          ];

          var rbOverlay = ctx.createLinearGradient(0, HEIGHT * 0.58, WIDTH, HEIGHT);
          rbOverlay.addColorStop(0, "rgba(255, 100, 140, 0.12)");
          rbOverlay.addColorStop(0.17, "rgba(255, 170, 60, 0.11)");
          rbOverlay.addColorStop(0.33, "rgba(255, 240, 60, 0.1)");
          rbOverlay.addColorStop(0.5, "rgba(80, 220, 110, 0.11)");
          rbOverlay.addColorStop(0.67, "rgba(60, 160, 255, 0.12)");
          rbOverlay.addColorStop(0.83, "rgba(150, 100, 255, 0.11)");
          rbOverlay.addColorStop(1, "rgba(220, 80, 230, 0.1)");
          ctx.fillStyle = rbOverlay;
          ctx.fillRect(0, HEIGHT * 0.58, WIDTH, HEIGHT * 0.42);

          for (var rb = 0; rb < 7; rb += 1) {
            var bandY = HEIGHT * 0.58 + rb * (HEIGHT * 0.055);
            var bandH = HEIGHT * 0.045;
            for (var bx = 0; bx < WIDTH; bx += 28) {
              var colorIdx = ((bx / WIDTH * 4) + rbShift + rb * 0.5) % rbColors.length;
              var ci = Math.floor(colorIdx);
              var cf = colorIdx - ci;
              var c1 = rbColors[ci % rbColors.length];
              var c2 = rbColors[(ci + 1) % rbColors.length];
              var cr = Math.round(c1[0] + (c2[0] - c1[0]) * cf);
              var cg = Math.round(c1[1] + (c2[1] - c1[1]) * cf);
              var cb = Math.round(c1[2] + (c2[2] - c1[2]) * cf);
              var waveOff = Math.sin(bx * 0.018 + state.time * 1.5 + rb * 0.7) * 8;
              ctx.fillStyle = "rgba(" + cr + "," + cg + "," + cb + ",0.16)";
              ctx.fillRect(bx, bandY + waveOff, 30, bandH);
            }
          }

          for (var rw = 0; rw < 3; rw += 1) {
            ctx.beginPath();
            var rwY = HEIGHT * 0.65 + rw * 40;
            ctx.moveTo(0, rwY);
            for (var rwx = 0; rwx <= WIDTH; rwx += 20) {
              var rwWave = Math.sin(rwx * 0.01 + state.time * 1.8 + rw * 2) * 10;
              ctx.lineTo(rwx, rwY + rwWave);
            }
            var rwci = (Math.floor(state.time * 0.5 + rw * 2.3)) % rbColors.length;
            var rwc = rbColors[rwci];
            ctx.strokeStyle = "rgba(" + rwc[0] + "," + rwc[1] + "," + rwc[2] + ",0.22)";
            ctx.lineWidth = 2.5;
            ctx.stroke();
          }

          for (var sp = 0; sp < 22; sp += 1) {
            var spx = (sp * 61.7 + state.time * 40) % WIDTH;
            var spy = HEIGHT * 0.6 + (sp * 33.7) % (HEIGHT * 0.36);
            var spPulse = Math.abs(Math.sin(state.time * 2.8 + sp * 1.7));
            if (spPulse > 0.55) {
              ctx.save();
              var spAlpha = (spPulse - 0.55) * 1.8;
              ctx.globalAlpha = Math.min(spAlpha, 0.8);
              var spci = sp % rbColors.length;
              var spc = rbColors[spci];

              var spGlow = ctx.createRadialGradient(spx, spy, 0, spx, spy, 8);
              spGlow.addColorStop(0, "rgba(" + spc[0] + "," + spc[1] + "," + spc[2] + ",0.5)");
              spGlow.addColorStop(0.5, "rgba(" + spc[0] + "," + spc[1] + "," + spc[2] + ",0.15)");
              spGlow.addColorStop(1, "rgba(" + spc[0] + "," + spc[1] + "," + spc[2] + ",0)");
              ctx.fillStyle = spGlow;
              ctx.beginPath();
              ctx.arc(spx, spy, 8, 0, Math.PI * 2);
              ctx.fill();

              ctx.fillStyle = "rgba(255,255,255,0.7)";
              ctx.beginPath();
              ctx.arc(spx, spy, 1.8, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            }
          }
        }

        const lilyPads = isDecorEquipped("lily_pack")
          ? state.lilyPads.concat(state.bonusLilyPads)
          : state.lilyPads;
        lilyPads.forEach((pad, padIndex) => {
          const bob = Math.sin(state.time * 0.9 + pad.phase) * 5;
          const sway = Math.sin(state.time * 0.35 + pad.phase) * pad.drift;
          const x = pad.x + sway;
          const y = pad.y + bob;
          const r = pad.r;

          ctx.save();
          ctx.globalAlpha = 0.18;
          ctx.strokeStyle = "rgba(255,255,255,0.6)";
          ctx.lineWidth = 1.5;
          var ringPulse = Math.sin(state.time * 1.2 + pad.phase) * 0.08;
          ctx.beginPath();
          ctx.ellipse(x, y + 2, r * (1.15 + ringPulse), r * 0.72 * (1.15 + ringPulse), -0.1, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();

          var padGrad = ctx.createRadialGradient(x - r * 0.2, y - r * 0.15, r * 0.1, x, y, r);
          padGrad.addColorStop(0, "rgba(72, 180, 95, 0.88)");
          padGrad.addColorStop(0.5, "rgba(40, 140, 68, 0.85)");
          padGrad.addColorStop(1, "rgba(25, 100, 50, 0.8)");
          ctx.fillStyle = padGrad;
          ctx.beginPath();
          ctx.ellipse(x, y, r, r * 0.62, -0.1, 0, Math.PI * 2);
          ctx.fill();

          ctx.save();
          ctx.beginPath();
          ctx.ellipse(x, y, r, r * 0.62, -0.1, 0, Math.PI * 2);
          ctx.clip();
          ctx.fillStyle = "rgba(100, 210, 130, 0.5)";
          ctx.beginPath();
          ctx.ellipse(x - r * 0.2, y - r * 0.15, r * 0.55, r * 0.35, -0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          ctx.strokeStyle = "rgba(18, 77, 36, 0.4)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + r * 0.55, y + r * 0.18);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + r * 0.35, y - r * 0.3);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x - r * 0.1, y + r * 0.38);
          ctx.stroke();

          ctx.fillStyle = "rgba(255,255,255,0.18)";
          ctx.beginPath();
          ctx.ellipse(x - r * 0.3, y - r * 0.2, r * 0.2, r * 0.1, -0.3, 0, Math.PI * 2);
          ctx.fill();

          if (padIndex % 3 === 0) {
            var flowerX = x + r * 0.3;
            var flowerY = y - r * 0.25 + Math.sin(state.time * 1.1 + pad.phase) * 2;
            var petalCount = 5;
            for (var p = 0; p < petalCount; p += 1) {
              var angle = (p / petalCount) * Math.PI * 2 + state.time * 0.15;
              var px = flowerX + Math.cos(angle) * 8;
              var py = flowerY + Math.sin(angle) * 5;
              ctx.fillStyle = padIndex % 6 === 0 ? "rgba(255, 180, 200, 0.85)" : "rgba(255, 255, 220, 0.85)";
              ctx.beginPath();
              ctx.ellipse(px, py, 5.5, 3.5, angle, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.fillStyle = padIndex % 6 === 0 ? "#f0d060" : "#f5c842";
            ctx.beginPath();
            ctx.arc(flowerX, flowerY, 3.5, 0, Math.PI * 2);
            ctx.fill();
          }
        });

        for (let i = 0; i < 15; i += 1) {
          const sx = random(60, WIDTH - 60);
          const sy = random(HEIGHT * 0.6, HEIGHT * 0.95);
          const twinkle = Math.abs(Math.sin(state.time * 3.5 + i * 1.7 + sx * 0.02));
          if (twinkle > 0.85) {
            ctx.save();
            ctx.globalAlpha = (twinkle - 0.85) * 5;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(sx, sy, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        const reedsExtra = isDecorEquipped("reeds_pack") ? 6 : 0;
        for (let side = 0; side < 2; side += 1) {
          const baseX = side === 0 ? 40 : WIDTH - 40;
          const dir = side === 0 ? 1 : -1;
          for (let i = 0; i < 11 + reedsExtra; i += 1) {
            var windSway = Math.sin(state.time * 1.1 + i * 0.6 + side * 3) * (3 + i * 0.3);
            var stemX = baseX + dir * i * 9 + windSway;
            var stemY = HEIGHT - 4;
            var tipY = HEIGHT * 0.52 + i * 8;
            var midX = stemX + dir * (12 + Math.sin(state.time * 0.8 + i) * 4);
            var tipX = stemX + windSway * 0.5;

            var stemGrad = ctx.createLinearGradient(stemX, stemY, stemX, tipY);
            stemGrad.addColorStop(0, "rgba(50, 130, 68, 0.7)");
            stemGrad.addColorStop(1, "rgba(65, 150, 80, 0.5)");
            ctx.strokeStyle = stemGrad;
            ctx.lineWidth = 3.5 - i * 0.12;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(stemX, stemY);
            ctx.quadraticCurveTo(midX, (stemY + tipY) * 0.55, tipX, tipY);
            ctx.stroke();

            if (i % 3 === 0 && i < 8) {
              var leafY = stemY - (stemY - tipY) * (0.35 + i * 0.03);
              var leafDir = (i % 2 === 0) ? 1 : -1;
              ctx.fillStyle = "rgba(58, 145, 75, 0.55)";
              ctx.beginPath();
              var lx = stemX + dir * i * 0.3;
              ctx.moveTo(lx, leafY);
              ctx.quadraticCurveTo(lx + leafDir * 22, leafY - 8, lx + leafDir * 30, leafY + 4);
              ctx.quadraticCurveTo(lx + leafDir * 16, leafY + 6, lx, leafY);
              ctx.fill();
            }

            if (i % 4 === 1) {
              var catY = tipY + 2;
              ctx.fillStyle = "rgba(110, 75, 40, 0.7)";
              roundedRectPath(ctx, tipX - 3, catY - 16, 6, 18, 3);
              ctx.fill();
              ctx.fillStyle = "rgba(140, 95, 50, 0.5)";
              roundedRectPath(ctx, tipX - 2, catY - 14, 4, 14, 2);
              ctx.fill();
            }
          }
        }
        ctx.lineCap = "butt";

        if (isDecorEquipped("fireflies")) {
          state.fireflies.forEach((fly, index) => {
            const x = fly.x + Math.sin(state.time * fly.speed + fly.phase) * 18;
            const y = fly.y + Math.cos(state.time * (fly.speed + 0.25) + fly.phase) * 14;
            const pulse = Math.abs(Math.sin(state.time * 2.2 + fly.phase + index * 0.18));
            const alpha = 0.15 + 0.7 * pulse;
            const glowSize = fly.size * (2.5 + pulse * 2);

            ctx.save();
            ctx.globalAlpha = alpha * 0.25;
            var haloGrad = ctx.createRadialGradient(x, y, 0, x, y, glowSize);
            var hue = index % 3 === 0 ? "rgba(255, 245, 162," : index % 3 === 1 ? "rgba(162, 255, 200," : "rgba(200, 230, 255,";
            haloGrad.addColorStop(0, hue + " 0.7)");
            haloGrad.addColorStop(0.5, hue + " 0.2)");
            haloGrad.addColorStop(1, hue + " 0)");
            ctx.fillStyle = haloGrad;
            ctx.beginPath();
            ctx.arc(x, y, glowSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = index % 3 === 0 ? "#fff5a2" : index % 3 === 1 ? "#a2ffcc" : "#c8e8ff";
            ctx.beginPath();
            ctx.arc(x, y, fly.size * (0.8 + pulse * 0.3), 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#ffffff";
            ctx.globalAlpha = alpha * 0.8;
            ctx.beginPath();
            ctx.arc(x - fly.size * 0.2, y - fly.size * 0.2, fly.size * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });
        }

        if (isDecorEquipped("frog_friend")) {
          var frogBaseX = WIDTH * 0.13;
          var frogBaseY = HEIGHT * 0.78;
          var frogBob = Math.sin(state.time * 1.8) * 3;
          var frogSway = Math.sin(state.time * 1.2) * 4;
          var frogX = frogBaseX + frogSway;
          var frogY = frogBaseY + frogBob;
          var breathe = Math.sin(state.time * 2.5) * 1.5;
          var frogBlink = Math.sin(state.time * 0.4) > 0.96;

          ctx.save();
          ctx.globalAlpha = 0.25;
          ctx.fillStyle = "rgba(30, 90, 50, 0.5)";
          ctx.beginPath();
          ctx.ellipse(frogX, frogY + 30, 42, 10, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          var padGr = ctx.createRadialGradient(frogX - 8, frogY + 20, 5, frogX, frogY + 24, 48);
          padGr.addColorStop(0, "rgba(65, 165, 85, 0.8)");
          padGr.addColorStop(1, "rgba(35, 120, 55, 0.7)");
          ctx.fillStyle = padGr;
          ctx.beginPath();
          ctx.ellipse(frogX, frogY + 24, 46, 18, 0.05, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(90, 195, 110, 0.4)";
          ctx.beginPath();
          ctx.ellipse(frogX - 10, frogY + 20, 22, 9, -0.1, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#3a9e52";
          ctx.beginPath();
          ctx.ellipse(frogX - 18, frogY + 6, 12, 6, -0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#3a9e52";
          ctx.beginPath();
          ctx.ellipse(frogX + 18, frogY + 6, 12, 6, 0.3, 0, Math.PI * 2);
          ctx.fill();

          var bodyGr = ctx.createRadialGradient(frogX - 4, frogY - 6, 4, frogX, frogY, 30);
          bodyGr.addColorStop(0, "#6ed880");
          bodyGr.addColorStop(0.6, "#4cba62");
          bodyGr.addColorStop(1, "#3a9e52");
          ctx.fillStyle = bodyGr;
          ctx.beginPath();
          ctx.ellipse(frogX, frogY - 4, 26 + breathe, 20 + breathe * 0.5, 0, 0, Math.PI * 2);

          ctx.fillStyle = "#8ae89a";

          ctx.fillStyle = "rgba(90, 200, 110, 0.4)";

          var eyeRaise = 14;

          ctx.fillStyle = "#ffffff";

          if (frogBlink) {
            ctx.strokeStyle = "#1a3a24";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(frogX - 16, frogY - eyeRaise);
            ctx.lineTo(frogX - 8, frogY - eyeRaise);
            ctx.moveTo(frogX + 8, frogY - eyeRaise);
            ctx.lineTo(frogX + 16, frogY - eyeRaise);
            ctx.stroke();
          } else {
            var lookX = Math.sin(state.time * 0.7) * 1.5;
            ctx.fillStyle = "#1a3a24";
            ctx.beginPath();
            ctx.arc(frogX - 11.5 + lookX, frogY - eyeRaise, 2.2, 0, Math.PI * 2);
            ctx.arc(frogX + 12.5 + lookX, frogY - eyeRaise, 2.2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.beginPath();
            ctx.arc(frogX - 13, frogY - eyeRaise - 1.5, 1.2, 0, Math.PI * 2);

          ctx.strokeStyle = "#2e8040";

          var cheekAlpha = 0.2 + Math.sin(state.time * 0.8) * 0.08;

          ctx.beginPath();
          ctx.ellipse(frogX - 18, frogY - 3, 5, 3.5, 0, 0, Math.PI * 2);
          ctx.ellipse(frogX + 18, frogY - 3, 5, 3.5, 0, 0, Math.PI * 2);

        ctx.save();
        ctx.translate(d.x, flyY);

        ctx.beginPath();
        ctx.moveTo(-10, 0);
        ctx.lineTo(12, 0);

        ctx.fillStyle = "rgba(185, 233, 255, 0.82)";
        ctx.beginPath();
        ctx.ellipse(-2, -5, wing, 6, -0.28, 0, Math.PI * 2);
        ctx.ellipse(-2, 5, wing, 6, 0.28, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#2c6e4f";
        ctx.beginPath();
        ctx.ellipse(0, 0, 6, 3, 0, 0, Math.PI * 2);

        const bodyGradient = ctx.createLinearGradient(-10, 0, 12, 0);
        bodyGradient.addColorStop(0, "#4ec5ef");

        ctx.ellipse(0, 0, 11, 7, 0, 0, Math.PI * 2);

        ctx.beginPath();
        ctx.moveTo(-11, 0);
        ctx.lineTo(-19, -6);
        ctx.lineTo(-19, 6);
        ctx.closePath();

        ctx.fillStyle = "#f0fbff";
