      function drawFishQuantity(centerX, centerY, value) {
        const fishCount = Math.min(value, 20);
        const cols = 5;
        const spacingX = 30;
        const spacingY = 24;
        const rows = Math.max(1, Math.ceil(fishCount / cols));
        const totalWidth = (Math.min(cols, fishCount) - 1) * spacingX;
        const totalHeight = (rows - 1) * spacingY;
        const startX = centerX - totalWidth * 0.5;
        const startY = centerY - totalHeight * 0.5;

        for (let i = 0; i < fishCount; i += 1) {
          const row = Math.floor(i / cols);
          const col = i % cols;
          const fx = startX + col * spacingX;
          const fy = startY + row * spacingY;
          drawFishIcon(fx, fy, 0.9);
        }
      }

      function drawNumberCard(x, y, value, representation, highlight, pulse) {
        const cardW = NUMBER_CARD_W;
        const cardH = NUMBER_CARD_H;
        const left = x - cardW / 2;
        const top = y - cardH / 2;
        const pulseScale = 1 + pulse * 0.07;
        const bob = Math.sin(state.time * 1.8 + x * 0.01) * 3;

        ctx.save();
        ctx.translate(x, y + bob);
        ctx.scale(pulseScale, pulseScale);
        ctx.translate(-x, -(y + bob));

        if (highlight || pulse > 0.3) {
          ctx.save();
          ctx.shadowColor = highlight ? "rgba(207, 175, 72, 0.5)" : "rgba(29, 157, 99, 0.3)";
          ctx.shadowBlur = 20 + pulse * 15;
          roundedRectPath(ctx, left, top, cardW, cardH, 24);
          ctx.fillStyle = "rgba(255,255,255,0.01)";
          ctx.fill();
          ctx.restore();
        }

        const fill = ctx.createLinearGradient(left, top, left + cardW, top + cardH);
        fill.addColorStop(0, highlight ? "#fffed0" : "#f7fff5");
        fill.addColorStop(0.5, highlight ? "#fff5a0" : "#eefcee");
        fill.addColorStop(1, highlight ? "#ffe080" : "#e2f6e4");

        roundedRectPath(ctx, left, top, cardW, cardH, 24);
        ctx.fillStyle = fill;
        ctx.fill();

        ctx.lineWidth = highlight ? 4 : 3;
        ctx.strokeStyle = highlight ? "#cfaf48" : "#9bc8a2";
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.48)";
        roundedRectPath(ctx, left + 10, top + 10, cardW - 20, cardH * 0.38, 14);
        ctx.fill();

        if (representation === "fish") {
          drawFishQuantity(x, y + 6, value);
        } else {
          ctx.fillStyle = "#113a2a";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = "700 92px 'Fredoka', 'Quicksand', sans-serif";
          ctx.fillText(String(value), x, y + 8);
        }

        ctx.restore();
      }

      function drawGatorHeadProfile(jawOpen, blinkClosed, moodPulse) {
        const upperGradient = ctx.createLinearGradient(-14, -46, 162, 34);
        upperGradient.addColorStop(0, "#72d17d");
        upperGradient.addColorStop(1, "#4fac60");
        roundedRectPath(ctx, -14, -46, 176, 62, 22);
        ctx.fillStyle = upperGradient;
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#2c8b47";
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.28)";
        roundedRectPath(ctx, 6, -39, 122, 20, 10);
        ctx.fill();

        ctx.fillStyle = "#2f8f4e";
        ctx.beginPath();
        ctx.arc(134, -15, 4.2, 0, Math.PI * 2);
        ctx.arc(146, -8, 3.8, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(8, 12);
        ctx.rotate(0.07 + jawOpen * 0.011);
        const lowerGradient = ctx.createLinearGradient(-2, 0, 160, 45);
        lowerGradient.addColorStop(0, "#63c46f");
        lowerGradient.addColorStop(1, "#4ca95a");
        roundedRectPath(ctx, -10, 0, 172, 42, 17);
        ctx.fillStyle = lowerGradient;
        ctx.fill();
        ctx.strokeStyle = "#2f8e49";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = "#f8e6b7";
        roundedRectPath(ctx, 8, 8, 138, 22, 11);
        ctx.fill();

        ctx.fillStyle = "#f39cb3";
        ctx.beginPath();
        ctx.ellipse(80, 22, 34, 9, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#fdf6d8";
        for (let i = 0; i < 6; i += 1) {
          const toothX = 20 + i * 20;
          ctx.beginPath();
          ctx.moveTo(toothX, 0);
          ctx.lineTo(toothX + 9, 0);
          ctx.lineTo(toothX + 4.5, 10);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();

        ctx.fillStyle = "#fdf6d8";
        for (let i = 0; i < 7; i += 1) {
          const toothX = 14 + i * 19;
          ctx.beginPath();
          ctx.moveTo(toothX, 18);
          ctx.lineTo(toothX + 9, 18);
          ctx.lineTo(toothX + 4.5, 29);
          ctx.closePath();
          ctx.fill();
        }

        ctx.fillStyle = "#327e4a";
        ctx.beginPath();
        ctx.ellipse(18, -43, 29, 16, -0.06, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(42, -40, 24, 14, 0.08, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.ellipse(12, -43, 10, 10, 0, 0, Math.PI * 2);
        ctx.ellipse(34, -40, 9.5, 9, 0, 0, Math.PI * 2);
        ctx.fill();

        if (blinkClosed) {
          ctx.strokeStyle = "#1e2f24";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(3, -44);
          ctx.lineTo(21, -44);
          ctx.moveTo(29, -41);
          ctx.lineTo(45, -41);
          ctx.stroke();
        } else {
          const pupilShift = 1.5 + moodPulse * 1.2;
          ctx.fillStyle = "#17281b";
          ctx.beginPath();
          ctx.ellipse(12 + pupilShift, -43, 3.2, 4.3, 0, 0, Math.PI * 2);
          ctx.ellipse(34 + pupilShift, -40, 2.9, 3.8, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.arc(9, -47, 1.6, 0, Math.PI * 2);
        ctx.arc(34, -44, 1.3, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawGator() {
        const g = state.gator;
        const elapsed = 1 - (g.timer / g.duration);
        const pulse = clamp(Math.sin(elapsed * Math.PI), 0, 1);
        const snapPulse = Math.abs(Math.sin(elapsed * Math.PI * 2.8));

        let lean = 0;
        let jawOpen = 6;
        let bodyLift = Math.sin(state.time * 2.2) * 1.8;
        let tailBoost = 0.18;
        let headTurnBoost = 0;
        let nodBoost = Math.sin(state.time * 2.1) * 0.03;

        if (g.emotion === "chomp") {
          lean = g.dir * (14 + 20 * pulse);
          jawOpen = 9 + 22 * snapPulse;
          bodyLift = -8 * pulse;
          tailBoost = 0.76;
          headTurnBoost = g.dir * (0.2 + 0.75 * pulse);
        } else if (g.emotion === "equal") {
          bodyLift = -Math.sin(elapsed * Math.PI * 2) * 12;
          jawOpen = 10 + 8 * pulse;
          tailBoost = 0.4;
          nodBoost = Math.sin(elapsed * Math.PI * 2) * 0.22;
          headTurnBoost = 0;
        } else if (g.emotion === "wrong") {
          const shake = Math.sin(elapsed * Math.PI * 8) * 20 * (1 - elapsed);
          g.shakeOffset = shake;
          jawOpen = 7 + (1 - elapsed) * 4;
          nodBoost = Math.sin(elapsed * Math.PI * 5) * 0.1;
          headTurnBoost = 0;
        } else {
          g.shakeOffset *= 0.85;
        }

        const blinkClosed = g.blinkTimer > 0;
        const x = gatorPos.x + lean + g.shakeOffset;
        const y = gatorPos.y + bodyLift;
        const headDirection = clamp(g.headDirection + headTurnBoost, -1, 1);
        const faceLeft = g.faceSign < 0;

        ctx.save();
        ctx.translate(x, y);

        ctx.fillStyle = "rgba(26, 79, 54, 0.2)";
        ctx.beginPath();
        ctx.ellipse(-10, 122, 170, 34, 0, 0, Math.PI * 2);
        ctx.fill();

        const tailAngle = Math.sin(state.time * 6 + tailBoost * 2) * (0.2 + tailBoost * 0.24);
        ctx.save();
        ctx.translate(-142, 34);
        ctx.rotate(-0.28 + tailAngle);
        const tailGradient = ctx.createLinearGradient(-60, 0, 40, 18);
        tailGradient.addColorStop(0, "#3f9650");
        tailGradient.addColorStop(1, "#5ec06d");
        ctx.fillStyle = tailGradient;
        ctx.beginPath();
        ctx.moveTo(-52, 2);
        ctx.quadraticCurveTo(40, -58, 36, 20);
        ctx.quadraticCurveTo(-6, 42, -52, 2);
        ctx.fill();
        ctx.restore();

        const bodyGradient = ctx.createLinearGradient(-170, -50, 160, 120);
        bodyGradient.addColorStop(0, "#77d887");
        bodyGradient.addColorStop(1, "#4bad5e");
        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        ctx.ellipse(-20, 34, 140, 84, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#daf9b3";
        ctx.beginPath();
        ctx.ellipse(-18, 60, 112, 40, 0, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < 6; i += 1) {
          const sx = -86 + i * 34;
          const sy = -8 - Math.sin(state.time * 2 + i) * 1.8;
          ctx.fillStyle = i % 2 === 0 ? "#468f52" : "#3f824a";
          ctx.beginPath();
          ctx.moveTo(sx, sy + 20);
          ctx.lineTo(sx + 12, sy - 6);
          ctx.lineTo(sx + 24, sy + 20);
          ctx.closePath();
          ctx.fill();
        }

        ctx.fillStyle = "#4ea65d";
        roundedRectPath(ctx, -88, 84, 54, 22, 10);
        ctx.fill();
        roundedRectPath(ctx, 6, 84, 60, 24, 10);
        ctx.fill();

        const neckX = 28 + headDirection * 12;
        const neckY = 8 + nodBoost * 14;
        ctx.save();
        ctx.translate(neckX, neckY);
        ctx.rotate(headDirection * 0.08);
        ctx.fillStyle = "#61c56f";
        ctx.beginPath();
        ctx.ellipse(0, 0, 40, 28, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        let headAnchorX = 72 + headDirection * 30;
        const headAnchorY = -2 + nodBoost * 20 + g.headNod * 8;
        const turnAmount = Math.abs(headDirection) * 0.27 + Math.abs(nodBoost) * 0.08;

        const safeLeftWorld = leftNumberPos.x + NUMBER_CARD_W * 0.5 + GATOR_CARD_GAP;
        const safeRightWorld = rightNumberPos.x - NUMBER_CARD_W * 0.5 - GATOR_CARD_GAP;
        const safeLeft = safeLeftWorld - x;
        const safeRight = safeRightWorld - x;
        const headMin = faceLeft ? -162 : -14;
        const headMax = faceLeft ? 14 : 162;
        const anchorMin = safeLeft - headMin;
        const anchorMax = safeRight - headMax;
        if (anchorMin <= anchorMax) {
          headAnchorX = clamp(headAnchorX, anchorMin, anchorMax);
        }

        ctx.save();
        ctx.translate(headAnchorX, headAnchorY);
        if (faceLeft) {
          ctx.scale(-1, 1);
        }
        ctx.rotate(turnAmount);
        drawGatorHeadProfile(jawOpen, blinkClosed, pulse);
        ctx.restore();

        ctx.restore();
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(particle.x, particle.y);
          ctx.rotate(state.time * 8 + particle.x * 0.01);
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.moveTo(0, -particle.size);
          ctx.lineTo(particle.size * 0.35, -particle.size * 0.35);
          ctx.lineTo(particle.size, 0);
          ctx.lineTo(particle.size * 0.35, particle.size * 0.35);
          ctx.lineTo(0, particle.size);
          ctx.lineTo(-particle.size * 0.35, particle.size * 0.35);
          ctx.lineTo(-particle.size, 0);
          ctx.lineTo(-particle.size * 0.35, -particle.size * 0.35);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });

        state.confetti.forEach((c) => {
          const alpha = clamp(c.life / c.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(c.x, c.y);
          ctx.rotate(c.rotation);
          ctx.fillStyle = c.color;
          if (c.shape === "rect") {
            ctx.fillRect(-c.size * 0.5, -c.size * 0.25, c.size, c.size * 0.5);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, c.size * 0.45, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        });

        state.sparkles.forEach((s) => {
          const alpha = clamp(s.life / s.maxLife, 0, 1);
          const twinkle = Math.abs(Math.sin(state.time * s.twinkleSpeed));
          ctx.save();
          ctx.globalAlpha = alpha * twinkle;
          ctx.translate(s.x, s.y);
          ctx.fillStyle = s.color;
          const sz = s.size * (0.5 + twinkle * 0.5);
          ctx.beginPath();
          ctx.moveTo(0, -sz);
          ctx.lineTo(sz * 0.3, -sz * 0.3);
          ctx.lineTo(sz, 0);
          ctx.lineTo(sz * 0.3, sz * 0.3);
          ctx.lineTo(0, sz);
          ctx.lineTo(-sz * 0.3, sz * 0.3);
          ctx.lineTo(-sz, 0);
          ctx.lineTo(-sz * 0.3, -sz * 0.3);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });

        state.floatingTexts.forEach((ft) => {
          const alpha = clamp(ft.life / ft.maxLife, 0, 1);
          const scaleT = Math.min(1, (ft.maxLife - ft.life) / 0.15);
          const scale = 0.5 + scaleT * 0.5;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(ft.x, ft.y);
          ctx.scale(scale, scale);
          ctx.font = "700 " + ft.size + "px 'Fredoka', sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.strokeStyle = "rgba(0,0,0,0.3)";
          ctx.lineWidth = 3;
          ctx.strokeText(ft.text, 0, 0);
          ctx.fillStyle = ft.color;
          ctx.fillText(ft.text, 0, 0);
          ctx.restore();
        });

        state.bubbles.forEach((bubble) => {
          const alpha = clamp(bubble.life / 0.7, 0, 0.95);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.lineWidth = 2;
          ctx.strokeStyle = "rgba(220, 250, 255, 0.85)";
          ctx.fillStyle = "rgba(184, 236, 255, 0.2)";
          ctx.beginPath();
          ctx.arc(bubble.x, bubble.y, bubble.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        });
      }

      function drawRoundContent() {
        if (!state.round) return;

        const answer = state.round.answer;
        const leftHighlight = state.gator.emotion === "chomp" && answer === ">";
        const rightHighlight = state.gator.emotion === "chomp" && answer === "<";

        drawNumberCard(
          leftNumberPos.x,
          leftNumberPos.y,
          state.round.left,
          state.round.leftRepresentation,
          leftHighlight,
          state.cardPulse.left
        );
        drawNumberCard(
          rightNumberPos.x,
          rightNumberPos.y,
          state.round.right,
          state.round.rightRepresentation,
          rightHighlight,
          state.cardPulse.right
        );

        drawGator();
      }

      function drawTrailMeter() {
        const meterW = 340;
        const meterH = 16;
        const meterX = WIDTH * 0.5 - meterW * 0.5;
        const meterY = 58;
        const checkpointSize = 5;
        const checkpointProgress = state.streak % checkpointSize;
        const ratio = checkpointProgress / checkpointSize;

        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.08)";
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 2;
        roundedRectPath(ctx, meterX, meterY, meterW, meterH, 9);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.fill();
        ctx.strokeStyle = "rgba(155, 200, 162, 0.5)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();

        if (ratio > 0) {
          roundedRectPath(ctx, meterX, meterY, meterW * ratio, meterH, 9);
          const fill = ctx.createLinearGradient(meterX, meterY, meterX + meterW, meterY);
          fill.addColorStop(0, "#4dd88a");
          fill.addColorStop(0.5, "#33c76e");
          fill.addColorStop(1, "#28b05c");
          ctx.fillStyle = fill;
          ctx.fill();

          ctx.fillStyle = "rgba(255,255,255,0.3)";
          roundedRectPath(ctx, meterX, meterY, meterW * ratio, meterH * 0.45, 9);
          ctx.fill();
        }

        for (let i = 1; i < checkpointSize; i += 1) {
          const dotX = meterX + (meterW / checkpointSize) * i;
          ctx.fillStyle = i <= checkpointProgress ? "rgba(255,255,255,0.6)" : "rgba(0,0,0,0.1)";
          ctx.beginPath();
          ctx.arc(dotX, meterY + meterH * 0.5, 2.5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(17, 66, 39, 0.78)";
        ctx.font = "600 16px 'Fredoka', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";
        ctx.fillText("Swamp Trail " + checkpointProgress + "/" + checkpointSize, WIDTH * 0.5, meterY - 7);
      }

      function drawRewardBanner() {
        if (state.rewardBanner.timer <= 0 || !state.rewardBanner.text) return;
        const maxTime = 1.3;
        const elapsed = maxTime - state.rewardBanner.timer;
        const fadeAlpha = clamp(state.rewardBanner.timer / 0.5, 0, 1);
        const scaleIn = elapsed < 0.15 ? 0.6 + (elapsed / 0.15) * 0.5 : (elapsed < 0.25 ? 1.1 - ((elapsed - 0.15) / 0.1) * 0.1 : 1.0);
        const width = 580;
        const height = 58;
        const cx = WIDTH * 0.5;
        const y = 96;

        ctx.save();
        ctx.globalAlpha = fadeAlpha;
        ctx.translate(cx, y + height * 0.5);
        ctx.scale(scaleIn, scaleIn);
        ctx.translate(-cx, -(y + height * 0.5));

        ctx.shadowColor = "rgba(0,0,0,0.1)";
        ctx.shadowBlur = 16;
        ctx.shadowOffsetY = 4;
        roundedRectPath(ctx, cx - width * 0.5, y, width, height, 26);
        ctx.fillStyle = "rgba(255,255,255,0.94)";
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;

        ctx.lineWidth = 3;
        ctx.strokeStyle = state.rewardBanner.color;
        ctx.stroke();

        ctx.fillStyle = state.rewardBanner.color;
        const bannerSize = state.rewardBanner.text.length > 42 ? 19 : 23;
        ctx.font = "700 " + bannerSize + "px 'Fredoka', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(state.rewardBanner.text, cx, y + height * 0.52);
        ctx.restore();
      }

      function drawComboIndicator() {
        if (state.comboLevel < 2) return;
        const combo = Math.min(state.comboLevel, 20);
        const pulse = 0.9 + Math.sin(state.time * 4) * 0.1;
        const size = 18 + combo * 1.5;

        ctx.save();
        ctx.translate(WIDTH - 100, 50);
        ctx.scale(pulse, pulse);

        ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
        ctx.beginPath();
        ctx.arc(0, 0, 38 + combo, 0, Math.PI * 2);
        ctx.fill();

        const comboColors = ["#ffd700", "#ff8c00", "#ff4500", "#ff1493", "#9400d3"];
        const colorIndex = Math.min(Math.floor((combo - 2) / 2), comboColors.length - 1);
        ctx.strokeStyle = comboColors[colorIndex];
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = comboColors[colorIndex];
        ctx.font = "700 " + size + "px 'Fredoka', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("x" + combo, 0, 2);

        ctx.font = "600 11px 'Fredoka', sans-serif";
        ctx.fillStyle = "#666";
        ctx.fillText("COMBO", 0, 24);

        ctx.restore();
      }

      function drawScreenFlash() {
        if (state.screenFlash.alpha <= 0.005) return;
        ctx.save();
        ctx.globalAlpha = state.screenFlash.alpha;
        ctx.fillStyle = state.screenFlash.color;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        drawBackground();

        ctx.fillStyle = "rgba(255,255,255,0.22)";
        roundedRectPath(ctx, 120, 120, WIDTH - 240, HEIGHT - 210, 36);
        ctx.fill();

        drawRoundContent();
        drawParticles();
        drawTrailMeter();
        drawComboIndicator();
        drawRewardBanner();
        drawScreenFlash();
      }

      function updateParticles(dt) {
        for (let i = state.particles.length - 1; i >= 0; i -= 1) {
          const particle = state.particles[i];
          particle.life -= dt;
          particle.vy += 280 * dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          if (particle.life <= 0) {
            state.particles.splice(i, 1);
          }
        }

        for (let i = state.confetti.length - 1; i >= 0; i -= 1) {
          const c = state.confetti[i];
          c.life -= dt;
          c.vy += 320 * dt;
          c.vx *= 0.99;
          c.x += c.vx * dt;
          c.y += c.vy * dt;
          c.rotation += c.rotSpeed * dt;
          if (c.life <= 0) {
            state.confetti.splice(i, 1);
          }
        }

        for (let i = state.floatingTexts.length - 1; i >= 0; i -= 1) {
          const ft = state.floatingTexts[i];
          ft.life -= dt;
          ft.y += ft.vy * dt;
          ft.vy *= 0.97;
          if (ft.life <= 0) {
            state.floatingTexts.splice(i, 1);
          }
        }

        for (let i = state.sparkles.length - 1; i >= 0; i -= 1) {
          const s = state.sparkles[i];
          s.life -= dt;
          if (s.life <= 0) {
            state.sparkles.splice(i, 1);
          }
        }

        state.screenFlash.alpha = Math.max(0, state.screenFlash.alpha - dt * 1.2);

        state.clouds.forEach((cloud) => {
          cloud.x += cloud.speed * dt;
          if (cloud.x > WIDTH + 150) {
            cloud.x = -150;
            cloud.y = random(20, 140);
            cloud.speed = random(8, 22);
          }
        });

        for (let i = state.bubbles.length - 1; i >= 0; i -= 1) {
          const bubble = state.bubbles[i];
          bubble.life -= dt;
          bubble.x += bubble.vx * dt;
          bubble.y += bubble.vy * dt;
          bubble.vy -= 6 * dt;
          bubble.r *= 0.993;
          if (bubble.life <= 0 || bubble.r < 1.5) {
            state.bubbles.splice(i, 1);
          }
        }
      }

      function updateGator(dt) {
        const g = state.gator;

        if (g.timer > 0) {
          g.timer = Math.max(0, g.timer - dt);
          if (g.timer <= 0) {
            g.emotion = "idle";
            g.dir = 0;
            g.targetDirection = 0;
            g.shakeOffset = 0;
          }
        }

        const turnLerp = clamp(dt * 9, 0, 1);
        g.headDirection += (g.targetDirection - g.headDirection) * turnLerp;
        if (Math.abs(g.targetDirection) < 0.001 && Math.abs(g.headDirection) < 0.001) {
          g.headDirection = 0;
        }
        if (g.headDirection > 0.22) {
          g.faceSign = 1;
        } else if (g.headDirection < -0.22) {
          g.faceSign = -1;
        }
        const nodTarget = g.emotion === "equal" ? Math.sin(state.time * 9) * 0.12 : 0;
        g.headNod += (nodTarget - g.headNod) * clamp(dt * 10, 0, 1);

        g.blinkCooldown -= dt;
        if (g.blinkCooldown <= 0 && g.blinkTimer <= 0) {
          g.blinkTimer = random(0.09, 0.15);
          g.blinkCooldown = random(1.8, 4.1);
        }
        if (g.blinkTimer > 0) {
          g.blinkTimer = Math.max(0, g.blinkTimer - dt);
        }
      }

      function updateBackground(dt) {
        const d = state.dragonfly;
        d.x += d.speed * dt;
        d.bobPhase += dt * 2.1;
        d.wingPhase += dt * 18;

        if (d.x > WIDTH + 80) {
          d.x = -80;
          d.y = random(88, 174);
          d.speed = random(62, 92);
        }
      }

      function update(dt) {
        state.time += dt;

        if (state.queuedRoundAt > 0 && state.time >= state.queuedRoundAt) {
          state.queuedRoundAt = 0;
          setButtonsDisabled(false);
          setFeedback("Tap the correct sign.", "neutral");
          createRound();
        }

        updateBackground(dt);
        updateGator(dt);
        updateParticles(dt);
        state.cardPulse.left = Math.max(0, state.cardPulse.left - dt * 2.8);
        state.cardPulse.right = Math.max(0, state.cardPulse.right - dt * 2.8);
        state.rewardBanner.timer = Math.max(0, state.rewardBanner.timer - dt);
      }

      function toggleSound() {
        state.audioEnabled = !state.audioEnabled;
        soundBtn.textContent = "Sound: " + (state.audioEnabled ? "On" : "Off");

        if (audio.master) {
          audio.master.gain.value = state.audioEnabled ? 0.22 : 0;
        }

        if (state.audioEnabled) {
          resumeAudioIfNeeded();
          playTone(420, 0.09, "triangle", 0.09, 560);
        }
      }

      function resetScoreboard() {
        state.score = 0;
        state.streak = 0;
        state.bestStreak = 0;
        state.comboLevel = 0;
        state.queuedRoundAt = 0;
        state.particles = [];
        state.confetti = [];
        state.floatingTexts = [];
        state.sparkles = [];
        state.bubbles = [];
        state.rewardBanner.text = "";
        state.rewardBanner.timer = 0;
        state.cardPulse.left = 0;
        state.cardPulse.right = 0;
        state.gator.emotion = "idle";
        state.gator.timer = 0;
        state.gator.targetDirection = 0;
        state.gator.headDirection = 0;
        state.gator.shakeOffset = 0;
        state.gator.headNod = 0;
        state.gator.faceSign = 1;
        updateHud();
        renderShop();
        saveProgress();
        setButtonsDisabled(false);
        createRound();
        setFeedback("Round stats reset. Coins and swamp upgrades saved.", "neutral");
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {
            // Ignore browser restrictions.
          });
        } else {
          document.exitFullscreen().catch(() => {
            // Ignore browser restrictions.
          });
        }
      }

      symbolButtons.forEach((button) => {
        button.addEventListener("click", () => {
          submitAnswer(button.dataset.symbol || "");
        });

        button.addEventListener("pointerdown", () => {
          resumeAudioIfNeeded();
        }, { passive: true });
      });

      levelSelect.addEventListener("change", () => {
        state.level = Number(levelSelect.value);
        state.queuedRoundAt = 0;
        state.rewardBanner.text = "";
        state.rewardBanner.timer = 0;
        state.gator.emotion = "idle";
        state.gator.timer = 0;
        state.gator.targetDirection = 0;
        state.gator.headDirection = 0;
        state.gator.faceSign = 1;
        setButtonsDisabled(false);
        createRound();
        setFeedback("Level changed. Try this one.", "neutral");
      });

      modeSelect.addEventListener("change", () => {
        state.mode = String(modeSelect.value || "numerals").toLowerCase();
        if (!["numerals", "fish", "mixed"].includes(state.mode)) {
          state.mode = "numerals";
        }
        state.queuedRoundAt = 0;
        state.rewardBanner.text = "";
        state.rewardBanner.timer = 0;
        state.cardPulse.left = 0;
        state.cardPulse.right = 0;
        setButtonsDisabled(false);
        createRound();
        const modeLabel = state.mode.charAt(0).toUpperCase() + state.mode.slice(1);
        setFeedback("Mode changed: " + modeLabel + ".", "neutral");
      });

      shopBtn.addEventListener("click", () => {
        setShopOpen(!state.shopOpen);
        renderShop();
      });

      shopGrid.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const itemId = target.dataset.itemId || "";
        const action = target.dataset.action || "";
        if (!itemId || !action) return;

        if (action === "buy") {
          buyShopItem(itemId);
        } else if (action === "equip" || action === "unequip") {
          toggleShopEquip(itemId);
        }
      });

      soundBtn.addEventListener("click", toggleSound);
      resetBtn.addEventListener("click", resetScoreboard);
      fullscreenBtn.addEventListener("click", toggleFullscreen);

      window.addEventListener("keydown", (event) => {
        const key = String(event.key || "");
        const lower = key.toLowerCase();

        if (lower === "f") {
          event.preventDefault();
          toggleFullscreen();
          return;
        }

        if (lower === "m") {
          event.preventDefault();
          toggleSound();
          return;
        }

        if (lower === "b") {
          event.preventDefault();
          setShopOpen(!state.shopOpen);
          renderShop();
          return;
        }

        if (key === "<" || key === ",") {
          event.preventDefault();
          submitAnswer("<");
          return;
        }

        if (key === ">" || key === ".") {
          event.preventDefault();
          submitAnswer(">");
          return;
        }

        if (key === "=") {
          event.preventDefault();
          submitAnswer("=");
        }
      });

      window.addEventListener("pointerdown", () => {
        resumeAudioIfNeeded();
      }, { passive: true });

      window.addEventListener("touchstart", () => {
        resumeAudioIfNeeded();
      }, { passive: true });

      function renderGameToText() {
        const payload = {
          scene: "playing",
          coordinateSystem: "origin top-left; +x right; +y down; canvas 1280x720",
          level: state.level,
          mode: state.mode,
          score: state.score,
          streak: state.streak,
          bestStreak: state.bestStreak,
          coins: state.coins,
          fishEaten: state.fishEaten,
          feedback: state.feedback,
          feedbackTone: state.feedbackTone,
          round: state.round
            ? {
              left: state.round.left,
              right: state.round.right,
              answer: state.round.answer,
              leftRepresentation: state.round.leftRepresentation,
              rightRepresentation: state.round.rightRepresentation,
              leftPosition: leftNumberPos,
              rightPosition: rightNumberPos,
              gatorPosition: gatorPos,
              awaitingNextRound: state.queuedRoundAt > 0
            }
            : null,
          gator: {
            emotion: state.gator.emotion,
            direction: state.gator.dir,
            headDirection: Number(state.gator.headDirection.toFixed(3)),
            targetDirection: state.gator.targetDirection,
            facing: state.gator.faceSign < 0 ? "left" : "right",
            blinkClosed: state.gator.blinkTimer > 0
          },
          controls: {
            symbolsEnabled: state.queuedRoundAt <= 0,
            soundEnabled: state.audioEnabled,
            mode: state.mode
          },
          particles: {
            stars: state.particles.length,
            confetti: state.confetti.length,
            sparkles: state.sparkles.length,
            floatingTexts: state.floatingTexts.length,
            bubbles: state.bubbles.length
          },
          rewardBanner: {
            text: state.rewardBanner.text,
            timer: Number(state.rewardBanner.timer.toFixed(3))
          },
          shop: {
            open: state.shopOpen,
            unlocked: SHOP_ITEMS.filter((item) => state.decorUnlocked[item.id]).map((item) => item.id),
            equipped: SHOP_ITEMS.filter((item) => state.decorEquipped[item.id]).map((item) => item.id)
          }
        };
        return JSON.stringify(payload);
      }

      function advanceTime(ms) {
        const totalSeconds = Math.max(0, Number(ms) || 0) / 1000;
        const steps = Math.max(1, Math.round(totalSeconds / FIXED_DT));
        for (let i = 0; i < steps; i += 1) {
          update(FIXED_DT);
        }
        render();
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = advanceTime;

      initializeBackground();
      loadProgress();
      setShopOpen(false);
      renderShop();
      createRound();
      updateHud();
      setFeedback("Tap the correct sign.", "neutral");

      let accumulator = 0;
      let previous = performance.now();

      function frame(now) {
        const delta = Math.min(0.05, (now - previous) / 1000);
        previous = now;
        accumulator += delta;

        while (accumulator >= FIXED_DT) {
          update(FIXED_DT);
          accumulator -= FIXED_DT;
        }

        render();
        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
