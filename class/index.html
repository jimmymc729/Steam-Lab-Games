<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Class Launch | STEAM Lab Games</title>
  <meta name="description" content="Projector-friendly class launch with QR code for STEAM Lab Games." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="class.css" />
</head>
<body>
  <main class="launch">
    <header class="launch-head">
      <a class="back-link" href="../index.html">Back to Portal</a>
      <p id="modeBadge" class="mode-badge">CLASS LAUNCH</p>
    </header>

    <div class="short-link-bar" aria-label="Student Link">
      <span class="short-link-label">Type this link:</span>
      <span id="shortLink" class="short-link-url"></span>
    </div>

    <div class="split-panel">
      <section class="info-panel" aria-label="Experiment Info">
        <div id="previewThumb" class="preview-thumb"></div>
        <h1 id="gameTitle">STEAM Lab Experiment</h1>
        <p id="gameDescription" class="game-description"></p>
        <div id="gameTags" class="game-tags"></div>
        <div class="controls">
          <button id="copyBtn" class="btn primary" type="button">Copy Link</button>
          <a id="openBtn" class="btn secondary" href="#" target="_blank" rel="noopener">Open Game</a>
        </div>
      </section>

      <section class="qr-panel" aria-label="Class QR Code">
        <p id="joinPrompt" class="join-prompt">Scan with your device</p>
        <div class="qr-shell">
          <div id="qrCode" class="qr-code" aria-label="QR Code"></div>
        </div>
        <button id="fullscreenBtn" class="btn secondary btn-sm" type="button">Fullscreen (F)</button>
      </section>
    </div>

    <p id="statusText" class="status" role="status" aria-live="polite"></p>

    <footer class="shortcuts">
      <span>F = fullscreen &middot; C = copy link &middot; Esc = exit fullscreen</span>
    </footer>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="class.js"></script>
</body>
</html>
