      function spawnParticles(x, y, kind, count) {
        for (let i = 0; i < count; i += 1) {
          const angle = kind === "splash"
            ? rand(-Math.PI * 0.95, -Math.PI * 0.1)
            : rand(0, Math.PI * 2);
          const speed = kind === "smoke"
            ? rand(18, 84)
            : kind === "debris"
              ? rand(130, 330)
              : kind === "splash"
                ? rand(90, 260)
                : kind === "ember"
                  ? rand(80, 240)
                : rand(90, 320);
          const life = kind === "smoke"
            ? rand(0.35, 0.8)
            : kind === "debris"
              ? rand(0.42, 0.78)
              : kind === "splash"
                ? rand(0.35, 0.65)
                : kind === "ember"
                  ? rand(0.32, 0.62)
                : rand(0.45, 0.95);
          const size = kind === "smoke"
            ? rand(8, 24)
            : kind === "debris"
              ? rand(4, 11)
              : kind === "splash"
                ? rand(3, 8)
                : kind === "ember"
                  ? rand(2, 6)
                : rand(3, 8);
          const color = kind === "smoke"
            ? "rgba(112, 124, 143, 0.55)"
            : kind === "debris"
              ? pick(["#8b5a2b", "#6d3f1a", "#5a3112", "#d39f52"])
              : kind === "splash"
                ? pick(["#9be8ff", "#d6f8ff", "#72d4ff"])
                : kind === "ember"
                  ? pick(["#ffdf6c", "#ffad4f", "#ff6b3d", "#ffe8a6"])
                : pick(["#ffe36c", "#ff8fb0", "#6de0ff", "#b8ff90", "#ffffff"]);
          const gravity = kind === "smoke"
            ? -14
            : kind === "debris"
              ? 360
              : kind === "splash"
                ? 290
                : kind === "ember"
                  ? 120
                : 170;
          const drag = kind === "smoke" ? 0.97 : 0.99;

          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - (kind === "smoke" ? 12 : 42),
            life,
            size,
            kind,
            color,
            gravity,
            drag,
            spin: rand(-3.2, 3.2),
            angle: rand(0, Math.PI * 2),
            maxSize: kind === "shockwave" ? rand(80, 150) : null
          });
        }
      }

      function createLightningPath(x1, y1, x2, y2, segments, jitter) {
        const pts = [];
        const dx = x2 - x1;
        const dy = y2 - y1;
        const dist = Math.hypot(dx, dy) || 1;
        const nx = -dy / dist;
        const ny = dx / dist;
        const count = Math.max(3, segments);
        for (let i = 0; i <= count; i += 1) {
          const t = i / count;
          const fade = 1 - Math.abs(0.5 - t) * 1.8;
          const side = i === 0 || i === count ? 0 : rand(-jitter, jitter) * fade;
          pts.push({
            x: x1 + dx * t + nx * side,
            y: y1 + dy * t + ny * side
          });
        }
        return pts;
      }

      function spawnLightningBolt(x1, y1, x2, y2, width, life, color) {
        const dist = Math.hypot(x2 - x1, y2 - y1);
        const points = createLightningPath(x1, y1, x2, y2, Math.round(dist / 36), Math.max(6, dist * 0.11));
        state.lightningBolts.push({
          points,
          life: life || 0.2,
          maxLife: life || 0.2,
          width: width || 2.2,
          color: color || "rgba(168, 241, 255, 0.95)"
        });
      }

      function spawnShipShards(target) {
        const theme = palette[target.themeIndex % palette.length];
        const baseX = target.x;
        const baseY = target.y;
        const hullColors = ["#8b5a2b", "#7a4d21", "#5e3a18", "#d39f52"];
        const sailColors = [theme.base, theme.rim, "#fffaf0", "#f6ead1"];

        for (let i = 0; i < 30; i += 1) {
          const angle = rand(-Math.PI * 0.96, -Math.PI * 0.04);
          const speed = rand(140, 340);
          state.particles.push({
            x: baseX + rand(-target.radius * 0.55, target.radius * 0.55),
            y: baseY + rand(-target.radius * 0.05, target.radius * 0.36),
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 26,
            life: rand(0.46, 0.92),
            size: rand(7, 17),
            kind: "shipShard",
            shardType: "hull",
            color: pick(hullColors),
            gravity: 420,
            drag: 0.985,
            spin: rand(0, Math.PI * 2),
            angularVelocity: rand(-12, 12),
            angle: 0,
            maxSize: null
          });
        }

        for (let i = 0; i < 24; i += 1) {
          const angle = rand(-Math.PI * 0.98, -Math.PI * 0.02);
          const speed = rand(150, 360);
          state.particles.push({
            x: baseX + rand(-target.radius * 0.2, target.radius * 0.95),
            y: baseY - rand(target.radius * 0.38, target.radius * 1.2),
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 12,
            life: rand(0.4, 0.86),
            size: rand(8, 20),
            kind: "shipShard",
            shardType: "sail",
            color: pick(sailColors),
            gravity: 320,
            drag: 0.987,
            spin: rand(0, Math.PI * 2),
            angularVelocity: rand(-10, 10),
            angle: 0,
            maxSize: null
          });
        }

        for (let i = 0; i < 8; i += 1) {
          const angle = rand(-Math.PI * 0.98, -Math.PI * 0.1);
          const speed = rand(120, 270);
          state.particles.push({
            x: baseX + rand(-target.radius * 0.12, target.radius * 0.45),
            y: baseY - rand(target.radius * 0.8, target.radius * 1.35),
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: rand(0.34, 0.7),
            size: rand(5, 11),
            kind: "shipShard",
            shardType: "flag",
            color: pick(["#111827", "#132235", "#1f2937"]),
            gravity: 280,
            drag: 0.988,
            spin: rand(0, Math.PI * 2),
            angularVelocity: rand(-14, 14),
            angle: 0,
            maxSize: null
          });
        }
      }

      function spawnCorrectExplosion(target) {
        const blastX = target.x;
        const blastY = target.y - target.radius * 0.05;
        const cannonSkin = equippedStyle("cannonSkin", "default");
        const lightning = isBonusEquipped("lightning");
        spawnShipShards(target);
        spawnParticles(blastX, blastY, "star", 58);
        spawnParticles(blastX, blastY + target.radius * 0.12, "debris", 34);
        spawnParticles(blastX, blastY + target.radius * 0.18, "splash", 34);
        spawnParticles(blastX, blastY + target.radius * 0.05, "smoke", 24);
        if (cannonSkin === "dragon") {
          spawnParticles(blastX, blastY - 8, "ember", 46);
        } else if (cannonSkin === "storm") {
          spawnParticles(blastX, blastY - 2, "sparkle", 28);
        } else if (cannonSkin === "royal") {
          spawnParticles(blastX, blastY - 10, "sparkle", 54);
          spawnParticles(blastX, blastY - 6, "splash", 24);
        }
        if (lightning) {
          spawnParticles(blastX, blastY - 2, "sparkle", 40);
          spawnParticles(blastX, blastY - 8, "splash", 16);
          for (let i = 0; i < 4; i += 1) {
            const angle = rand(0, Math.PI * 2);
            const len = rand(target.radius * 0.8, target.radius * 1.45);
            spawnLightningBolt(
              blastX,
              blastY,
              blastX + Math.cos(angle) * len,
              blastY + Math.sin(angle) * len,
              1.4,
              0.14,
              "rgba(177, 245, 255, 0.9)"
            );
          }
        }

        state.particles.push({
          x: blastX,
          y: blastY,
          vx: 0,
          vy: 0,
          life: 0.46,
          size: target.radius * 0.3,
          maxSize: target.radius * 2.5,
          kind: "shockwave",
          color: "rgba(255, 233, 168, 0.9)",
          gravity: 0,
          drag: 1,
          spin: 0,
          angle: 0
        });

        state.flashAlpha = Math.max(state.flashAlpha, lightning ? 0.58 : cannonSkin === "royal" ? 0.44 : 0.38);
        state.screenShake = Math.max(state.screenShake, lightning ? 27 : cannonSkin === "royal" ? 20 : 16);
        state.shotPulse = Math.max(state.shotPulse, lightning ? 0.76 : 0.58);
      }

      function triggerChainLightning(primaryTarget) {
        if (!isBonusEquipped("lightning")) return 0;
        const sourceX = primaryTarget.x;
        const sourceY = primaryTarget.y - primaryTarget.radius * 0.2;
        const candidates = state.targets
          .filter((target) => target.id !== primaryTarget.id && !target.isCorrect && target.state !== "sunk")
          .sort((a, b) => {
            const da = Math.hypot(a.x - sourceX, a.y - sourceY);
            const db = Math.hypot(b.x - sourceX, b.y - sourceY);
            return da - db;
          })
          .slice(0, 2);

        if (candidates.length === 0) {
          const skyX = sourceX + rand(-140, 140);
          const skyY = sourceY - rand(100, 160);
          spawnLightningBolt(sourceX, sourceY, skyX, skyY, 2.2, 0.2, "rgba(177, 246, 255, 0.94)");
          playLightningChainSound(1);
          return 0;
        }

        let lastX = sourceX;
        let lastY = sourceY;
        for (let i = 0; i < candidates.length; i += 1) {
          const target = candidates[i];
          const tx = target.x;
          const ty = target.y - target.radius * 0.22;
          spawnLightningBolt(lastX, lastY, tx, ty, 2.7, 0.24, "rgba(178, 247, 255, 0.96)");
          spawnLightningBolt(
            lastX + rand(-8, 8),
            lastY + rand(-6, 6),
            tx + rand(-18, 18),
            ty + rand(-18, 18),
            1.6,
            0.16,
            "rgba(130, 230, 255, 0.86)"
          );
          spawnParticles(tx, ty, "sparkle", 26);
          spawnParticles(tx, ty + target.radius * 0.12, "smoke", 10);
          target.state = "exploding";
          target.explodeTimer = 0.42;
          target.scale = 1;
          target.wobbleTimer = 0;
          lastX = tx;
          lastY = ty;
        }

        awardCoins(candidates.length, "", sourceX + 38, sourceY - 24, "#7fd6ff");
        state.popups.push({
          text: "CHAIN x" + candidates.length,
          x: sourceX,
          y: sourceY - 64,
          life: 0.85,
          color: "#6ec8ff"
        });
        state.flashAlpha = Math.max(state.flashAlpha, 0.64);
        state.screenShake = Math.max(state.screenShake, 30);
        state.shotPulse = Math.max(state.shotPulse, 0.9);
        playLightningChainSound(candidates.length);
        return candidates.length;
      }

      function targetById(id) {
        return state.targets.find((target) => target.id === id) || null;
      }

      function impactTarget(target) {
        state.projectile = null;

        if (target.isCorrect) {
          target.state = "exploding";
          target.scale = 1;
          target.resolvedCorrect = true;
          target.explodeTimer = 0.94;
          state.score += 1;
          state.streak += 1;
          state.bestStreak = Math.max(state.bestStreak, state.streak);
          state.totalCorrect += 1;
          state.modeCorrect[state.mathMode] = (state.modeCorrect[state.mathMode] || 0) + 1;
          let coinGain = 1;
          const streakBonus = coinBonusForStreak(state.streak);
          if (streakBonus > 0) coinGain += streakBonus;
          if (isBonusEquipped("lucky") && !state.roundLuckyUsed) {
            coinGain += 1;
            state.roundLuckyUsed = true;
          }
          awardCoins(
            coinGain,
            "",
            target.x,
            target.y - target.radius - 46,
            "#d08a1f"
          );
          state.resolving = true;
          state.resolveTimer = 0.94;
          state.roundSolved = true;
          state.message = pick([
            "Treasure blast!",
            "Aye! Massive hit!",
            "Direct hit, captain!",
            "Boom! Nailed it!"
          ]);
          playCorrectSound();
          let chainCount = 0;
          if (isBonusEquipped("lightning")) {
            playSweepTone(1200, 220, 0.18, "triangle", 0.11, 0);
            playNoiseBurst(0.08, 0.09, 6500, 1800, 0.01);
            state.message = "Chain lightning strike!";
          }
          spawnCorrectExplosion(target);
          chainCount = triggerChainLightning(target);

          if (state.streak > 0 && state.streak % 5 === 0) {
            state.message = state.streak + " streak! Treasure shower!";
            spawnParticles(state.width * 0.3, state.height * 0.2, "star", 24);
            spawnParticles(state.width * 0.7, state.height * 0.22, "star", 24);
          } else if (streakBonus > 0) {
            state.message = state.streak + " streak! +" + streakBonus + " bonus coins!";
          }
          if (isBonusEquipped("lightning")) {
            state.message = chainCount > 0
              ? "Chain lightning x" + chainCount + "!"
              : "Chain lightning strike!";
          }

          state.popups.push({
            text: "BOOM +1",
            x: target.x,
            y: target.y - target.radius - 16,
            life: 0.9,
            color: "#d85e29"
          });
        } else {
          target.state = "wrong";
          target.wobbleTimer = 0.52;
          state.streak = 0;
          state.roundSolved = false;
          state.resolving = true;
          state.resolveTimer = 0.56;
          state.message = pick([
            "Almost, matey!",
            "Not that barrel. Try again!",
            "Puff! Fire another shot."
          ]);
          playWrongSound();
          spawnParticles(target.x, target.y, "smoke", 14);
        }

        saveProgress();
        syncHud();
      }

      function fireAtTarget(target) {
        if (!target || state.mode !== "playing" || state.resolving || state.projectile) {
          return;
        }
        if (target.state !== "idle") return;

        const origin = getCannonOrigin();
        const cannonX = origin.x;
        const cannonY = origin.y;
        const dx = target.x - cannonX;
        const dy = target.y - cannonY;
        state.cannonAngle = Math.atan2(dy, dx);
        state.cannonRecoil = 1;

        state.projectile = {
          x: cannonX + Math.cos(state.cannonAngle) * 94,
          y: cannonY + Math.sin(state.cannonAngle) * 94,
          targetId: target.id,
          speed: isBonusEquipped("lightning") ? 1220 : equippedStyle("cannonSkin", "default") === "royal" ? 1100 : 1040
        };

        state.shotPulse = 1;
        state.resolving = true;
        state.message = "Broadside!";
        playShootSound();
      }

      function pointHitsTarget(target, x, y) {
        const dx = x - target.x;
        const dy = y - (target.y - target.radius * 0.25);
        const rx = target.radius * 1.38;
        const ry = target.radius * 1.14;
        const hitNorm = (dx * dx) / (rx * rx) + (dy * dy) / (ry * ry);
        return hitNorm <= 1;
      }

      function getCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const clientX = event.clientX;
        const clientY = event.clientY;

        return {
          x: ((clientX - rect.left) / rect.width) * state.width,
          y: ((clientY - rect.top) / rect.height) * state.height
        };
      }

      function handlePortPointer(point) {
        for (let i = state.portUiRegions.length - 1; i >= 0; i -= 1) {
          const region = state.portUiRegions[i];
          if (
            point.x < region.x ||
            point.x > region.x + region.w ||
            point.y < region.y ||
            point.y > region.y + region.h
          ) {
            continue;
          }

          if (region.type === "continue") {
            leavePort();
            return true;
          }

          if (region.type === "item") {
            const result = buyOrEquipItem(region.itemId);
            if (result.ok) {
              if (result.action === "bought") {
                state.message = (result.item.rarity || "Rare") + " unlocked: " + result.item.name + "!";
                state.popups.push({
                  text: "UNLOCKED!",
                  x: state.width * 0.5,
                  y: state.height * 0.18,
                  life: 0.9,
                  color: rarityColor(result.item.rarity || "Rare")
                });
              } else {
                state.message = "Equipped: " + result.item.name;
              }
            } else if (result.reason === "coins" && result.item) {
              state.message = "Need " + (result.item.cost - state.coins) + " more coins for " + result.item.name;
            }
            syncHud();
            return true;
          }
        }
        return false;
      }

      function onPointerDown(event) {
        const point = getCanvasPoint(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        state.pointer.active = true;

        ensureAudio();

        if (state.mode === "port") {
          handlePortPointer(point);
          return;
        }

        if (state.mode === "menu") {
          startRun();
          return;
        }

        if (state.mode !== "playing") return;
        if (state.resolving && !state.projectile) return;

        let chosen = null;
        for (const target of state.targets) {
          if (target.state !== "idle") continue;
          if (pointHitsTarget(target, point.x, point.y)) {
            chosen = target;
            break;
          }
        }

        if (chosen) fireAtTarget(chosen);
      }

      function onPointerMove(event) {
        const point = getCanvasPoint(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        state.pointer.active = true;
      }

      function onPointerLeave() {
        state.pointer.active = false;
      }

      function setFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen().catch(() => {});
        }
      }

      function toggleSound() {
        state.soundEnabled = !state.soundEnabled;
        if (state.soundEnabled) {
          ensureAudio();
          if (state.audioContext && state.musicState) {
            state.musicState.nextTime = state.audioContext.currentTime + 0.08;
          }
        }
        syncHud();
      }

      function updateTargets(dt) {
        for (const target of state.targets) {
          if (target.state === "sunk") continue;
          const wobble = target.wobbleTimer > 0 ? Math.sin(state.time * 60) * 12 : 0;
          const floatX = Math.sin(state.time * target.floatSpeed + target.phase) * 12;
          const floatY = Math.sin(state.time * 1.3 + target.phase * 1.8) * 4;

          target.x = target.anchorX + floatX + wobble;
          target.y = target.anchorY + floatY;
          target.sparklePulse += dt * 2.5;

          if (target.state === "exploding") {
            target.explodeTimer = Math.max(0, target.explodeTimer - dt);
          } else {
            target.scale += (1 - target.scale) * Math.min(1, dt * 12);
          }

          if (target.wobbleTimer > 0) {
            target.wobbleTimer = Math.max(0, target.wobbleTimer - dt);
            if (target.wobbleTimer === 0 && target.state === "wrong") {
              target.state = "idle";
            }
          }
        }
      }

      function updateProjectile(dt) {
        if (!state.projectile) return;

        const target = targetById(state.projectile.targetId);
        if (!target) {
          state.projectile = null;
          state.resolving = false;
          return;
        }

        const dx = target.x - state.projectile.x;
        const dy = target.y - state.projectile.y;
        const dist = Math.hypot(dx, dy);

        if (dist <= state.projectile.speed * dt + target.radius * 0.22) {
          state.projectile.x = target.x;
          state.projectile.y = target.y;
          impactTarget(target);
          return;
        }

        const nx = dx / Math.max(0.001, dist);
        const ny = dy / Math.max(0.001, dist);
        state.projectile.x += nx * state.projectile.speed * dt;
        state.projectile.y += ny * state.projectile.speed * dt;

        if (isBonusEquipped("lightning")) {
          const arcLen = rand(18, 36);
          const arcAngle = rand(0, Math.PI * 2);
          const lx = state.projectile.x + Math.cos(arcAngle) * arcLen;
          const ly = state.projectile.y + Math.sin(arcAngle) * arcLen;
          spawnLightningBolt(
            state.projectile.x,
            state.projectile.y,
            lx,
            ly,
            1.2,
            0.08,
            "rgba(152, 236, 255, 0.8)"
          );
          if (Math.random() < 0.22) {
            playNoiseBurst(0.018, 0.018, 7200, 2400, 0);
          }
        }

        for (let i = 0; i < 2; i += 1) {
          state.particles.push({
            x: state.projectile.x + rand(-2, 2),
            y: state.projectile.y + rand(-2, 2),
            vx: rand(-26, 26),
            vy: rand(-24, 24),
            life: rand(0.1, 0.25),
            size: rand(2, 4),
            kind: "sparkle",
            color: pick(["#ffffff", "#fef08a", "#c4f5ff"]),
            spin: rand(-5, 5)
          });
        }
      }

      function updateParticles(dt) {
        for (let i = state.particles.length - 1; i >= 0; i -= 1) {
          const p = state.particles[i];
          p.life -= dt;
          if (p.life <= 0) {
            state.particles.splice(i, 1);
            continue;
          }

          if (p.kind === "shockwave") {
            p.size += (p.maxSize - p.size) * Math.min(1, dt * 12);
            continue;
          }

          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += (p.gravity || 170) * dt;
          p.vx *= p.drag || 0.99;
          if (typeof p.angularVelocity === "number") {
            p.spin += dt * p.angularVelocity;
          } else {
            p.spin += dt * (p.kind === "debris" ? 7 : 1.2);
          }
        }
      }

      function updateLightningBolts(dt) {
        for (let i = state.lightningBolts.length - 1; i >= 0; i -= 1) {
          const bolt = state.lightningBolts[i];
          bolt.life -= dt;
          if (bolt.life <= 0) {
            state.lightningBolts.splice(i, 1);
          }
        }
      }

      function updatePopups(dt) {
        for (let i = state.popups.length - 1; i >= 0; i -= 1) {
          const popup = state.popups[i];
          popup.life -= dt;
          popup.y -= dt * 36;
          if (popup.life <= 0) {
            state.popups.splice(i, 1);
          }
        }
      }

      function updateSky(dt) {
        state.wavePhase += dt * 1.2;

        for (const cloud of state.clouds) {
          cloud.x += cloud.speed * dt;
          if (cloud.x > state.width + 170) {
            cloud.x = -170;
            cloud.y = rand(30, state.height * 0.42);
            cloud.scale = rand(0.62, 1.36);
            cloud.speed = rand(10, 28);
          }
        }

        for (const ship of state.ships) {
          ship.x += ship.speed * dt;
          ship.bob += dt * 1.6;
          if (ship.x > state.width + 220) {
            ship.x = -220;
            ship.y = rand(state.height * 0.61, state.height * 0.76);
            ship.scale = rand(0.72, 1.18);
            ship.speed = rand(10, 26);
          }
        }
      }

      function updateGame(dt) {
        state.time += dt;
        state.cannonRecoil = Math.max(0, state.cannonRecoil - dt * 5.2);
        state.shotPulse = Math.max(0, state.shotPulse - dt * 6.4);
        state.screenShake = Math.max(0, state.screenShake - dt * 45);
        state.flashAlpha = Math.max(0, state.flashAlpha - dt * 2.5);
        updateCannonAim(dt);

        updateSky(dt);
        updateAmbienceAudio(dt);
        scheduleMusicLoop();
        updateMonkeyChatter(dt);

        if (state.mode !== "playing") {
          updateParticles(dt);
          updateLightningBolts(dt);
          updatePopups(dt);
          syncHud();
          return;
        }

        updateTargets(dt);
        updateProjectile(dt);
        updateParticles(dt);
        updateLightningBolts(dt);
        updatePopups(dt);

        if (state.projectile) {
          state.resolving = true;
        }

        if (state.resolving && !state.projectile) {
          state.resolveTimer = Math.max(0, state.resolveTimer - dt);
          if (state.resolveTimer === 0) {
            const solved = state.targets.some((target) => target.resolvedCorrect) || state.roundSolved;
            if (solved) {
              nextRound();
            } else {
              state.resolving = false;
              state.message = "Try again, captain - fire at the right ship";
            }
          }
        }

        syncHud();
      }

      function drawCloud(x, y, scale, alpha) {
        const s = scale;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(s, s);
        ctx.globalAlpha = alpha * 0.36;
        ctx.fillStyle = "#5f8fb4";
        ctx.beginPath();
        ctx.ellipse(-30, 8, 30, 14, 0, 0, Math.PI * 2);
        ctx.ellipse(2, 6, 34, 16, 0, 0, Math.PI * 2);
        ctx.ellipse(36, 10, 24, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = alpha;
        const cloudGrad = ctx.createLinearGradient(0, -24, 0, 20);
        cloudGrad.addColorStop(0, "#ffffff");
        cloudGrad.addColorStop(1, "#d8ecf9");
        ctx.fillStyle = cloudGrad;
        ctx.beginPath();
        ctx.ellipse(-36, 0, 30, 18, 0, 0, Math.PI * 2);
        ctx.ellipse(-12, -8, 28, 20, 0, 0, Math.PI * 2);
        ctx.ellipse(18, -4, 34, 22, 0, 0, Math.PI * 2);
        ctx.ellipse(44, 4, 24, 16, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawShip(ship) {
        const bob = Math.sin(ship.bob) * 3;
        ctx.save();
        ctx.translate(ship.x, ship.y + bob);
        ctx.scale(ship.scale, ship.scale);

        const hullGrad = ctx.createLinearGradient(-60, -4, 62, 30);
        hullGrad.addColorStop(0, "#8f5c2a");
        hullGrad.addColorStop(1, "#5f3918");
        ctx.fillStyle = hullGrad;
        ctx.beginPath();
        ctx.moveTo(-60, 8);
        ctx.quadraticCurveTo(-8, 28, 64, 6);
        ctx.quadraticCurveTo(6, 40, -54, 20);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath();
        ctx.ellipse(0, 42, 52, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#5e3a18";
        ctx.fillRect(-8, -42, 5, 54);
        ctx.fillRect(12, -30, 4, 40);

        const sailGrad = ctx.createLinearGradient(-6, -38, 30, -6);
        sailGrad.addColorStop(0, "#fffaf0");
        sailGrad.addColorStop(1, "#e8dcc1");
        ctx.fillStyle = sailGrad;
        ctx.beginPath();
        ctx.moveTo(-3, -38);
        ctx.lineTo(-3, -6);
        ctx.lineTo(30, -20);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(14, -28);
        ctx.lineTo(14, -4);
        ctx.lineTo(38, -14);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(15, 42, 70, 0.28)";
        ctx.lineWidth = 1.3;
        ctx.stroke();

        ctx.fillStyle = "#1c1f30";
        ctx.beginPath();
        ctx.arc(26, -17, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(24.5, -19.5, 3, 5);
        ctx.fillRect(23.5, -18.5, 5, 3);

        ctx.restore();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, state.height);
        gradient.addColorStop(0, "#6ec6f4");
        gradient.addColorStop(0.46, "#9fe0ff");
        gradient.addColorStop(1, "#f6e6b4");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, state.width, state.height);

        const hazeGrad = ctx.createLinearGradient(0, state.height * 0.38, 0, state.height * 0.68);
        hazeGrad.addColorStop(0, "rgba(255, 246, 219, 0)");
        hazeGrad.addColorStop(1, "rgba(255, 246, 219, 0.44)");
        ctx.fillStyle = hazeGrad;
        ctx.fillRect(0, state.height * 0.36, state.width, state.height * 0.4);

        ctx.save();
        ctx.translate(state.width * 0.14, state.height * 0.16);
        ctx.fillStyle = "rgba(255, 217, 107, 0.98)";
        ctx.beginPath();
        ctx.arc(0, 0, state.height * 0.08, 0, Math.PI * 2);
        ctx.fill();

        const sunGlow = ctx.createRadialGradient(0, 0, state.height * 0.03, 0, 0, state.height * 0.2);
        sunGlow.addColorStop(0, "rgba(255, 240, 179, 0.45)");
        sunGlow.addColorStop(1, "rgba(255, 240, 179, 0)");
        ctx.fillStyle = sunGlow;
        ctx.beginPath();
        ctx.arc(0, 0, state.height * 0.21, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        const horizonY = state.height * 0.57;
        const horizonGlow = ctx.createLinearGradient(0, horizonY - state.height * 0.12, 0, horizonY + state.height * 0.04);
        horizonGlow.addColorStop(0, "rgba(255, 247, 219, 0)");
        horizonGlow.addColorStop(0.55, "rgba(255, 247, 219, 0.34)");
        horizonGlow.addColorStop(1, "rgba(255, 247, 219, 0)");
        ctx.fillStyle = horizonGlow;
        ctx.fillRect(0, horizonY - state.height * 0.14, state.width, state.height * 0.24);

        ctx.fillStyle = "rgba(86, 180, 213, 0.48)";
        ctx.fillRect(0, horizonY - 20, state.width, 32);

        const seaGrad = ctx.createLinearGradient(0, horizonY, 0, state.height);
        seaGrad.addColorStop(0, "rgba(95, 198, 230, 0.94)");
        seaGrad.addColorStop(0.32, "rgba(61, 163, 214, 0.96)");
        seaGrad.addColorStop(0.7, "rgba(36, 124, 183, 0.98)");
        seaGrad.addColorStop(1, "rgba(20, 86, 144, 0.99)");
        ctx.fillStyle = seaGrad;
        ctx.fillRect(0, horizonY, state.width, state.height - horizonY);

        ctx.strokeStyle = "rgba(218, 247, 255, 0.42)";
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 3; i += 1) {
          const y = horizonY + 6 + i * 8;
          ctx.beginPath();
          for (let x = -40; x <= state.width + 40; x += 40) {
            const wave = Math.sin((x * 0.008) + state.wavePhase * 0.42 + i * 0.8) * (1.8 + i * 0.2);
            if (x === -40) ctx.moveTo(x, y + wave);
            else ctx.lineTo(x, y + wave);
          }
          ctx.stroke();
        }

        const reflectionGrad = ctx.createLinearGradient(state.width * 0.14, horizonY, state.width * 0.28, state.height);
        reflectionGrad.addColorStop(0, "rgba(255, 236, 173, 0.35)");
        reflectionGrad.addColorStop(1, "rgba(255, 236, 173, 0)");
        ctx.fillStyle = reflectionGrad;
        ctx.fillRect(state.width * 0.03, horizonY, state.width * 0.34, state.height - horizonY);

        ctx.strokeStyle = "rgba(235, 251, 255, 0.52)";
        ctx.lineWidth = 2.2;
        for (let i = 0; i < 7; i += 1) {
          const y = horizonY + 24 + i * 29;
          ctx.beginPath();
          for (let x = -36; x <= state.width + 36; x += 36) {
            const wave = Math.sin((x * 0.011) + state.wavePhase + i * 0.82) * (4 + i * 0.3);
            if (x === -36) ctx.moveTo(x, y + wave);
            else ctx.lineTo(x, y + wave);
          }
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
        ctx.lineWidth = 2.6;
        ctx.beginPath();
        for (let x = -30; x <= state.width + 30; x += 34) {
          const foam = Math.sin(x * 0.015 + state.wavePhase * 1.3) * 2.5;
          if (x === -30) ctx.moveTo(x, horizonY + foam);
          else ctx.lineTo(x, horizonY + foam);
        }
        ctx.stroke();

        const depthFade = ctx.createLinearGradient(0, horizonY + 4, 0, horizonY + state.height * 0.32);
        depthFade.addColorStop(0, "rgba(255, 255, 255, 0.16)");
        depthFade.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.fillStyle = depthFade;
        ctx.fillRect(0, horizonY, state.width, state.height * 0.35);

        for (let i = 0; i < 22; i += 1) {
          const sparkX = (i * 149 + state.time * (26 + i * 0.4)) % (state.width + 80) - 40;
          const sparkY = horizonY + 16 + (i % 8) * 15 + Math.sin(state.time * 1.8 + i * 0.7) * 2.5;
          const sparkle = 0.08 + 0.12 * (0.5 + 0.5 * Math.sin(state.time * 2.4 + i));
          ctx.fillStyle = "rgba(255, 255, 255, " + sparkle.toFixed(3) + ")";
          ctx.fillRect(sparkX, sparkY, 18, 1.5);
        }

        for (const cloud of state.clouds) {
          drawCloud(cloud.x, cloud.y, cloud.scale, cloud.alpha);
        }

        if (state.mode === "menu") {
          for (const ship of state.ships) {
            drawShip(ship);
          }
        }
      }

      function drawTarget(target, index) {
        const color = palette[index % palette.length];
        const s = target.radius * target.scale;
        if (s < 2) return;
        if (target.state === "sunk") return;
        if (target.state === "exploding") return;

        ctx.save();
        ctx.translate(target.x, target.y);

        if (target.state === "wrong") {
          const shake = Math.sin(state.time * 52) * 5;
          ctx.translate(shake, 0);
        }

        const hullW = s * 2.55;
        const hullH = s * 0.56;
        const mastH = s * 1.34;
        const sailColor = color.base;
        const sailShade = color.rim;
        const pulse = Math.sin(target.sparklePulse) * 0.04 + 0.96;

        ctx.fillStyle = "rgba(10, 26, 44, 0.2)";
        ctx.beginPath();
        ctx.ellipse(0, hullH * 0.96, hullW * 0.54, hullH * 0.23, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(197, 243, 255, 0.55)";
        ctx.lineWidth = Math.max(1.2, s * 0.022);
        ctx.beginPath();
        ctx.moveTo(-hullW * 0.7, hullH * 0.62);
        ctx.quadraticCurveTo(-hullW * 0.2, hullH * 0.52, hullW * 0.24, hullH * 0.58);
        ctx.stroke();

        const hullGrad = ctx.createLinearGradient(-hullW * 0.6, -hullH * 0.1, hullW * 0.5, hullH * 0.6);
        hullGrad.addColorStop(0, "#8f5f2d");
        hullGrad.addColorStop(1, "#5d3718");
        ctx.fillStyle = hullGrad;
        ctx.beginPath();
        ctx.moveTo(-hullW * 0.58, 0);
        ctx.lineTo(hullW * 0.55, 0);
        ctx.lineTo(hullW * 0.34, hullH * 0.52);
        ctx.lineTo(-hullW * 0.46, hullH * 0.52);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#5e3a18";
        ctx.fillRect(-hullW * 0.42, -hullH * 0.3, hullW * 0.84, hullH * 0.24);
        ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
        ctx.fillRect(-hullW * 0.4, -hullH * 0.27, hullW * 0.34, hullH * 0.09);

        ctx.strokeStyle = "rgba(35, 20, 8, 0.42)";
        ctx.lineWidth = Math.max(2, s * 0.05);
        ctx.beginPath();
        ctx.moveTo(-hullW * 0.38, hullH * 0.18);
        ctx.lineTo(hullW * 0.3, hullH * 0.18);
        ctx.stroke();

        ctx.strokeStyle = "#4f3317";
        ctx.lineWidth = Math.max(2, s * 0.06);
        ctx.beginPath();
        ctx.moveTo(-s * 0.08, -hullH * 0.16);
        ctx.lineTo(-s * 0.08, -mastH);
        ctx.stroke();

        ctx.strokeStyle = "rgba(66, 40, 18, 0.65)";
        ctx.lineWidth = Math.max(1, s * 0.018);
        ctx.beginPath();
        ctx.moveTo(-s * 0.08, -mastH * 0.7);
        ctx.lineTo(s * 0.12, -mastH * 0.38);
        ctx.lineTo(s * 0.08, -hullH * 0.18);
        ctx.stroke();

        ctx.fillStyle = sailColor;
        ctx.beginPath();
        ctx.moveTo(-s * 0.05, -mastH * 0.94);
        ctx.lineTo(-s * 0.05, -hullH * 0.18);
        ctx.lineTo(s * 1.02, -hullH * 0.38);
        ctx.lineTo(s * 1.02, -mastH * 0.8);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = sailShade;
        ctx.lineWidth = Math.max(2, s * 0.055);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.28)";
        ctx.lineWidth = Math.max(1.2, s * 0.02);
        ctx.beginPath();
        ctx.moveTo(s * 0.12, -mastH * 0.86);
        ctx.lineTo(s * 0.84, -mastH * 0.72);
        ctx.moveTo(s * 0.12, -mastH * 0.74);
        ctx.lineTo(s * 0.84, -mastH * 0.6);
        ctx.stroke();

        const badgeW = s * 0.78 * pulse;
        const badgeH = s * 0.58 * pulse;
        const badgeX = s * 0.46 - badgeW * 0.5;
        const badgeY = -mastH * 0.56 - badgeH * 0.5;
        ctx.fillStyle = "rgba(10, 26, 44, 0.22)";
        ctx.beginPath();
        roundedRectPath(badgeX + 2, badgeY + 3, badgeW, badgeH, Math.max(8, s * 0.08));
        ctx.fill();
        ctx.fillStyle = "rgba(255, 252, 242, 0.92)";
        ctx.beginPath();
        roundedRectPath(badgeX, badgeY, badgeW, badgeH, Math.max(8, s * 0.08));
        ctx.fill();
        ctx.strokeStyle = "rgba(23, 51, 74, 0.35)";
        ctx.lineWidth = Math.max(2, s * 0.045);
        ctx.stroke();

        ctx.fillStyle = "#f4d67b";
        ctx.fillRect(-s * 0.04, -mastH * 1.04, Math.max(2, s * 0.05), s * 0.28);

        ctx.fillStyle = "#132235";
        ctx.beginPath();
        ctx.moveTo(s * 0.01, -mastH * 1.03);
        ctx.lineTo(s * 0.28, -mastH * 0.95);
        ctx.lineTo(s * 0.01, -mastH * 0.87);
        ctx.closePath();
        ctx.fill();

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 " + Math.max(34, s * 0.78 * pulse) + "px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.strokeStyle = "rgba(12, 32, 52, 0.5)";
        ctx.lineWidth = Math.max(3, s * 0.07);
        ctx.strokeText(String(target.value), s * 0.46, -mastH * 0.56);
        ctx.fillStyle = color.text;
        ctx.fillText(String(target.value), s * 0.46, -mastH * 0.56);

        if (target.state === "wrong") {
          ctx.fillStyle = "rgba(230, 235, 244, 0.72)";
          ctx.beginPath();
          ctx.arc(hullW * 0.5, -hullH * 0.9, s * 0.24, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function drawProjectile() {
        if (!state.projectile) return;
        const cannonSkin = equippedStyle("cannonSkin", "default");
        const lightning = isBonusEquipped("lightning");
        const core = lightning
          ? "#dff8ff"
          : cannonSkin === "dragon"
            ? "#ff9b4a"
            : cannonSkin === "storm"
              ? "#9ad4ff"
              : cannonSkin === "royal"
                ? "#bff8f3"
                : "#2f343a";
        const glowCore = lightning
          ? "rgba(168, 239, 255, 0.98)"
          : cannonSkin === "dragon"
            ? "rgba(255, 171, 96, 0.95)"
            : cannonSkin === "storm"
              ? "rgba(157, 214, 255, 0.95)"
              : cannonSkin === "royal"
                ? "rgba(129, 248, 236, 0.95)"
                : "rgba(255, 223, 134, 0.95)";

        ctx.save();
        ctx.translate(state.projectile.x, state.projectile.y);
        const glowRadius = lightning ? 30 : cannonSkin === "royal" ? 28 : 24;
        const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, glowRadius);
        glow.addColorStop(0, glowCore);
        glow.addColorStop(
          1,
          lightning
            ? "rgba(168, 239, 255, 0)"
            : cannonSkin === "dragon"
              ? "rgba(255, 171, 96, 0)"
              : cannonSkin === "storm"
                ? "rgba(157, 214, 255, 0)"
                : cannonSkin === "royal"
                  ? "rgba(129, 248, 236, 0)"
                : "rgba(255, 223, 134, 0)"
        );
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, glowRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.arc(0, 0, cannonSkin === "royal" ? 10 : 9, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(255, 255, 255, 0.25)";
        ctx.beginPath();
        ctx.arc(-3, -3, 3.4, 0, Math.PI * 2);
        ctx.fill();

        if (cannonSkin === "dragon") {
          ctx.strokeStyle = "rgba(255, 153, 87, 0.7)";
          ctx.lineWidth = 1.8;
          ctx.beginPath();
          ctx.moveTo(-14, -2);
          ctx.lineTo(-25, -6);
          ctx.lineTo(-36, -2);
          ctx.stroke();
        } else if (cannonSkin === "storm") {
          ctx.strokeStyle = "rgba(150, 222, 255, 0.76)";
          ctx.lineWidth = 1.7;
          ctx.beginPath();
          ctx.moveTo(-10, 0);
          ctx.lineTo(-18, -4);
          ctx.lineTo(-27, 1);
          ctx.lineTo(-35, -3);
          ctx.stroke();
        } else if (cannonSkin === "royal") {
          ctx.strokeStyle = "rgba(149, 255, 241, 0.7)";
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.arc(-6, 0, 12, -Math.PI * 0.65, Math.PI * 0.65);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(-16, 0, 18, -Math.PI * 0.5, Math.PI * 0.5);
          ctx.stroke();
        }

        if (lightning) {
          ctx.strokeStyle = "rgba(145, 227, 255, 0.8)";
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(-9, 0);
          ctx.lineTo(-15, -3);
          ctx.lineTo(-22, 2);
          ctx.stroke();
          ctx.strokeStyle = "rgba(189, 246, 255, 0.78)";
          ctx.lineWidth = 1.3;
          ctx.beginPath();
          ctx.moveTo(-6, -6);
          ctx.lineTo(-13, -10);
          ctx.lineTo(-19, -6);
          ctx.moveTo(-4, 6);
          ctx.lineTo(-11, 10);
          ctx.lineTo(-18, 6);
          ctx.stroke();
          ctx.fillStyle = "rgba(206, 248, 255, 0.25)";
          ctx.beginPath();
          ctx.arc(0, 0, 14, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawParticles() {
        for (const p of state.particles) {
          const alpha = clamp(p.life * 1.7, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.spin);

          if (p.kind === "shockwave") {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = Math.max(2, p.size * 0.08);
            ctx.beginPath();
            ctx.arc(0, 0, p.size, 0, Math.PI * 2);
            ctx.stroke();
          } else if (p.kind === "smoke") {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size * 1.2, p.size * 0.8, 0, 0, Math.PI * 2);
            ctx.fill();
          } else if (p.kind === "shipShard") {
            ctx.fillStyle = p.color;
            if (p.shardType === "sail") {
              ctx.beginPath();
              ctx.moveTo(-p.size * 0.45, -p.size * 0.55);
              ctx.lineTo(p.size * 0.58, -p.size * 0.12);
              ctx.lineTo(-p.size * 0.18, p.size * 0.52);
              ctx.closePath();
              ctx.fill();
            } else if (p.shardType === "flag") {
              ctx.beginPath();
              ctx.moveTo(-p.size * 0.4, -p.size * 0.2);
              ctx.lineTo(p.size * 0.5, 0);
              ctx.lineTo(-p.size * 0.4, p.size * 0.3);
              ctx.closePath();
              ctx.fill();
            } else {
              ctx.beginPath();
              ctx.moveTo(-p.size * 0.6, -p.size * 0.35);
              ctx.lineTo(p.size * 0.62, -p.size * 0.26);
              ctx.lineTo(p.size * 0.36, p.size * 0.42);
              ctx.lineTo(-p.size * 0.48, p.size * 0.44);
              ctx.closePath();
              ctx.fill();
            }
          } else if (p.kind === "debris") {
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size * 0.5, -p.size * 0.4, p.size, p.size * 0.8);
          } else if (p.kind === "splash") {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size * 0.8, p.size * 0.56, 0, 0, Math.PI * 2);
            ctx.fill();
          } else if (p.kind === "sparkle") {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(0, 0, p.size, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.moveTo(0, -p.size * 1.3);
            ctx.lineTo(p.size * 0.45, -p.size * 0.3);
            ctx.lineTo(p.size * 1.2, -p.size * 0.3);
            ctx.lineTo(p.size * 0.62, p.size * 0.28);
            ctx.lineTo(p.size * 0.88, p.size * 1.22);
            ctx.lineTo(0, p.size * 0.58);
            ctx.lineTo(-p.size * 0.88, p.size * 1.22);
            ctx.lineTo(-p.size * 0.62, p.size * 0.28);
            ctx.lineTo(-p.size * 1.2, -p.size * 0.3);
            ctx.lineTo(-p.size * 0.45, -p.size * 0.3);
            ctx.closePath();
            ctx.fill();
          }

          ctx.restore();
        }
      }

      function drawLightningBolts() {
        if (!state.lightningBolts.length) return;
        ctx.save();
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        for (const bolt of state.lightningBolts) {
          const alpha = clamp(bolt.life / Math.max(0.001, bolt.maxLife), 0, 1);
          const pts = bolt.points;
          if (!pts || pts.length < 2) continue;

          ctx.strokeStyle = "rgba(148, 231, 255, " + (alpha * 0.36).toFixed(3) + ")";
          ctx.lineWidth = bolt.width * 2.3;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i += 1) {
            ctx.lineTo(pts[i].x, pts[i].y);
          }
          ctx.stroke();

          ctx.globalAlpha = alpha * 0.95;
          ctx.strokeStyle = bolt.color || "rgba(180, 247, 255, 0.95)";
          ctx.lineWidth = bolt.width;
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i += 1) {
            ctx.lineTo(pts[i].x, pts[i].y);
          }
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
        ctx.restore();
      }

      function drawPopups() {
        for (const popup of state.popups) {
          const alpha = clamp(popup.life * 1.2, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = "900 34px 'Avenir Next', 'Trebuchet MS', sans-serif";
          ctx.strokeStyle = "rgba(255,255,255,0.95)";
          ctx.lineWidth = 6;
          ctx.strokeText(popup.text, popup.x, popup.y);
          ctx.fillStyle = popup.color;
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        }
      }

      function drawCannon() {
        const origin = getCannonOrigin();
        const cx = origin.x;
        const cy = origin.y;
        const recoil = state.cannonRecoil * 14;
        const bob = Math.sin(state.time * 2.6) * 2.2;
        const cannonSkin = equippedStyle("cannonSkin", "default");
        const deckTrim = equippedStyle("deckTrim", "default");
        const flagStyle = equippedStyle("flag", "default");
        const companion = equippedStyle("companion", "none");

        let deckA = "#8f5e2d";
        let deckB = "#6a431f";
        let railA = "#9d6a34";

        ctx.fillStyle = muzzleOuter;

        if (cannonSkin === "storm") {

          ctx.beginPath();

          ctx.beginPath();
          ctx.moveTo(95, 18);
          ctx.lineTo(114, 31);
          ctx.lineTo(109, 12);

          ctx.fill();
          ctx.fillStyle = "#ffb059";

          ctx.arc(76, -7, 2.6, 0, Math.PI * 2);

        } else if (cannonSkin === "royal") {
          ctx.strokeStyle = "rgba(152, 255, 239, 0.78)";

          ctx.beginPath();
          ctx.arc(46, 0, 16, -Math.PI * 0.64, Math.PI * 0.64);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(82, 0, 14, -Math.PI * 0.62, Math.PI * 0.62);
          ctx.stroke();
          ctx.fillStyle = "rgba(172, 255, 236, 0.7)";
          ctx.beginPath();
          ctx.moveTo(18, -18);
          ctx.lineTo(34, -9);
          ctx.lineTo(20, -4);

          ctx.lineTo(108, 4);

        ctx.fillStyle = "#5f6874";

        ctx.arc(-12, 0, 6.2, 0, Math.PI * 2);
        ctx.arc(12, 0, 6.2, 0, Math.PI * 2);

        const emberPulse = 0.45 + Math.sin(state.time * 8.2) * 0.2 + state.shotPulse * 0.2;

        ctx.beginPath();
        ctx.arc(54, -16, 3.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        ctx.save();
        ctx.translate(-124, -12);
        ctx.strokeStyle = "#f4d67b";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -38);
        ctx.stroke();
        ctx.fillStyle = "#f5e3b6";
        if (flagStyle === "kraken") {
          ctx.fillStyle = "#c54538";
        } else if (flagStyle === "ghost") {
          ctx.fillStyle = "#1f2734";
        }
        ctx.beginPath();
        ctx.moveTo(0, -38);
        ctx.lineTo(30, -24);
        ctx.lineTo(0, -12);
        ctx.closePath();
        ctx.fill();
        if (flagStyle === "ghost") {
          ctx.fillStyle = "#ffffff";

          ctx.fillText("K", 8, -19);
        }
        ctx.restore();

        if (companion === "parrot") {
          ctx.save();
          ctx.translate(110, -24 + Math.sin(state.time * 5) * 1.4);
          ctx.fillStyle = "rgba(11, 24, 36, 0.28)";
          ctx.beginPath();
          ctx.ellipse(0, 14, 16, 5, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#2ab86a";
          ctx.beginPath();
          ctx.ellipse(0, 2, 14, 11, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#18a67f";
          ctx.beginPath();
          ctx.arc(-9, -7, 7, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#f4c542";
          ctx.beginPath();
          ctx.moveTo(-16, -7);
          ctx.lineTo(-24, -4);
          ctx.lineTo(-16, -1);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#103049";
          ctx.beginPath();
          ctx.arc(-10, -8, 1.8, 0, Math.PI * 2);

          ctx.beginPath();
          ctx.arc(-9, -7, 6, 0, Math.PI * 2);

          ctx.fillStyle = "#5f3d25";

          ctx.arc(0, -2, 12, 0, Math.PI * 2);

          ctx.beginPath();
          ctx.ellipse(0, 3, 8.8, 7.3, 0, 0, Math.PI * 2);

          ctx.fillStyle = "#2a1b12";

          ctx.beginPath();

      function drawMessageBar() {
        ctx.save();
        const equationTextValue = state.mode === "playing" && state.equation
          ? state.equation.text
          : state.mode === "port"
            ? "PORT SHOP"
            : "Tap Start";

        const msgW = Math.min(state.width * 0.58, 670);
        const msgH = Math.max(38, Math.min(50, state.height * 0.066));
        const msgX = (state.width - msgW) * 0.5;
        const msgY = state.height * 0.045;

        const eqW = Math.min(state.width * 0.68, 820);
        const eqH = Math.max(78, Math.min(106, state.height * 0.14));
        const eqX = (state.width - eqW) * 0.5;
        const eqY = msgY + msgH + 12;

        const panelGrad = ctx.createLinearGradient(msgX, msgY, msgX, msgY + msgH);
        panelGrad.addColorStop(0, "rgba(245, 235, 205, 0.94)");
        panelGrad.addColorStop(1, "rgba(225, 204, 160, 0.92)");
        ctx.shadowColor = "rgba(18, 51, 78, 0.2)";
        ctx.shadowBlur = 9;
        ctx.shadowOffsetY = 4;
        ctx.fillStyle = panelGrad;
        ctx.beginPath();
        roundedRectPath(msgX, msgY, msgW, msgH, 18);
        ctx.fill();
        ctx.shadowColor = "transparent";

        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.beginPath();
        roundedRectPath(msgX + 14, msgY + 6, msgW * 0.44, 8, 4);
        ctx.fill();

        ctx.strokeStyle = "rgba(121, 88, 49, 0.62)";
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        roundedRectPath(msgX, msgY, msgW, msgH, 18);
        ctx.stroke();

        ctx.strokeStyle = "rgba(91, 64, 34, 0.24)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        roundedRectPath(msgX + 5, msgY + 4, msgW - 10, msgH - 8, 14);
        ctx.stroke();

        const eqGrad = ctx.createLinearGradient(eqX, eqY, eqX, eqY + eqH);
        eqGrad.addColorStop(0, "rgba(249, 239, 212, 0.98)");
        eqGrad.addColorStop(1, "rgba(229, 207, 163, 0.97)");
        ctx.shadowColor = "rgba(18, 51, 78, 0.24)";
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 7;
        ctx.fillStyle = eqGrad;
        ctx.beginPath();
        roundedRectPath(eqX, eqY, eqW, eqH, 24);
        ctx.fill();
        ctx.shadowColor = "transparent";

        ctx.save();
        ctx.beginPath();
        roundedRectPath(eqX + 2, eqY + 2, eqW - 4, eqH - 4, 21);
        ctx.clip();
        ctx.strokeStyle = "rgba(150, 120, 74, 0.13)";
        ctx.lineWidth = 1;
        for (let i = 0; i < 9; i += 1) {
          const y = eqY + 14 + i * 10;
          const drift = Math.sin(i * 1.3) * 8;
          ctx.beginPath();
          ctx.moveTo(eqX + 16 + drift, y);
          ctx.lineTo(eqX + eqW - 16 + drift * 0.2, y + 1.5);
          ctx.stroke();
        }
        ctx.restore();

        ctx.fillStyle = "rgba(255, 255, 255, 0.24)";
        ctx.beginPath();
        roundedRectPath(eqX + 16, eqY + 10, eqW * 0.52, 10, 5);
        ctx.fill();

        ctx.strokeStyle = "rgba(120, 87, 50, 0.66)";
        ctx.lineWidth = 2.6;
        ctx.beginPath();
        roundedRectPath(eqX, eqY, eqW, eqH, 24);
        ctx.stroke();
        ctx.strokeStyle = "rgba(90, 63, 34, 0.18)";
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        roundedRectPath(eqX + 5, eqY + 4, eqW - 10, eqH - 8, 20);
        ctx.stroke();

        const pinRadius = Math.max(5, eqH * 0.08);
        const pins = [
          { x: eqX + 24, y: eqY + 20 },
          { x: eqX + eqW - 24, y: eqY + 20 },
          { x: eqX + 26, y: eqY + eqH - 20 },
          { x: eqX + eqW - 26, y: eqY + eqH - 20 }
        ];
        for (const pin of pins) {
          const pinGrad = ctx.createRadialGradient(pin.x - 1, pin.y - 1, 1, pin.x, pin.y, pinRadius);
          pinGrad.addColorStop(0, "#f3dba1");
          pinGrad.addColorStop(1, "#a57531");
          ctx.fillStyle = pinGrad;
          ctx.beginPath();
          ctx.arc(pin.x, pin.y, pinRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(255,255,255,0.42)";
          ctx.beginPath();
          ctx.arc(pin.x - pinRadius * 0.28, pin.y - pinRadius * 0.26, pinRadius * 0.24, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 " + Math.max(40, Math.min(74, state.width * 0.082)) + "px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.strokeStyle = "rgba(15, 49, 80, 0.4)";
        ctx.lineWidth = 5.5;
        ctx.strokeText(equationTextValue, state.width * 0.5, eqY + eqH * 0.56);
        ctx.fillStyle = "#174f7f";
        ctx.fillText(equationTextValue, state.width * 0.5, eqY + eqH * 0.56);

        ctx.font = "800 " + Math.max(14, Math.min(22, state.width * 0.019)) + "px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "#5d4021";
        ctx.fillText(state.message, state.width * 0.5, msgY + msgH * 0.54);
        ctx.restore();
      }

      function drawMenuOverlay() {
        if (state.mode !== "menu") return;

        ctx.save();
        ctx.fillStyle = "rgba(13, 62, 102, 0.26)";
        ctx.fillRect(0, 0, state.width, state.height);

        const w = Math.min(state.width * 0.86, 760);
        const h = Math.min(state.height * 0.76, 470);
        const x = (state.width - w) * 0.5;
        const y = (state.height - h) * 0.5;

        ctx.fillStyle = "rgba(255, 255, 255, 0.94)";
        ctx.beginPath();
        roundedRectPath(x, y, w, h, 26);
        ctx.fill();

        ctx.strokeStyle = "rgba(18, 58, 100, 0.2)";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = "#264d78";
        ctx.font = "900 " + Math.max(28, w * 0.075) + "px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillText("Pirate Math Cannon", state.width * 0.5, y + h * 0.18);

        ctx.font = "700 " + Math.max(16, w * 0.032) + "px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "#2b5f91";
        ctx.fillText("Sail the sea and blast the right ship.", state.width * 0.5, y + h * 0.34);
        ctx.fillText("Quick rounds, bright visuals, and gentle retry feedback.", state.width * 0.5, y + h * 0.42);

        const modeLabel = getModeConfig(state.mathMode).label;
        const instructions = [
          "Choose mode: Addition, Subtraction, or Mixed",
          "Earn coins with correct streaks, then buy upgrades at Port",
          "Current mode: " + modeLabel,
          "Controls: aim + tap ships (1/2/3), shop with B"
        ];

        ctx.font = "700 " + Math.max(14, w * 0.027) + "px 'Avenir Next', 'Trebuchet MS', sans-serif";
        const instructionStartY = y + h * 0.5;
        const instructionLineStep = Math.max(24, h * 0.073);
        instructions.forEach((line, i) => {
          ctx.fillStyle = i === 3 ? "#215f94" : "#2a6ea7";
          ctx.fillText(line, state.width * 0.5, instructionStartY + i * instructionLineStep);
        });

        const buttonW = Math.min(280, w * 0.46);
        const buttonH = 58;
        const buttonX = state.width * 0.5 - buttonW * 0.5;
        const lastInstructionY = instructionStartY + (instructions.length - 1) * instructionLineStep;
        const buttonY = Math.min(y + h - buttonH - 24, Math.max(y + h * 0.79, lastInstructionY + 34));

        const buttonGrad = ctx.createLinearGradient(buttonX, buttonY, buttonX + buttonW, buttonY + buttonH);
        buttonGrad.addColorStop(0, "#0ea5a4");
        buttonGrad.addColorStop(1, "#2f73f1");
        ctx.fillStyle = buttonGrad;
        ctx.beginPath();
        roundedRectPath(buttonX, buttonY, buttonW, buttonH, 14);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.font = "900 26px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillText("Tap To Start", state.width * 0.5, buttonY + buttonH * 0.58);

        ctx.restore();
      }

      function drawPortOverlay() {
        if (state.mode !== "port") return;
        state.portUiRegions = [];

        ctx.save();
        ctx.fillStyle = "rgba(9, 35, 58, 0.52)";
        ctx.fillRect(0, 0, state.width, state.height);

        const panelW = Math.min(state.width * 0.92, 1040);
        const panelH = Math.min(state.height * 0.92, 700);
        const panelX = (state.width - panelW) * 0.5;
        const panelY = (state.height - panelH) * 0.5;

        const panelGrad = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
        panelGrad.addColorStop(0, "rgba(250, 244, 229, 0.97)");
        panelGrad.addColorStop(1, "rgba(230, 214, 182, 0.96)");
        ctx.fillStyle = panelGrad;
        ctx.beginPath();
        roundedRectPath(panelX, panelY, panelW, panelH, 24);
        ctx.fill();
        ctx.strokeStyle = "rgba(118, 82, 45, 0.6)";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#264d78";
        ctx.font = "900 " + Math.max(26, panelW * 0.042) + "px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillText("Port Shop", panelX + 28, panelY + 38);

        ctx.font = "800 " + Math.max(18, panelW * 0.024) + "px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "#7a4f1e";
        ctx.fillText("Coins: " + state.coins, panelX + panelW - 210, panelY + 38);

        ctx.font = "700 " + Math.max(14, panelW * 0.017) + "px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "#5f4a2d";
        const rewardText = state.roundMessage || "Buy upgrades and equip your ship before sailing on.";
        ctx.fillText(rewardText, panelX + 28, panelY + 74);

        const continueW = Math.min(220, panelW * 0.28);
        const continueH = 48;
        const continueX = panelX + panelW - continueW - 24;
        const continueY = panelY + panelH - continueH - 20;
        const continueGrad = ctx.createLinearGradient(continueX, continueY, continueX + continueW, continueY + continueH);
        continueGrad.addColorStop(0, "#e8a72a");
        continueGrad.addColorStop(1, "#ca741f");
        ctx.fillStyle = continueGrad;
        ctx.beginPath();
        roundedRectPath(continueX, continueY, continueW, continueH, 12);
        ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.font = "900 22px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Continue", continueX + continueW * 0.5, continueY + continueH * 0.56);
        state.portUiRegions.push({ type: "continue", x: continueX, y: continueY, w: continueW, h: continueH });

        const cols = 3;
        const rows = Math.ceil(SHOP_ITEMS.length / cols);
        const gap = 12;
        const listTop = panelY + 98;
        const listBottom = continueY - 20;
        const cardH = Math.max(64, Math.floor((listBottom - listTop - gap * Math.max(0, rows - 1)) / Math.max(1, rows)));
        const cardW = Math.floor((panelW - 56 - gap * (cols - 1)) / cols);
        const compactCard = cardH < 92;

        function fitCardText(text, maxWidth) {
          if (!text) return "";
          if (ctx.measureText(text).width <= maxWidth) return text;
          let trimmed = text;
          while (trimmed.length > 0 && ctx.measureText(trimmed + "...").width > maxWidth) {
            trimmed = trimmed.slice(0, -1);
          }
          return trimmed ? trimmed + "..." : "";
        }

        function drawCannonPreview(px, py, style, glowAlpha) {
          let barrelA = "#637180";
          let barrelB = "#252d3b";
          let glow = "rgba(255, 214, 133, " + glowAlpha + ")";
          if (style === "storm") {
            barrelA = "#6a8db5";
            barrelB = "#2f4b67";
            glow = "rgba(150, 220, 255, " + glowAlpha + ")";
          } else if (style === "dragon") {
            barrelA = "#b16633";
            barrelB = "#4f2619";
            glow = "rgba(255, 156, 104, " + glowAlpha + ")";
          } else if (style === "royal") {
            barrelA = "#3f6e7a";
            barrelB = "#193540";
            glow = "rgba(143, 255, 238, " + glowAlpha + ")";
          }

          ctx.save();
          ctx.translate(px, py);
          const aura = ctx.createRadialGradient(10, -4, 3, 10, -4, 24);
          aura.addColorStop(0, glow);
          aura.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = aura;
          ctx.beginPath();
          ctx.arc(10, -4, 24, 0, Math.PI * 2);
          ctx.fill();

          const barrel = ctx.createLinearGradient(-28, -9, 18, 9);
          barrel.addColorStop(0, barrelA);
          barrel.addColorStop(1, barrelB);
          ctx.fillStyle = barrel;
          ctx.beginPath();
          roundedRectPath(-28, -9, 46, 18, 8);
          ctx.fill();

          ctx.fillStyle = "rgba(255,255,255,0.23)";
          ctx.fillRect(-22, -7, 20, 3);
          ctx.fillStyle = "rgba(26, 33, 46, 0.9)";
          ctx.beginPath();
          ctx.arc(18, 0, 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(8, 13, 20, 0.92)";
          ctx.beginPath();
          ctx.arc(18, 0, 4.4, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#8a5a2b";
          ctx.beginPath();
          roundedRectPath(-16, 9, 32, 7, 3);
          ctx.fill();
          ctx.restore();
        }

        SHOP_ITEMS.forEach((item, index) => {
          const col = index % cols;
          const row = Math.floor(index / cols);
          const x = panelX + 28 + col * (cardW + gap);
          const y = listTop + row * (cardH + gap);
          const owned = isItemOwned(item.id);
          const equipped = isItemEquipped(item.id);
          const affordable = state.coins >= item.cost;

          ctx.fillStyle = equipped
            ? "rgba(221, 242, 212, 0.92)"
            : owned
              ? "rgba(233, 241, 252, 0.88)"
              : "rgba(255, 255, 255, 0.84)";
          ctx.beginPath();
          roundedRectPath(x, y, cardW, cardH, 12);
          ctx.fill();
          ctx.strokeStyle = equipped
            ? "rgba(76, 132, 56, 0.65)"
            : owned
              ? "rgba(58, 95, 138, 0.45)"
              : "rgba(120, 90, 52, 0.38)";
          ctx.lineWidth = equipped ? 3 : 2;
          ctx.stroke();

          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
          ctx.fillStyle = "#2a5078";
          ctx.font = (compactCard ? "800 15px " : "800 17px ") + "'Avenir Next', 'Trebuchet MS', sans-serif";
          const nameText = fitCardText(item.name, cardW - (item.category === "cannonSkin" ? 134 : 106));
          ctx.fillText(nameText, x + 10, y + (compactCard ? 21 : 24));

          ctx.font = "700 13px 'Avenir Next', 'Trebuchet MS', sans-serif";
          ctx.fillStyle = "#5f4a2d";
          const categoryLabel = item.category === "cannonSkin"
            ? "CANNON"
            : item.category === "deckTrim"
              ? "DECK"
              : item.category === "companion"
                ? "CREW"
                : item.category === "bonus"
                  ? "BONUS"
                  : "FLAG";
          ctx.fillText(categoryLabel, x + 10, y + (compactCard ? 38 : 43));

          const rarity = item.rarity || "Rare";
          ctx.fillStyle = rarityColor(rarity);
          ctx.font = "800 12px 'Avenir Next', 'Trebuchet MS', sans-serif";
          ctx.fillText(rarity.toUpperCase(), x + cardW - 90, y + 20);

          if (item.category === "cannonSkin") {
            drawCannonPreview(x + cardW - 44, y + (compactCard ? 35 : 42), item.style, equipped ? 0.46 : 0.3);
          }

          if (!compactCard) {
            ctx.fillStyle = "rgba(68, 52, 28, 0.82)";
            ctx.font = "600 12px 'Avenir Next', 'Trebuchet MS', sans-serif";
            const blurbText = fitCardText(item.blurb || "", cardW - 20);
            ctx.fillText(blurbText, x + 10, y + 64);
            if (item.category === "cannonSkin") {
              ctx.fillStyle = equipped ? "#2f7b32" : "rgba(55, 69, 92, 0.82)";
              ctx.font = "800 11px 'Avenir Next', 'Trebuchet MS', sans-serif";
              ctx.fillText(equipped ? "ACTIVE CANNON" : "BLAST STYLE UNLOCK", x + cardW - 138, y + 64);
            }
          }

          const actionText = equipped
            ? item.category === "cannonSkin" ? "Equipped: Beast Mode" : "Equipped"
            : owned
              ? item.category === "cannonSkin" ? "Tap to arm this cannon" : "Tap to equip"
              : affordable
                ? (item.category === "cannonSkin" ? "Buy Beast: " : "Buy: ") + item.cost + " coins"
                : "Need " + item.cost + " coins";
          ctx.fillStyle = equipped ? "#3f7a2f" : affordable || owned ? "#1f5c8f" : "#9f602e";
          ctx.font = (compactCard ? "800 13px " : "800 14px ") + "'Avenir Next', 'Trebuchet MS', sans-serif";
          ctx.fillText(actionText, x + 10, y + cardH - 10);

          state.portUiRegions.push({
            type: "item",
            itemId: item.id,
            x,
            y,
            w: cardW,
            h: cardH
          });
        });

        ctx.textAlign = "left";
        ctx.font = "700 13px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "#6f5a38";
        ctx.fillText("Tip: Lucky Barrel boosts coins, Spyglass clears a decoy, and Chain Lightning adds thunder hits.", panelX + 28, continueY + continueH * 0.5);

        ctx.restore();
      }

      function drawScene() {
        ctx.save();
        if (state.screenShake > 0) {
          const shakeX = rand(-state.screenShake, state.screenShake);
          const shakeY = rand(-state.screenShake * 0.6, state.screenShake * 0.6);
          ctx.translate(shakeX, shakeY);
        }

        drawBackground();

        for (let i = 0; i < state.targets.length; i += 1) {
          drawTarget(state.targets[i], i);
        }

        drawParticles();
        drawLightningBolts();
        drawProjectile();
        drawCannon();
        if (state.mode !== "port") {
          drawMessageBar();
        }
        drawPopups();

        const vignette = ctx.createRadialGradient(
          state.width * 0.5,
          state.height * 0.45,
          state.width * 0.2,
          state.width * 0.5,
          state.height * 0.5,
          state.width * 0.82
        );
        vignette.addColorStop(0, "rgba(0, 0, 0, 0)");
        vignette.addColorStop(1, "rgba(0, 22, 44, 0.18)");
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, state.width, state.height);

        const grade = ctx.createLinearGradient(0, 0, 0, state.height);
        grade.addColorStop(0, "rgba(255, 255, 255, 0.04)");
        grade.addColorStop(1, "rgba(9, 56, 97, 0.08)");
        ctx.fillStyle = grade;
        ctx.fillRect(0, 0, state.width, state.height);

        if (state.flashAlpha > 0) {
          ctx.fillStyle = "rgba(255, 242, 190, " + state.flashAlpha.toFixed(3) + ")";
          ctx.fillRect(0, 0, state.width, state.height);
        }
        ctx.restore();
        drawMenuOverlay();
        drawPortOverlay();
      }

      function frame(now) {
        if (!frame.last) frame.last = now;
        const dt = Math.min(0.05, (now - frame.last) / 1000);
        frame.last = now;

        updateGame(dt);
        drawScene();

        state.animationFrame = window.requestAnimationFrame(frame);
      }

      function stepDeterministic(ms) {
        const fixed = 1 / 60;
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let i = 0; i < steps; i += 1) {
          updateGame(fixed);
        }
        drawScene();
      }

      function renderGameToText() {
        const payload = {
          mode: state.mode,
          mathMode: state.mathMode,
          coordinateSystem: "origin=(0,0) top-left, +x right, +y down, units are canvas pixels",
          level: state.equation ? state.equation.label : "Level 1",
          equation: state.equation ? state.equation.text : null,
          answer: state.equation ? state.equation.answer : null,
          score: state.score,
          coins: state.coins,
          streak: state.streak,
          bestStreak: state.bestStreak,
          round: state.round,
          roundCoins: state.roundCoins,
          resolving: state.resolving,
          message: state.message,
          roundMessage: state.roundMessage,
          shotPulse: Number(state.shotPulse.toFixed(3)),
          screenShake: Number(state.screenShake.toFixed(2)),
          flashAlpha: Number(state.flashAlpha.toFixed(3)),
          cannon: {
            x: Number((state.width * 0.5).toFixed(2)),
            y: Number((state.height * 0.88).toFixed(2)),
            angle: Number(state.cannonAngle.toFixed(3)),
            recoil: Number(state.cannonRecoil.toFixed(3))
          },
          projectile: state.projectile
            ? {
                x: Number(state.projectile.x.toFixed(2)),
                y: Number(state.projectile.y.toFixed(2)),
                targetId: state.projectile.targetId
              }
            : null,
          targets: state.targets.map((target) => ({
            id: target.id,
            value: target.value,
            x: Number(target.x.toFixed(2)),
            y: Number(target.y.toFixed(2)),
            radius: Number(target.radius.toFixed(2)),
            state: target.state,
            isCorrect: target.isCorrect,
            resolvedCorrect: target.resolvedCorrect,
            explodeTimer: Number(target.explodeTimer.toFixed(3))
          })),
          particles: state.particles.length,
          lightningBolts: state.lightningBolts.length,
          popups: state.popups.length,
          soundEnabled: state.soundEnabled,
          modeCorrect: state.modeCorrect,
          shop: {
            owned: state.shop.owned,
            equipped: state.shop.equipped
          }
        };

        return JSON.stringify(payload);
      }

      function onKeyDown(event) {
        const key = String(event.key || "").toLowerCase();

        if (key === "f") {
          event.preventDefault();
          setFullscreen();
          return;
        }

        if (key === "m") {
          event.preventDefault();
          toggleSound();
          return;
        }

        if (key === "r") {
          event.preventDefault();
          resetRound();
          return;
        }

        if (key === "b") {
          event.preventDefault();
          if (state.mode === "port") {
            leavePort();
          } else if (state.mode === "playing") {
            openPort({ returnToRound: true });
          } else {
            openPort({ returnToRound: false });
          }
          return;
        }

        if (key === "a") {
          event.preventDefault();
          setMathMode("addition");
          return;
        }

        if (key === "s") {
          event.preventDefault();
          setMathMode("subtraction");
          return;
        }

        if (key === "x") {
          event.preventDefault();
          setMathMode("mixed");
          return;
        }

        if (state.mode === "port") {
          if (key === " " || key === "enter" || key === "escape") {
            event.preventDefault();
            leavePort();
          }
          return;
        }

        if ((key === " " || key === "enter") && state.mode === "menu") {
          event.preventDefault();
          startRun();
          return;
        }

        if (state.mode !== "playing") return;

        if (key === "1" || key === "2" || key === "3") {
          const index = Number(key) - 1;
          const sorted = state.targets.slice().sort((a, b) => a.slot - b.slot);
          fireAtTarget(sorted[index]);
        }
      }

      canvas.addEventListener("pointerdown", onPointerDown, { passive: true });
      canvas.addEventListener("pointermove", onPointerMove, { passive: true });
      canvas.addEventListener("pointerleave", onPointerLeave, { passive: true });
      canvas.addEventListener("pointercancel", onPointerLeave, { passive: true });

      startBtn.addEventListener("click", () => {
        ensureAudio();
        if (state.mode === "menu") {
          startRun();
        } else if (state.mode === "port") {
          leavePort();
        } else {
          nextRound();
        }
      });

      shopBtn.addEventListener("click", () => {
        ensureAudio();
        if (state.mode === "port") {
          leavePort();
        } else if (state.mode === "playing") {
          openPort({ returnToRound: true });
        } else {
          openPort({ returnToRound: false });
        }
      });

      resetBtn.addEventListener("click", () => {
        ensureAudio();
        if (state.mode === "port") {
          if (state.modeBeforePort === "menu") {
            leavePort();
            return;
          }
          state.mode = "playing";
        }
        resetRound();
      });

      soundBtn.addEventListener("click", () => {
        ensureAudio();
        toggleSound();
      });

      fullscreenBtn.addEventListener("click", setFullscreen);
      modeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          ensureAudio();
          setMathMode(button.dataset.mode);
        });
      });
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("resize", resizeCanvas);

      window.render_game_to_text = renderGameToText;
      window.advanceTime = function (ms) {
        stepDeterministic(ms);
        return renderGameToText();
      };

      resizeCanvas();
      initSkyObjects();
      loadProgress();
      syncHud();
      drawScene();
      state.animationFrame = window.requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
