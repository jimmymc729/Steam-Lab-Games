<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PKMRWW0Z40"></script>
  <script>

    function gtag(){dataLayer.push(arguments);}

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pirate Math Cannon</title>
  <style>
    :root {
      --sky-1: #8edcff;
      --sky-2: #b6f7ff;
      --sky-3: #fff4c8;
      --ink: #123a64;
      --panel: rgba(255, 255, 255, 0.84);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --teal: #0da2c8;
      --sun: #ffd55c;
      --danger: #e66f76;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 10%, rgba(255, 255, 255, 0.75) 0 14%, transparent 30%),
        radial-gradient(circle at 88% 22%, rgba(255, 255, 255, 0.55) 0 10%, transparent 26%),
        linear-gradient(180deg, var(--sky-1) 0%, var(--sky-2) 53%, var(--sky-3) 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 14px;
      touch-action: manipulation;
    }

    .app {
      width: min(1120px, 100%);
      display: grid;
      gap: 10px;
    }

    .hud {
      background: var(--panel);
      border-radius: 18px;
      padding: 10px 12px 12px;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) auto;
      grid-template-rows: auto auto;
      grid-template-areas:
        "title meta"
        "controls meta";
      align-items: end;
      gap: 8px 14px;
      border: 2px solid rgba(18, 58, 100, 0.15);
      box-shadow: 0 14px 28px rgba(28, 91, 138, 0.16);
    }

    .title-wrap {
      grid-area: title;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      font-size: clamp(1.08rem, 2.1vw, 1.45rem);
      font-weight: 900;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #0a4d7f;
      line-height: 1;
    }

    .equation {
      font-size: clamp(1.2rem, 3vw, 2.1rem);
      font-weight: 900;
      color: #123a64;
      line-height: 1.1;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
      background: rgba(232, 241, 252, 0.72);
      border: 1px solid rgba(27, 73, 118, 0.2);
      border-radius: 14px;
      padding: 6px;
    }

    .meta-column {
      grid-area: meta;
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
      justify-content: flex-end;
      min-width: min(420px, 100%);
    }

    .controls {
      grid-area: controls;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .chip {
      background: #f5f9ff;
      border: 1px solid rgba(27, 73, 118, 0.2);
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 800;
      font-size: clamp(0.86rem, 1.6vw, 0.98rem);
      color: #143f69;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    .mode-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
      align-items: center;
      background: rgba(232, 241, 252, 0.72);
      border: 1px solid rgba(27, 73, 118, 0.2);
      border-radius: 14px;
      padding: 6px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 0.92rem;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(140deg, #2a79ca, #1e5fa3);
      box-shadow: 0 5px 12px rgba(16, 62, 109, 0.25);
      transition: transform 130ms ease, filter 130ms ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.06);
      outline: none;
    }

    button.secondary {
      background: linear-gradient(140deg, #3f7bbc, #315f96);
    }

    button.ghost {
      background: linear-gradient(140deg, #456f9f, #365984);
    }

    #startBtn {
      background: linear-gradient(140deg, #e8a72a, #ca741f);
    }

    button.mode-btn {
      background: linear-gradient(140deg, #6a89af, #4d6f97);
      box-shadow: none;
    }

    button.mode-btn.active {
      background: linear-gradient(140deg, #eead2d, #cb7720);
      box-shadow: inset 0 1px 0 rgba(255, 249, 233, 0.45);
      filter: none;
    }

    .board {
      position: relative;
      width: 100%;
      border-radius: 22px;
      overflow: hidden;
      border: 3px solid rgba(18, 58, 100, 0.14);
      box-shadow: 0 18px 30px rgba(20, 86, 129, 0.22);
      background: linear-gradient(180deg, #95e4ff 0%, #f8f4cb 100%);
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      touch-action: none;
      cursor: crosshair;
    }

    .note {
      text-align: center;
      font-size: 0.88rem;
      color: #1f5785;
      font-weight: 700;
      opacity: 0.92;
    }

    @media (max-width: 860px) {
      body {
        padding: 8px;
      }

      .hud {
        border-radius: 14px;
        padding: 8px;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        grid-template-areas:
          "title"
          "meta"
          "controls";
      }

      button {
        padding: 8px 10px;
      }

      .meta-column {
        min-width: 0;
        align-items: stretch;
      }

      .stats,
      .mode-controls {
        justify-content: center;
      }

      .note {
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hud" role="group" aria-label="Math Cannon game panel">
      <div class="title-wrap">
        <div class="title">Pirate Math Cannon</div>
        <div id="equationText" class="equation">Tap Start</div>
      </div>
      <div class="meta-column">
        <div class="stats">
          <div id="coinsChip" class="chip">Coins: 0</div>
          <div id="scoreChip" class="chip">Score: 0</div>
          <div id="streakChip" class="chip">Streak: 0</div>
          <div id="levelChip" class="chip">Level 1</div>
        </div>
        <div class="mode-controls" role="group" aria-label="Math mode">
          <button type="button" class="mode-btn active" data-mode="addition">Addition</button>
          <button type="button" class="mode-btn" data-mode="subtraction">Subtraction</button>
          <button type="button" class="mode-btn" data-mode="mixed">Mixed</button>
        </div>
      </div>
      <div class="controls">
        <button id="startBtn" type="button">Start</button>
        <button id="shopBtn" type="button" class="ghost">Port Shop</button>
        <button id="resetBtn" type="button" class="secondary">Reset</button>
        <button id="soundBtn" type="button" class="ghost">Sound: On</button>
        <button id="fullscreenBtn" type="button" class="ghost">Fullscreen (F)</button>
      </div>
    </div>

    <div class="board">
      <canvas id="gameCanvas" width="1280" height="720" aria-label="Math Cannon gameplay"></canvas>
    </div>

    <div class="note">Choose mode (A/S/X), earn coin streaks, open Port Shop (B), then aim with mouse/touch and tap a ship or press 1, 2, 3.</div>
  </div>

  <script>
    (function () {
      "use strict";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const equationText = document.getElementById("equationText");
      const coinsChip = document.getElementById("coinsChip");
      const scoreChip = document.getElementById("scoreChip");
      const streakChip = document.getElementById("streakChip");
      const levelChip = document.getElementById("levelChip");
      const startBtn = document.getElementById("startBtn");
      const shopBtn = document.getElementById("shopBtn");
      const resetBtn = document.getElementById("resetBtn");
      const fullscreenBtn = document.getElementById("fullscreenBtn");
      const soundBtn = document.getElementById("soundBtn");
      const modeButtons = Array.from(document.querySelectorAll(".mode-btn"));

      const state = {
        mode: "menu",
        width: 1280,
        height: 720,
        time: 0,
        score: 0,
        streak: 0,
        bestStreak: 0,
        coins: 0,
        level: 1,
        totalCorrect: 0,
        modeCorrect: { addition: 0, subtraction: 0, mixed: 0 },
        mathMode: "addition",
        round: 0,
        roundCoins: 0,
        roundLuckyUsed: false,
        roundSolved: false,
        equation: null,
        targets: [],
        projectile: null,
        particles: [],
        popups: [],
        lightningBolts: [],
        clouds: [],
        ships: [],
        wavePhase: 0,
        cannonAngle: -Math.PI * 0.5,
        cannonRecoil: 0,
        shotPulse: 0,
        screenShake: 0,
        flashAlpha: 0,
        pointer: { x: 0, y: 0, active: false },
        resolving: false,
        resolveTimer: 0,
        message: "Ahoy! Tap Start to begin your math voyage!",
        roundMessage: "",
        modeBeforePort: "menu",
        portReturnToRound: false,
        portUiRegions: [],
        shop: {
          owned: {},
          equipped: {
            cannonSkin: "default",
            flag: "default",
            deckTrim: "default",
            companion: "none",
            bonus: "none"
          }
        },
        soundEnabled: true,
        audioUnlocked: false,
        audioContext: null,
        audioMaster: null,
        audioCompressor: null,
        audioAmbience: null,
        musicState: null,
        monkeyChatterTimer: 5.4,
        animationFrame: null
      };

      const palette = [
        { base: "#ffd166", rim: "#b67616", text: "#17334a" },
        { base: "#4cc9f0", rim: "#0f7fae", text: "#17334a" },
        { base: "#95e06c", rim: "#4f992d", text: "#17334a" }
      ];

      const SAVE_KEY = "pirate_math_cannon_progress_v1";
      const SAVE_VERSION = 1;
      const STREAK_BONUS = { 3: 2, 5: 4, 8: 7 };
      const SHOP_ITEMS = [
        { id: "cannon-brass", name: "Stormforged Cannon", cost: 46, category: "cannonSkin", style: "storm", rarity: "Epic", blurb: "Crackling coils and thunder recoil." },
        { id: "cannon-royal", name: "Dragonfire Cannon", cost: 132, category: "cannonSkin", style: "dragon", rarity: "Legendary", blurb: "Dragon maw muzzle and ember blasts." },
        { id: "cannon-leviathan", name: "Leviathan Dread Cannon", cost: 188, category: "cannonSkin", style: "royal", rarity: "Mythic", blurb: "Sea-rune core and ghostwake shells." },
        { id: "flag-crimson", name: "Kraken War Flag", cost: 24, category: "flag", style: "kraken", rarity: "Rare", blurb: "Sea-beast banner for your mast." },
        { id: "flag-skull", name: "Ghost Captain Flag", cost: 52, category: "flag", style: "ghost", rarity: "Epic", blurb: "Haunted flag with spectral mark." },
        { id: "trim-gold", name: "Treasure Deck Trim", cost: 28, category: "deckTrim", style: "treasure", rarity: "Rare", blurb: "Polished planks and gold rails." },
        { id: "trim-obsidian", name: "Shadow Deck", cost: 66, category: "deckTrim", style: "shadow", rarity: "Epic", blurb: "Dark warship styling." },
        { id: "pet-parrot", name: "Parrot Ace", cost: 74, category: "companion", style: "parrot", rarity: "Rare", blurb: "Talkative first mate on deck." },
        { id: "pet-monkey", name: "Monkey First Mate", cost: 130, category: "companion", style: "monkey", rarity: "Legendary", blurb: "Mischief mascot with pirate swagger." },
        { id: "bonus-lucky", name: "Lucky Barrel", cost: 84, category: "bonus", style: "lucky", rarity: "Epic", blurb: "+1 coin on first correct each round." },
        { id: "bonus-spyglass", name: "Spyglass Charm", cost: 92, category: "bonus", style: "spyglass", rarity: "Epic", blurb: "Sinks one wrong ship each round." },
        { id: "bonus-lightning", name: "Chain Lightning Shot", cost: 148, category: "bonus", style: "lightning", rarity: "Mythic", blurb: "Bolts jump ships with thunder shockwaves." }
      ];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function randInt(min, max) {
        return Math.floor(rand(min, max + 1));
      }

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function shuffle(values) {
        for (let i = values.length - 1; i > 0; i -= 1) {
          const j = randInt(0, i);
          const t = values[i];
          values[i] = values[j];
          values[j] = t;
        }
        return values;
      }

      function cloneDefaultEquipped() {
        return {
          cannonSkin: "default",
          flag: "default",
          deckTrim: "default",
          companion: "none",
          bonus: "none"
        };
      }

      function getItemById(itemId) {
        return SHOP_ITEMS.find((item) => item.id === itemId) || null;
      }

      function isItemOwned(itemId) {
        return !!state.shop.owned[itemId];
      }

      function isItemEquipped(itemId) {
        const item = getItemById(itemId);
        if (!item) return false;
        return state.shop.equipped[item.category] === item.id;
      }

      function saveProgress() {
        try {
          const payload = {
            version: SAVE_VERSION,
            coins: state.coins,
            bestStreak: state.bestStreak,
            shop: {
              owned: state.shop.owned,
              equipped: state.shop.equipped
            }
          };
          window.localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
        } catch (_) {}
      }

      function loadProgress() {
        try {
          const raw = window.localStorage.getItem(SAVE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (!parsed || parsed.version !== SAVE_VERSION) return;
          state.coins = Math.max(0, Number(parsed.coins) || 0);
          state.bestStreak = Math.max(0, Number(parsed.bestStreak) || 0);
          state.shop.owned = parsed.shop && parsed.shop.owned && typeof parsed.shop.owned === "object"
            ? parsed.shop.owned
            : {};
          const loadedEquipped = parsed.shop && parsed.shop.equipped && typeof parsed.shop.equipped === "object"
            ? parsed.shop.equipped
            : {};
          state.shop.equipped = Object.assign(cloneDefaultEquipped(), loadedEquipped);

          const legacyStyleToItem = {
            cannonSkin: { storm: "cannon-brass", dragon: "cannon-royal", royal: "cannon-leviathan" },
            flag: { kraken: "flag-crimson", ghost: "flag-skull" },
            deckTrim: { treasure: "trim-gold", shadow: "trim-obsidian" },
            companion: { parrot: "pet-parrot", monkey: "pet-monkey" },
            bonus: { lucky: "bonus-lucky", spyglass: "bonus-spyglass", lightning: "bonus-lightning" }
          };
          for (const slot of Object.keys(state.shop.equipped)) {
            const value = state.shop.equipped[slot];
            if (!value || value === "default" || value === "none") continue;
            const mappedId = legacyStyleToItem[slot] && legacyStyleToItem[slot][value];
            if (mappedId) {
              state.shop.equipped[slot] = mappedId;
              state.shop.owned[mappedId] = true;
            }
          }

          for (const slot of Object.keys(state.shop.equipped)) {
            const itemId = state.shop.equipped[slot];
            if (itemId === "default" || itemId === "none") continue;
            const item = getItemById(itemId);
            if (!item || item.category !== slot || !isItemOwned(itemId)) {
              state.shop.equipped[slot] = slot === "bonus" || slot === "companion" ? "none" : "default";
            }
          }
        } catch (_) {}
      }

      function coinBonusForStreak(streak) {
        return STREAK_BONUS[streak] || 0;
      }

      function isBonusEquipped(style) {
        const bonusId = state.shop.equipped.bonus;
        if (!bonusId || bonusId === "none") return false;
        const bonusItem = getItemById(bonusId);
        return !!bonusItem && bonusItem.style === style;
      }

      function equippedStyle(category, fallback) {
        const itemId = state.shop.equipped[category];
        if (!itemId || itemId === "none" || itemId === "default") return fallback;
        const item = getItemById(itemId);
        return item ? item.style : fallback;
      }

      function rarityColor(rarity) {
        if (rarity === "Mythic") return "#a43de8";
        if (rarity === "Legendary") return "#d8731f";
        if (rarity === "Epic") return "#2c6fc4";
        if (rarity === "Rare") return "#2a8c57";
        return "#6a6a6a";
      }

      function awardCoins(amount, sourceText, x, y, color) {
        if (amount <= 0) return;
        state.coins += amount;
        state.roundCoins += amount;
        state.popups.push({
          text: "+" + amount + " coin" + (amount > 1 ? "s" : ""),
          x,
          y,
          life: 0.88,
          color: color || "#d48a20"
        });
        if (sourceText) {
          state.message = sourceText;
        }
        saveProgress();
      }

      function equipItem(itemId) {
        const item = getItemById(itemId);
        if (!item) return false;
        if (!isItemOwned(itemId)) return false;
        state.shop.equipped[item.category] = item.id;
        if (item.category === "companion" && item.style === "monkey") {
          state.monkeyChatterTimer = rand(1.2, 2.8);
        }
        saveProgress();
        return true;
      }

      function buyOrEquipItem(itemId) {
        const item = getItemById(itemId);
        if (!item) return { ok: false, reason: "missing" };
        if (isItemOwned(itemId)) {
          equipItem(itemId);
          return { ok: true, action: "equipped", item };
        }
        if (state.coins < item.cost) {
          return { ok: false, reason: "coins", item };
        }
        state.coins -= item.cost;
        state.shop.owned[item.id] = true;
        state.shop.equipped[item.category] = item.id;
        saveProgress();
        return { ok: true, action: "bought", item };
      }

      function roundedRectPath(x, y, w, h, radius) {
        const r = Math.max(0, Math.min(radius, Math.min(w, h) * 0.5));
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        state.width = Math.max(320, Math.floor(rect.width));
        state.height = Math.max(240, Math.floor(rect.height));
        canvas.width = Math.floor(state.width * dpr);
        canvas.height = Math.floor(state.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (!state.pointer.active) {
          state.pointer.x = state.width * 0.5;
          state.pointer.y = state.height * 0.33;
        }
        layoutTargets();
      }

      function initSkyObjects() {
        state.clouds = [];
        state.ships = [];

        for (let i = 0; i < 7; i += 1) {
          state.clouds.push({
            x: rand(0, state.width),
            y: rand(40, state.height * 0.42),
            speed: rand(10, 28),
            scale: rand(0.62, 1.36),
            alpha: rand(0.62, 0.95)
          });
        }

        for (let i = 0; i < 3; i += 1) {
          state.ships.push({
            x: rand(0, state.width),
            y: rand(state.height * 0.61, state.height * 0.76),
            speed: rand(10, 26),
            scale: rand(0.72, 1.18),
            bob: rand(0, Math.PI * 2)
          });
        }
      }

      function getModeConfig(mode) {
        if (mode === "subtraction") {
          return { key: "subtraction", label: "Subtraction", op: "-" };
        }
        if (mode === "mixed") {
          return { key: "mixed", label: "Mixed", op: null };
        }
        return { key: "addition", label: "Addition", op: "+" };
      }

      function updateModeButtons() {
        for (const button of modeButtons) {
          const isActive = button.dataset.mode === state.mathMode;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-pressed", isActive ? "true" : "false");
        }
      }

      function getLevelConfig(correctCount) {
        if (correctCount >= 18) {
          return { id: 3, label: "Level 3: Mastery", sumMax: 20, minuendMax: 20, minuendMin: 8 };
        }
        if (correctCount >= 8) {
          return { id: 2, label: "Level 2: Within 20", sumMax: 20, minuendMax: 20, minuendMin: 5 };
        }
        return { id: 1, label: "Level 1: Within 10", sumMax: 10, minuendMax: 10, minuendMin: 3 };
      }

      function buildChoices(answer, levelId) {
        const set = new Set([answer]);
        const span = levelId === 1 ? 3 : 6;
        let guard = 0;

        while (set.size < 3 && guard < 40) {
          guard += 1;
          const offset = randInt(-span, span);
          if (offset === 0) continue;
          const value = answer + offset;
          if (value < 0) continue;
          set.add(value);
        }

        while (set.size < 3) {
          set.add(randInt(0, levelId === 1 ? 12 : 25));
        }

        return shuffle(Array.from(set));
      }

      function generateEquation() {
        const modeCfg = getModeConfig(state.mathMode);
        const modeCorrect = state.modeCorrect[state.mathMode] || 0;
        const cfg = getLevelConfig(modeCorrect);
        const op = modeCfg.key === "mixed" ? (Math.random() < 0.5 ? "+" : "-") : modeCfg.op;
        let a;
        let b;
        let answer;
        const textOp = op === "+" ? "+" : "-";

        if (op === "+") {
          a = randInt(1, Math.max(2, cfg.sumMax - 1));
          b = randInt(1, Math.max(1, cfg.sumMax - a));
          answer = a + b;
        } else {
          a = randInt(cfg.minuendMin, cfg.minuendMax);
          b = randInt(1, Math.max(1, a - 1));
          answer = a - b;
        }

        const choices = buildChoices(answer, cfg.id);
        state.level = cfg.id;

        return {
          a,
          b,
          op,
          answer,
          text: a + " " + textOp + " " + b + " = ?",
          label: cfg.label,
          choices,
          mode: modeCfg.key
        };
      }

      function getTargetRadius() {
        return clamp(Math.min(state.width, state.height) * 0.135, 82, 138);
      }

      function getTargetAnchor(slot) {
        const spread = Math.min(state.width * 0.34, 360);
        const centerX = state.width * 0.5;
        const x = centerX + (slot - 1) * spread;
        const yOffsets = [14, -6, 10];
        const y = state.height * 0.59 + yOffsets[slot];
        return { x, y };
      }

      function layoutTargets() {
        for (const target of state.targets) {
          const anchor = getTargetAnchor(target.slot);
          target.anchorX = anchor.x;
          target.anchorY = anchor.y;
          target.radius = getTargetRadius();
        }
      }

      function createTargets(equation) {
        const slots = shuffle([0, 1, 2]);
        const radius = getTargetRadius();

        state.targets = equation.choices.map((value, i) => {
          const slot = slots[i];
          const anchor = getTargetAnchor(slot);

          return {
            id: "target-" + state.round + "-" + i,
            slot,
            value,
            isCorrect: value === equation.answer,
            anchorX: anchor.x,
            anchorY: anchor.y,
            x: anchor.x,
            y: anchor.y,
            radius,
            themeIndex: i % palette.length,
            phase: rand(0, Math.PI * 2),
            floatSpeed: rand(0.8, 1.6),
            state: "idle",
            resolvedCorrect: false,
            explodeTimer: 0,
            wobbleTimer: 0,
            scale: 1,
            sparklePulse: rand(0, Math.PI * 2)
          };
        });
      }

      function setMathMode(mode) {
        const selected = getModeConfig(mode).key;
        if (selected === state.mathMode) {
          updateModeButtons();
          syncHud();
          return;
        }

        state.mathMode = selected;
        updateModeButtons();

        if (state.mode === "playing") {
          state.message = getModeConfig(selected).label + " mode!";
          state.resolving = false;
          state.resolveTimer = 0;
          state.projectile = null;
          nextRound();
          return;
        }

        if (state.mode === "port" && state.modeBeforePort === "playing" && state.portReturnToRound) {
          state.portReturnToRound = false;
          state.roundMessage = "Mode changed. Leaving port will start a fresh round.";
        }

        syncHud();
      }

      function applyRoundAssist() {
        if (!isBonusEquipped("spyglass")) return;
        const wrongTargets = state.targets.filter((target) => !target.isCorrect && target.state === "idle");
        if (wrongTargets.length < 2) return;
        const removed = pick(wrongTargets);
        removed.state = "sunk";
        removed.scale = 0;
        state.message = "Spyglass cleared one decoy ship!";
      }

      function openPort(options) {
        const opts = options || {};
        state.modeBeforePort = state.mode;
        state.portReturnToRound = !!opts.returnToRound;
        state.mode = "port";
        state.resolving = false;
        state.resolveTimer = 0;
        state.projectile = null;
        state.pointer.active = false;
        state.portUiRegions = [];
        if (opts.roundComplete) {
          state.roundMessage = "Round reward: +" + state.roundCoins + " coins";
          state.message = "Docked at Port! Spend coins or continue sailing.";
        } else {
          state.roundMessage = "";
          state.message = "Port Shop open";
        }
        syncHud();
      }

      function leavePort() {
        const modeBefore = state.modeBeforePort;
        const returnToRound = state.portReturnToRound;
        state.modeBeforePort = "menu";
        state.portReturnToRound = false;
        state.portUiRegions = [];

        if (modeBefore === "playing" && returnToRound) {
          state.mode = "playing";
          state.message = "Back to battle!";
          syncHud();
          return;
        }
        if (modeBefore === "playing") {
          state.mode = "playing";
          nextRound();
          return;
        }
        state.mode = "menu";
        state.message = "Ahoy! Tap Start to begin your math voyage!";
        syncHud();
      }

      function startRun() {
        state.mode = "playing";
        state.score = 0;
        state.streak = 0;
        state.totalCorrect = 0;
        state.modeCorrect = { addition: 0, subtraction: 0, mixed: 0 };
        state.round = 0;
        state.roundCoins = 0;
        state.roundLuckyUsed = false;
        state.roundSolved = false;
        state.roundMessage = "";
        state.message = "Choose the correct answer, captain!";
        state.projectile = null;
        state.particles.length = 0;
        state.popups.length = 0;
        state.lightningBolts.length = 0;
        state.resolving = false;
        state.resolveTimer = 0;
        nextRound();
      }

      function resetRound() {
        if (state.mode === "menu") {
          startRun();
        } else {
          state.score = 0;
          state.streak = 0;
          state.totalCorrect = 0;
          state.modeCorrect = { addition: 0, subtraction: 0, mixed: 0 };
          state.roundCoins = 0;
          state.roundLuckyUsed = false;
          state.roundSolved = false;
          state.roundMessage = "";
          nextRound();
        }
      }

      function nextRound() {
        state.round += 1;
        state.resolving = false;
        state.resolveTimer = 0;
        state.projectile = null;
        state.lightningBolts.length = 0;
        state.roundCoins = 0;
        state.roundLuckyUsed = false;
        state.roundSolved = false;
        state.roundMessage = "";
        state.popups.push({
          text: pick(["Ahoy!", "Cannons ready!", "Steady, captain!", "Math treasure!"]),
          x: state.width * 0.5,
          y: state.height * 0.2,
          life: 0.9,
          color: "#0f4f88"
        });

        const equation = generateEquation();
        state.equation = equation;
        state.message = "Fire at the correct ship";
        createTargets(equation);
        applyRoundAssist();
        syncHud();
      }

      function syncHud() {
        const modeLabel = getModeConfig(state.mathMode).label;
        equationText.textContent = state.mode === "playing" && state.equation
          ? state.equation.text
          : state.mode === "port"
            ? "Port Shop"
            : "Tap Start";
        coinsChip.textContent = "Coins: " + state.coins;
        scoreChip.textContent = "Score: " + state.score;
        streakChip.textContent = "Streak: " + state.streak;
        levelChip.textContent = modeLabel + " | " + (state.equation ? state.equation.label : "Level 1: Within 10");
        soundBtn.textContent = "Sound: " + (state.soundEnabled ? "On" : "Off");
        shopBtn.textContent = state.mode === "port" ? "Leave Port" : "Port Shop";
        updateModeButtons();
      }

      function getCannonOrigin() {
        return {
          x: state.width * 0.5,
          y: state.height * 0.88
        };
      }

      function updateCannonAim(dt) {
        const origin = getCannonOrigin();
        const aimX = state.pointer.active ? state.pointer.x : state.width * 0.5;
        const aimY = state.pointer.active ? state.pointer.y : state.height * 0.32;
        const minAngle = -Math.PI + 0.25;
        const maxAngle = -0.1;
        const desired = clamp(Math.atan2(aimY - origin.y, aimX - origin.x), minAngle, maxAngle);
        const diff = ((desired - state.cannonAngle + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
        state.cannonAngle += diff * Math.min(1, dt * 14);
      }

      function ensureAudio() {
        if (!state.soundEnabled) return null;
        if (!state.audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return null;
          state.audioContext = new AudioContextClass();
          state.audioMaster = state.audioContext.createGain();
          state.audioMaster.gain.value = 0.17;
          state.audioCompressor = state.audioContext.createDynamicsCompressor();
          state.audioCompressor.threshold.value = -20;
          state.audioCompressor.knee.value = 18;
          state.audioCompressor.ratio.value = 3.2;
          state.audioCompressor.attack.value = 0.005;
          state.audioCompressor.release.value = 0.19;
          state.audioMaster.connect(state.audioCompressor);
          state.audioCompressor.connect(state.audioContext.destination);
          initAmbienceAudio();
        }
        if (state.audioContext.state === "suspended") {
          state.audioContext.resume().catch(() => {});
        }
        if (!state.audioAmbience) {
          initAmbienceAudio();
        }
        state.audioUnlocked = true;
        return state.audioContext;
      }

      function initAmbienceAudio() {
        if (!state.audioContext || !state.audioMaster || state.audioAmbience) return;
        const ac = state.audioContext;

        const noiseLength = Math.floor(ac.sampleRate * 2.4);
        const noiseBuffer = ac.createBuffer(1, noiseLength, ac.sampleRate);
        const channel = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseLength; i += 1) {
          const t = i / noiseLength;
          channel[i] = (Math.random() * 2 - 1) * (0.52 + 0.48 * Math.sin(t * Math.PI * 6));
        }

        const seaNoise = ac.createBufferSource();
        seaNoise.buffer = noiseBuffer;
        seaNoise.loop = true;

        const seaHigh = ac.createBiquadFilter();
        seaHigh.type = "highpass";
        seaHigh.frequency.value = 70;
        const seaLow = ac.createBiquadFilter();
        seaLow.type = "lowpass";
        seaLow.frequency.value = 980;
        const seaGain = ac.createGain();
        seaGain.gain.value = 0.0001;

        const windOsc = ac.createOscillator();
        windOsc.type = "triangle";
        windOsc.frequency.value = 152;
        const windGain = ac.createGain();
        windGain.gain.value = 0.0001;

        const creakOsc = ac.createOscillator();
        creakOsc.type = "sine";
        creakOsc.frequency.value = 38;
        const creakGain = ac.createGain();
        creakGain.gain.value = 0.0001;

        const lfo = ac.createOscillator();
        lfo.type = "sine";
        lfo.frequency.value = 0.11;
        const lfoToWind = ac.createGain();
        lfoToWind.gain.value = 26;
        const lfoToSea = ac.createGain();
        lfoToSea.gain.value = 180;

        seaNoise.connect(seaHigh);
        seaHigh.connect(seaLow);
        seaLow.connect(seaGain);
        seaGain.connect(state.audioMaster);

        windOsc.connect(windGain);
        windGain.connect(state.audioMaster);
        creakOsc.connect(creakGain);
        creakGain.connect(state.audioMaster);

        lfo.connect(lfoToWind);
        lfoToWind.connect(windOsc.frequency);
        lfo.connect(lfoToSea);
        lfoToSea.connect(seaLow.frequency);

        seaNoise.start();
        windOsc.start();
        creakOsc.start();
        lfo.start();

        state.audioAmbience = {
          seaGain,
          windGain,
          creakGain,
          windOsc,
          creakOsc,
          seaLow,
          lfo
        };
      }

      function updateAmbienceAudio(dt) {
        if (!state.audioContext || !state.audioAmbience) return;
        const amb = state.audioAmbience;
        const enabled = state.soundEnabled && state.audioUnlocked;
        const isPlay = state.mode === "playing";
        const seaTargetBase = !enabled ? 0 : isPlay ? 0.058 : 0.032;
        const windTargetBase = !enabled ? 0 : isPlay ? 0.026 : 0.014;
        const creakTargetBase = !enabled ? 0 : isPlay ? 0.011 : 0.004;

        const waveEnergy = 0.5 + 0.5 * Math.sin(state.wavePhase * 0.55 + state.time * 0.35);
        const resolveBoost = state.resolving ? 1.18 : 1;
        const smooth = Math.min(1, dt * 8.5);

        const seaTarget = seaTargetBase * (0.76 + 0.42 * waveEnergy) * resolveBoost;
        const windTarget = windTargetBase * (0.74 + 0.44 * waveEnergy);
        const creakTarget = creakTargetBase * (0.72 + 0.5 * (1 - waveEnergy));

        amb.seaGain.gain.value += (seaTarget - amb.seaGain.gain.value) * smooth;
        amb.windGain.gain.value += (windTarget - amb.windGain.gain.value) * smooth;
        amb.creakGain.gain.value += (creakTarget - amb.creakGain.gain.value) * smooth;

        amb.windOsc.frequency.value = 132 + waveEnergy * 28;
        amb.creakOsc.frequency.value = 31 + Math.sin(state.time * 0.73 + state.wavePhase * 0.3) * 5;
        amb.seaLow.frequency.value = 760 + waveEnergy * 420;
      }

      function initMusicState() {
        if (state.musicState) return;
        state.musicState = {
          nextTime: 0,
          step: 0
        };
      }

      function scheduleMusicLoop() {
        if (!state.audioContext || !state.soundEnabled || !state.audioUnlocked) return;
        initMusicState();
        const ac = state.audioContext;
        const music = state.musicState;
        const bpm = 124;
        const stepDur = (60 / bpm) / 2;
        const leadPattern = [293.66, 329.63, 349.23, 392.0, 440.0, 466.16, 523.25, 466.16, 440.0, 392.0, 349.23, 329.63, 293.66, 329.63, 349.23, 392.0];
        const bassPattern = [146.83, 146.83, 110.0, 146.83, 130.81, 130.81, 98.0, 130.81, 146.83, 146.83, 110.0, 146.83, 123.47, 123.47, 98.0, 123.47];
        const harmonyPattern = [220.0, 246.94, 261.63, 293.66, 246.94, 293.66, 329.63, 349.23, 220.0, 246.94, 261.63, 293.66, 233.08, 261.63, 293.66, 329.63];
        const drumPattern = [1, 0, 0.45, 0, 0.86, 0, 0.38, 0, 1, 0, 0.5, 0, 0.8, 0, 0.42, 0];

        if (music.nextTime <= 0) {
          music.nextTime = ac.currentTime + 0.05;
        }
        if (music.nextTime < ac.currentTime - 1) {
          music.nextTime = ac.currentTime + 0.05;
        }

        while (music.nextTime < ac.currentTime + 0.35) {
          const step = music.step % 16;
          const delay = Math.max(0, music.nextTime - ac.currentTime);
          const accent = step % 4 === 0;
          const ghostBeat = step % 4 === 2;
          const playGain = state.mode === "playing" ? 1 : 0.62;
          const lead = leadPattern[step];
          const bass = bassPattern[step];
          const drumPower = drumPattern[step];

          playTone(lead, 0.2, "triangle", (accent ? 0.038 : 0.026) * playGain, delay);
          playTone(lead * 2, 0.11, "sine", (accent ? 0.015 : 0.01) * playGain, delay + 0.01);
          playTone(bass, 0.28, "sawtooth", (accent ? 0.03 : 0.022) * playGain, delay);
          playTone(harmonyPattern[step], 0.24, "triangle", (accent ? 0.018 : 0.012) * playGain, delay + 0.015);
          if (drumPower > 0) {
            playNoiseBurst(0.06, (0.028 + drumPower * 0.028) * playGain, 1200, 70, delay);
            playSweepTone(172, 58, 0.11, "sine", (0.04 + drumPower * 0.028) * playGain, delay);
          }
          if (ghostBeat) {
            playNoiseBurst(0.03, 0.02 * playGain, 6800, 2200, delay + 0.03);
          }

          if (accent) {
            playNoiseBurst(0.05, 0.04 * playGain, 980, 120, delay);
            playSweepTone(96, 54, 0.12, "sine", 0.04 * playGain, delay);
          }

          if (step % 8 === 4) {
            playTone(220, 0.35, "triangle", 0.012 * playGain, delay);
            playTone(261.63, 0.35, "triangle", 0.011 * playGain, delay + 0.01);
            playTone(329.63, 0.35, "triangle", 0.01 * playGain, delay + 0.02);
          }

          music.nextTime += stepDur;
          music.step += 1;
        }
      }

      function playTone(freq, duration, type, gainValue, delay) {
        const ac = ensureAudio();
        if (!ac || !state.audioMaster || !state.soundEnabled) return;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        const startAt = ac.currentTime + (delay || 0);
        const endAt = startAt + duration;

        osc.type = type || "sine";
        osc.frequency.setValueAtTime(freq, startAt);

        gain.gain.setValueAtTime(0.001, startAt);
        gain.gain.exponentialRampToValueAtTime(gainValue, startAt + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, endAt);

        osc.connect(gain);
        gain.connect(state.audioMaster);
        osc.start(startAt);
        osc.stop(endAt + 0.02);
      }

      function playSweepTone(startFreq, endFreq, duration, type, gainValue, delay) {
        const ac = ensureAudio();
        if (!ac || !state.audioMaster || !state.soundEnabled) return;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        const startAt = ac.currentTime + (delay || 0);
        const endAt = startAt + duration;

        osc.type = type || "sine";
        osc.frequency.setValueAtTime(Math.max(22, startFreq), startAt);
        osc.frequency.exponentialRampToValueAtTime(Math.max(22, endFreq), endAt);

        gain.gain.setValueAtTime(0.001, startAt);
        gain.gain.exponentialRampToValueAtTime(gainValue, startAt + Math.min(0.03, duration * 0.25));
        gain.gain.exponentialRampToValueAtTime(0.001, endAt);

        osc.connect(gain);
        gain.connect(state.audioMaster);
        osc.start(startAt);
        osc.stop(endAt + 0.02);
      }

      function playNoiseBurst(duration, gainValue, lowpassFreq, highpassFreq, delay) {
        const ac = ensureAudio();
        if (!ac || !state.audioMaster || !state.soundEnabled) return;

        const sampleRate = ac.sampleRate;
        const frameCount = Math.max(1, Math.floor(sampleRate * duration));
        const buffer = ac.createBuffer(1, frameCount, sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < frameCount; i += 1) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / frameCount);
        }

        const source = ac.createBufferSource();
        source.buffer = buffer;

        const gain = ac.createGain();
        const lowpass = ac.createBiquadFilter();
        const highpass = ac.createBiquadFilter();
        lowpass.type = "lowpass";
        lowpass.frequency.value = lowpassFreq;
        highpass.type = "highpass";
        highpass.frequency.value = highpassFreq;

        const startAt = ac.currentTime + (delay || 0);
        const endAt = startAt + duration;
        gain.gain.setValueAtTime(0.001, startAt);
        gain.gain.exponentialRampToValueAtTime(gainValue, startAt + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, endAt);

        source.connect(highpass);
        highpass.connect(lowpass);
        lowpass.connect(gain);
        gain.connect(state.audioMaster);
        source.start(startAt);
        source.stop(endAt + 0.02);
      }
