<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ten Frame Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --primary: #6c5ce7;
    --primary-light: #a29bfe;
    --accent: #fd79a8;
    --success: #00b894;
    --warning: #fdcb6e;
    --info: #74b9ff;
    --text: #2d3436;
    --text-light: #636e72;
    --shadow: 0 8px 30px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Floating background shapes */
  .bg-shapes {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-shapes .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.08;
    animation: floatShape 20s ease-in-out infinite;
  }
  .bg-shapes .shape:nth-child(1) { width: 300px; height: 300px; background: #6c5ce7; top: -50px; left: -50px; animation-delay: 0s; }
  .bg-shapes .shape:nth-child(2) { width: 200px; height: 200px; background: #fd79a8; top: 30%; right: -30px; animation-delay: -5s; }
  .bg-shapes .shape:nth-child(3) { width: 250px; height: 250px; background: #00b894; bottom: -40px; left: 30%; animation-delay: -10s; }
  .bg-shapes .shape:nth-child(4) { width: 180px; height: 180px; background: #fdcb6e; top: 60%; left: -20px; animation-delay: -15s; }
  .bg-shapes .shape:nth-child(5) { width: 220px; height: 220px; background: #74b9ff; bottom: 10%; right: 10%; animation-delay: -8s; }

  @keyframes floatShape {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -30px) scale(1.05); }
    50% { transform: translate(-20px, 20px) scale(0.95); }
    75% { transform: translate(10px, 40px) scale(1.02); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    font-size: 2.4rem;
    font-weight: 900;
    background: linear-gradient(135deg, #6c5ce7, #fd79a8, #00b894);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  header p {
    color: var(--text-light);
    font-size: 1.05rem;
    font-weight: 600;
  }

  /* Mode Tabs */
  .mode-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .mode-tab {
    padding: 10px 22px;
    border-radius: 50px;
    border: 2px solid #e0e0e0;
    background: white;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    color: var(--text-light);
  }
  .mode-tab:hover {
    border-color: var(--primary-light);
    color: var(--primary);
    transform: translateY(-1px);
  }
  .mode-tab.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
  }

  /* Counter Style Picker */
  .picker-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .picker-label {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .color-options, .shape-options {
    display: flex;
    gap: 8px;
  }
  .color-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }
  .color-btn:hover { transform: scale(1.15); }
  .color-btn.active { border-color: var(--text); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--text); }

  .shape-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 2px solid #e0e0e0;
    background: white;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shape-btn:hover { border-color: var(--primary-light); transform: scale(1.1); }
  .shape-btn.active { border-color: var(--primary); background: #f0edff; }

  /* Number Display */
  .number-display {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
  }
  .big-number {
    font-size: 5rem;
    font-weight: 900;
    line-height: 1;
    transition: all 0.3s ease;
    display: inline-block;
  }
  .big-number.pop {
    animation: popNumber 0.35s ease;
  }
  @keyframes popNumber {
    0% { transform: scale(1); }
    40% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .number-word {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-light);
    margin-top: 2px;
  }
  .equation {
    font-size: 1.6rem;
    font-weight: 800;
    margin-top: 8px;
    color: var(--primary);
    min-height: 2rem;
  }

  /* Ten Frame */
  .frames-area {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .ten-frame-wrapper {
    position: relative;
  }
  .ten-frame-label {
    text-align: center;
    font-weight: 800;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  .ten-frame {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 6px;
    background: var(--card);
    padding: 12px;
    border-radius: 20px;
    box-shadow: var(--shadow);
    border: 3px solid #e8e8e8;
    transition: border-color 0.3s ease;
  }
  .ten-frame:hover {
    border-color: var(--primary-light);
  }
  .ten-frame.full {
    border-color: var(--success);
    box-shadow: 0 8px 30px rgba(0, 184, 148, 0.15);
  }

  .cell {
    width: 72px;
    height: 72px;
    border-radius: 14px;
    background: #f5f6fa;
    border: 2.5px dashed #d1d5db;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    transition: all 0.2s ease;
    position: relative;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cell:hover {
    background: #eee;
    border-color: #aaa;
    transform: scale(1.04);
  }
  .cell.filled {
    border: none;
  }
  .cell.filled.animate-in {
    animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  .cell.filled:hover {
    transform: scale(1.08);
  }
  .cell.removing .counter-shape {
    animation: popOut 0.3s ease forwards;
  }

  .counter-shape {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    font-size: 1.6rem;
    color: white;
    font-weight: 900;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    box-shadow: 0 3px 8px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.3);
    transition: transform 0.2s ease;
  }

  @keyframes bounceIn {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes popOut {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }

  /* Buttons */
  .button-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 28px;
    border-radius: 50px;
    border: none;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-primary {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: white;
    box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
  }
  .btn-primary:hover { box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4); }

  .btn-success {
    background: linear-gradient(135deg, #00b894, #55efc4);
    color: white;
    box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
  }

  .btn-danger {
    background: linear-gradient(135deg, #e17055, #fab1a0);
    color: white;
    box-shadow: 0 4px 15px rgba(225, 112, 85, 0.3);
  }

  .btn-warning {
    background: linear-gradient(135deg, #fdcb6e, #ffeaa7);
    color: #2d3436;
    box-shadow: 0 4px 15px rgba(253, 203, 110, 0.3);
  }

  .btn-outline {
    background: white;
    color: var(--text);
    border: 2px solid #e0e0e0;
  }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

  /* Making 10 display */
  .making-ten {
    text-align: center;
    padding: 16px 24px;
    background: linear-gradient(135deg, #dfe6e9, #f5f6fa);
    border-radius: 16px;
    margin-bottom: 20px;
    font-size: 1.3rem;
    font-weight: 800;
  }
  .making-ten .highlight {
    color: var(--primary);
  }

  /* Compare quiz */
  .compare-quiz {
    text-align: center;
    margin-bottom: 20px;
    display: none;
  }
  .compare-question {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 12px;
  }
  .compare-choices {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .compare-choices .btn {
    min-width: 120px;
    justify-content: center;
  }
  .compare-result {
    font-size: 1.3rem;
    font-weight: 800;
    margin-top: 14px;
    min-height: 1.8rem;
  }
  .compare-result.correct { color: var(--success); }
  .compare-result.wrong { color: #e17055; }
  .compare-reveal {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--primary);
    margin-top: 8px;
  }
  .compare-score {
    font-size: 0.95rem;
    color: var(--text-light);
    font-weight: 600;
    margin-top: 6px;
  }

  /* Addition quiz */
  .addition-quiz {
    text-align: center;
    margin-bottom: 20px;
    display: none;
  }
  .addition-equation {
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .addition-equation .num-a,
  .addition-equation .num-b {
    min-width: 50px;
  }
  .addition-equation input {
    width: 80px;
    height: 60px;
    font-size: 2.4rem;
    font-weight: 900;
    text-align: center;
    border-radius: 14px;
    border: 3px solid #e0e0e0;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    color: var(--primary);
  }
  .addition-equation input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
  }
  .addition-equation input.correct-answer {
    border-color: var(--success);
    background: #f0fff4;
    box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.2);
  }
  .addition-equation input.wrong-answer {
    border-color: #e17055;
    background: #fff5f5;
    animation: wrongShake 0.4s ease;
  }
  .addition-result {
    font-size: 1.3rem;
    font-weight: 800;
    min-height: 1.8rem;
    margin-top: 6px;
  }
  .addition-result.correct { color: var(--success); }
  .addition-result.wrong { color: #e17055; }
  .addition-score {
    font-size: 0.95rem;
    color: var(--text-light);
    font-weight: 600;
    margin-top: 4px;
  }

  /* Clickable frames in compare mode */
  .ten-frame-wrapper.clickable {
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .ten-frame-wrapper.clickable:hover .ten-frame {
    border-color: var(--primary);
    box-shadow: 0 8px 30px rgba(108, 92, 231, 0.2);
  }
  .ten-frame-wrapper.clickable:hover {
    transform: scale(1.02);
  }
  .ten-frame-wrapper.clickable .cell {
    cursor: pointer;
    pointer-events: none; /* let clicks pass through to wrapper */
  }
  .ten-frame-wrapper.compare-correct .ten-frame {
    border-color: var(--success) !important;
    box-shadow: 0 0 0 4px rgba(0, 184, 148, 0.3), 0 8px 30px rgba(0, 184, 148, 0.2) !important;
    animation: correctPulse 0.5s ease;
  }
  .ten-frame-wrapper.compare-wrong .ten-frame {
    border-color: #e17055 !important;
    box-shadow: 0 0 0 4px rgba(225, 112, 85, 0.3) !important;
    animation: wrongShake 0.4s ease;
  }
  .ten-frame-wrapper.compare-dim {
    opacity: 0.5;
    transform: scale(0.97);
  }
  @keyframes correctPulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.04); }
    60% { transform: scale(0.98); }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  .compare-count-reveal {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 900;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .compare-count-reveal.visible {
    opacity: 1;
  }

  /* Celebration overlay */
  .celebration {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 1.5s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Subitizing Flash Mode */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    backdrop-filter: blur(4px);
  }
  .flash-card {
    background: white;
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    max-width: 500px;
    width: 90%;
  }
  .flash-card h2 {
    font-size: 1.5rem;
    margin-bottom: 12px;
    color: var(--primary);
  }
  .flash-card .flash-ten-frame {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    padding: 12px;
    margin: 16px auto;
    max-width: 340px;
    background: #f5f6fa;
    border-radius: 16px;
  }
  .flash-card .flash-cell {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: #eee;
    border: 2px dashed #d1d5db;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .flash-card .flash-cell .counter-shape {
    width: 38px;
    height: 38px;
    font-size: 1.2rem;
  }
  .flash-input {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
  }
  .flash-input input {
    width: 80px;
    height: 50px;
    font-size: 1.8rem;
    font-weight: 800;
    text-align: center;
    border-radius: 12px;
    border: 3px solid #e0e0e0;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .flash-input input:focus {
    border-color: var(--primary);
  }
  .flash-result {
    font-size: 1.5rem;
    font-weight: 800;
    margin-top: 16px;
    min-height: 2rem;
  }
  .flash-result.correct { color: var(--success); }
  .flash-result.wrong { color: #e17055; }
  .flash-score {
    font-size: 0.95rem;
    color: var(--text-light);
    font-weight: 600;
    margin-top: 8px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .cell { width: 54px; height: 54px; }
    .counter-shape { width: 40px; height: 40px; font-size: 1.2rem; }
    .big-number { font-size: 3.5rem; }
    .frames-area { gap: 16px; }
    .ten-frame { padding: 8px; gap: 4px; }
    .btn { padding: 10px 20px; font-size: 0.9rem; }
  }

  /* Print styles */
  @media print {
    .bg-shapes, .mode-tabs, .picker-row, .button-row, header p { display: none; }
    body { background: white; }
    .ten-frame { box-shadow: none; border: 2px solid #333; }
    .cell { border: 1.5px dashed #999; }
  }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<div class="container">
  <header>
    <h1>Ten Frame Builder</h1>
    <p>Click the cells to add or remove counters!</p>
  </header>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="free">Free Play</button>
    <button class="mode-tab" data-mode="addition">Addition</button>
    <button class="mode-tab" data-mode="compare">Compare</button>
    <button class="mode-tab" data-mode="subitize">Subitize Flash</button>
  </div>

  <!-- Counter Customization -->
  <div class="picker-row">
    <span class="picker-label">Color</span>
    <div class="color-options">
      <button class="color-btn active" data-color="#6c5ce7" style="background:#6c5ce7" title="Purple"></button>
      <button class="color-btn" data-color="#e17055" style="background:#e17055" title="Coral"></button>
      <button class="color-btn" data-color="#00b894" style="background:#00b894" title="Green"></button>
      <button class="color-btn" data-color="#0984e3" style="background:#0984e3" title="Blue"></button>
      <button class="color-btn" data-color="#fdcb6e" style="background:#fdcb6e" title="Yellow"></button>
      <button class="color-btn" data-color="#e84393" style="background:#e84393" title="Pink"></button>
    </div>
    <span class="picker-label" style="margin-left: 12px">Shape</span>
    <div class="shape-options">
      <button class="shape-btn active" data-shape="circle" title="Circle">&#9679;</button>
      <button class="shape-btn" data-shape="star" title="Star">&#9733;</button>
      <button class="shape-btn" data-shape="heart" title="Heart">&#9829;</button>
      <button class="shape-btn" data-shape="diamond" title="Diamond">&#9670;</button>
    </div>
  </div>

  <!-- Number Display -->
  <div class="number-display">
    <div class="big-number" id="bigNumber" style="color: #6c5ce7">0</div>
    <div class="number-word" id="numberWord">zero</div>
    <div class="equation" id="equation"></div>
  </div>

  <!-- Making Ten -->
  <div class="making-ten" id="makingTen" style="display:none">
    <span id="makingTenText"></span>
  </div>

  <!-- Addition Quiz -->
  <div class="addition-quiz" id="additionQuiz">
    <div class="addition-equation">
      <span class="num-a" id="addNumA">?</span>
      <span>+</span>
      <span class="num-b" id="addNumB">?</span>
      <span>=</span>
      <input type="number" id="addAnswer" min="0" max="20" placeholder="?">
    </div>
    <div class="addition-result" id="additionResult"></div>
    <div class="addition-score" id="additionScore"></div>
  </div>

  <!-- Compare Quiz -->
  <div class="compare-quiz" id="compareQuiz">
    <div class="compare-question" id="compareQuestion">Tap the group that has more!</div>
    <div class="compare-choices" id="compareChoices">
      <button class="btn btn-warning" id="cmpEqual">They're Equal!</button>
    </div>
    <div class="compare-result" id="compareResult"></div>
    <div class="compare-reveal" id="compareReveal"></div>
    <div class="compare-score" id="compareScore"></div>
  </div>

  <!-- Frames -->
  <div class="frames-area" id="framesArea">
    <!-- Built by JS -->
  </div>

  <!-- Buttons -->
  <div class="button-row">
    <button class="btn btn-success" id="btnFillAll">Fill to 10</button>
    <button class="btn btn-danger" id="btnClear">Clear All</button>
    <button class="btn btn-warning" id="btnRandom">Random</button>
    <button class="btn btn-outline" id="btnPrint" title="Print">Print</button>
  </div>
</div>

<!-- Celebration container -->
<div class="celebration" id="celebration"></div>

<!-- Flash overlay (hidden) -->
<div class="flash-overlay" id="flashOverlay" style="display:none">
  <div class="flash-card">
    <h2 id="flashTitle">How many do you see?</h2>
    <div class="flash-ten-frame" id="flashFrame"></div>
    <div class="flash-input" id="flashInput">
      <input type="number" id="flashAnswer" min="0" max="10" placeholder="?" autofocus>
      <button class="btn btn-primary" id="flashCheck">Check</button>
    </div>
    <div class="flash-result" id="flashResult"></div>
    <div class="flash-score" id="flashScore"></div>
    <div style="margin-top: 16px; display: flex; gap: 10px; justify-content: center;">
      <button class="btn btn-primary" id="flashNext">Next</button>
      <button class="btn btn-outline" id="flashClose">Exit</button>
    </div>
  </div>
</div>

<script>
  const NUM_WORDS = ['zero','one','two','three','four','five','six','seven','eight','nine','ten'];
  const SHAPES = {
    circle: '●',
    star: '★',
    heart: '♥',
    diamond: '◆'
  };

  // Each cell is null (empty) or {color, shape}
  const EMPTY_FRAME = () => [null,null,null,null,null,null,null,null,null,null];

  let state = {
    mode: 'free',
    color: '#6c5ce7',
    shape: 'circle',
    frames: [EMPTY_FRAME()],
    flash: { number: 0, score: 0, total: 0, revealed: false },
    animateCell: null  // {frame, index} of cell to animate
  };

  // Sound
  function playTick() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 600 + Math.random() * 400;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }

  function playCelebration() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.1, 0.2, 0.35].forEach((delay, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = [523, 659, 784, 1047][i];
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + delay + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.4);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.4);
      });
    } catch(e) {}
  }

  function getCount(frameIdx) {
    return state.frames[frameIdx].filter(c => c !== null).length;
  }
  function getTotalCount() {
    return state.frames.reduce((sum, f) => sum + f.filter(c => c !== null).length, 0);
  }

  function buildFrames() {
    const area = document.getElementById('framesArea');
    area.innerHTML = '';
    const labels = state.mode === 'addition' ? ['First Number', 'Second Number']
      : state.mode === 'compare' ? ['Group A', 'Group B'] : [''];

    state.frames.forEach((frame, fi) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'ten-frame-wrapper';

      if (labels[fi]) {
        const label = document.createElement('div');
        label.className = 'ten-frame-label';
        label.textContent = labels[fi];
        wrapper.appendChild(label);
      }

      const grid = document.createElement('div');
      grid.className = 'ten-frame';
      if (getCount(fi) === 10) grid.classList.add('full');

      for (let i = 0; i < 10; i++) {
        const cellData = frame[i];
        const cell = document.createElement('div');
        cell.className = 'cell' + (cellData ? ' filled' : '');
        cell.dataset.frame = fi;
        cell.dataset.index = i;

        if (cellData) {
          if (state.animateCell && state.animateCell.frame === fi && state.animateCell.index === i) {
            cell.classList.add('animate-in');
          }
          const counter = document.createElement('div');
          counter.className = 'counter-shape';
          counter.style.background = `linear-gradient(135deg, ${cellData.color}, ${lighten(cellData.color, 30)})`;
          counter.textContent = SHAPES[cellData.shape];
          cell.appendChild(counter);
        }

        cell.addEventListener('click', () => toggleCell(fi, i));
        grid.appendChild(cell);
      }

      wrapper.appendChild(grid);

      // In compare mode, make frames clickable and add count reveal
      if (state.mode === 'compare') {
        wrapper.classList.add('clickable');
        wrapper.addEventListener('click', () => checkCompare(fi === 0 ? 'a' : 'b'));

        const countReveal = document.createElement('div');
        countReveal.className = 'compare-count-reveal';
        countReveal.id = `countReveal${fi}`;
        wrapper.appendChild(countReveal);
      }

      area.appendChild(wrapper);
    });
  }

  function lighten(hex, pct) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.min(255, (num >> 16) + pct);
    const g = Math.min(255, ((num >> 8) & 0xff) + pct);
    const b = Math.min(255, (num & 0xff) + pct);
    return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;
  }

  function toggleCell(fi, idx) {
    if (state.mode === 'compare' || state.mode === 'addition') return; // quiz modes, no manual edits
    const wasFull = getCount(fi) === 10;
    const current = state.frames[fi][idx];

    if (current === null) {
      state.frames[fi][idx] = { color: state.color, shape: state.shape };
      state.animateCell = { frame: fi, index: idx };
    } else if (current.color !== state.color || current.shape !== state.shape) {
      state.frames[fi][idx] = { color: state.color, shape: state.shape };
      state.animateCell = { frame: fi, index: idx };
    } else {
      state.frames[fi][idx] = null;
      state.animateCell = null;
    }

    playTick();
    buildFrames();
    state.animateCell = null;
    updateDisplay();

    if (!wasFull && getCount(fi) === 10) {
      celebrate();
      playCelebration();
    }
  }

  function updateDisplay() {
    const total = getTotalCount();
    const numEl = document.getElementById('bigNumber');
    numEl.textContent = total;
    // Use the color of the most recently placed counter, or current selection
    const lastColor = state.frames.flat().filter(c => c !== null).pop();
    numEl.style.color = lastColor ? lastColor.color : state.color;
    numEl.classList.remove('pop');
    void numEl.offsetWidth;
    numEl.classList.add('pop');

    document.getElementById('numberWord').textContent = total <= 10 ? NUM_WORDS[total] : total;

    // Equation (only for free play now)
    const eq = document.getElementById('equation');
    eq.textContent = '';

    // Making ten
    const mt = document.getElementById('makingTen');
    const mtText = document.getElementById('makingTenText');
    if (state.mode === 'free' && total > 0 && total < 10) {
      mt.style.display = 'block';
      mtText.innerHTML = `${total} + <span class="highlight">${10 - total}</span> = 10`;
    } else if (state.mode === 'free' && total === 10) {
      mt.style.display = 'block';
      mtText.innerHTML = `You made <span class="highlight">10</span>! 🎉`;
    } else {
      mt.style.display = 'none';
    }

    // Show/hide quiz UIs and number display
    const numDisplay = document.getElementById('bigNumber').parentElement;
    const aq = document.getElementById('additionQuiz');
    const cq = document.getElementById('compareQuiz');

    numDisplay.style.display = (state.mode === 'compare' || state.mode === 'addition') ? 'none' : 'block';
    aq.style.display = state.mode === 'addition' ? 'block' : 'none';
    cq.style.display = state.mode === 'compare' ? 'block' : 'none';
  }

  function celebrate() {
    const el = document.getElementById('celebration');
    const colors = ['#6c5ce7','#fd79a8','#00b894','#fdcb6e','#74b9ff','#e17055','#55efc4','#a29bfe'];
    for (let i = 0; i < 40; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = Math.random() * 0.5 + 's';
      c.style.width = (6 + Math.random() * 8) + 'px';
      c.style.height = (6 + Math.random() * 8) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.appendChild(c);
    }
    setTimeout(() => el.innerHTML = '', 2000);
  }

  // Mode switching
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.mode = tab.dataset.mode;

      if (state.mode === 'addition' || state.mode === 'compare') {
        state.frames = [EMPTY_FRAME(), EMPTY_FRAME()];
      } else {
        state.frames = [EMPTY_FRAME()];
      }

      if (state.mode === 'subitize') {
        startFlash();
      } else {
        document.getElementById('flashOverlay').style.display = 'none';
      }

      if (state.mode === 'compare') startCompare();
      if (state.mode === 'addition') startAddition();

      buildFrames();
      updateDisplay();
    });
  });

  // Color picker
  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.color = btn.dataset.color;
    });
  });

  // Shape picker
  document.querySelectorAll('.shape-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.shape = btn.dataset.shape;
    });
  });

  // Buttons
  document.getElementById('btnFillAll').addEventListener('click', () => {
    const fill = { color: state.color, shape: state.shape };
    state.frames.forEach(f => {
      for (let i = 0; i < f.length; i++) {
        if (f[i] === null) f[i] = { ...fill };
      }
    });
    buildFrames();
    updateDisplay();
    celebrate();
    playCelebration();
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    state.frames.forEach(f => f.fill(null));
    buildFrames();
    updateDisplay();
  });

  document.getElementById('btnRandom').addEventListener('click', () => {
    const fill = { color: state.color, shape: state.shape };
    state.frames.forEach(f => {
      const count = Math.floor(Math.random() * 11);
      f.fill(null);
      const indices = [...Array(10).keys()];
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      indices.slice(0, count).forEach(idx => f[idx] = { ...fill });
    });
    buildFrames();
    updateDisplay();
  });

  document.getElementById('btnPrint').addEventListener('click', () => window.print());

  // Subitize Flash
  function startFlash() {
    state.flash = { number: 0, score: 0, total: 0, revealed: false };
    nextFlash();
    document.getElementById('flashOverlay').style.display = 'flex';
  }

  function nextFlash() {
    state.flash.number = Math.floor(Math.random() * 10) + 1;
    state.flash.revealed = false;
    renderFlashFrame();
    document.getElementById('flashResult').textContent = '';
    document.getElementById('flashResult').className = 'flash-result';
    document.getElementById('flashAnswer').value = '';
    document.getElementById('flashTitle').textContent = 'How many do you see?';
    document.getElementById('flashScore').textContent =
      state.flash.total > 0 ? `Score: ${state.flash.score} / ${state.flash.total}` : '';
    setTimeout(() => document.getElementById('flashAnswer').focus(), 100);
  }

  function renderFlashFrame() {
    const frame = document.getElementById('flashFrame');
    frame.innerHTML = '';
    const filled = [];
    const indices = [...Array(10).keys()];
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    indices.slice(0, state.flash.number).forEach(i => filled[i] = true);

    for (let i = 0; i < 10; i++) {
      const cell = document.createElement('div');
      cell.className = 'flash-cell';
      if (filled[i]) {
        const counter = document.createElement('div');
        counter.className = 'counter-shape';
        counter.style.background = `linear-gradient(135deg, ${state.color}, ${lighten(state.color, 30)})`;
        counter.textContent = SHAPES[state.shape];
        cell.appendChild(counter);
      }
      frame.appendChild(cell);
    }
  }

  document.getElementById('flashCheck').addEventListener('click', checkFlash);
  document.getElementById('flashAnswer').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkFlash();
  });

  function checkFlash() {
    if (state.flash.revealed) return;
    const answer = parseInt(document.getElementById('flashAnswer').value);
    if (isNaN(answer)) return;

    state.flash.revealed = true;
    state.flash.total++;
    const correct = answer === state.flash.number;
    if (correct) state.flash.score++;

    const result = document.getElementById('flashResult');
    result.className = 'flash-result ' + (correct ? 'correct' : 'wrong');
    result.textContent = correct ? 'Correct! 🎉' : `It was ${state.flash.number}!`;

    document.getElementById('flashScore').textContent =
      `Score: ${state.flash.score} / ${state.flash.total}`;

    if (correct) playCelebration();
  }

  document.getElementById('flashNext').addEventListener('click', nextFlash);
  document.getElementById('flashClose').addEventListener('click', () => {
    document.getElementById('flashOverlay').style.display = 'none';
    // Switch back to free play
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-mode="free"]').classList.add('active');
    state.mode = 'free';
    state.frames = [EMPTY_FRAME()];
    buildFrames();
    updateDisplay();
  });

  // Addition Quiz
  state.addition = { score: 0, total: 0, answered: false, attempted: false };

  function startAddition() {
    state.addition = { score: 0, total: 0, answered: false, attempted: false };
    nextAddition();
  }

  function nextAddition() {
    state.addition.answered = false;
    state.addition.attempted = false;
    const COLORS = ['#6c5ce7','#e17055','#00b894','#0984e3','#fdcb6e','#e84393'];
    const colorA = COLORS[Math.floor(Math.random() * COLORS.length)];
    let colorB = COLORS[Math.floor(Math.random() * COLORS.length)];
    while (colorB === colorA) colorB = COLORS[Math.floor(Math.random() * COLORS.length)];

    const countA = Math.floor(Math.random() * 10) + 1;
    const countB = Math.floor(Math.random() * 10) + 1;

    state.frames = [EMPTY_FRAME(), EMPTY_FRAME()];
    for (let i = 0; i < countA; i++) state.frames[0][i] = { color: colorA, shape: state.shape };
    for (let i = 0; i < countB; i++) state.frames[1][i] = { color: colorB, shape: state.shape };

    buildFrames();

    // Show the two numbers in the equation
    const numA = document.getElementById('addNumA');
    const numB = document.getElementById('addNumB');
    numA.textContent = countA;
    numA.style.color = colorA;
    numB.textContent = countB;
    numB.style.color = colorB;

    const input = document.getElementById('addAnswer');
    input.value = '';
    input.className = '';
    input.disabled = false;
    input.placeholder = '?';
    setTimeout(() => input.focus(), 100);

    document.getElementById('additionResult').textContent = '';
    document.getElementById('additionResult').className = 'addition-result';
    document.getElementById('additionScore').textContent =
      state.addition.total > 0 ? `Score: ${state.addition.score} / ${state.addition.total}` : '';
  }

  function checkAddition() {
    if (state.addition.answered) return;
    const input = document.getElementById('addAnswer');
    const answer = parseInt(input.value);
    if (isNaN(answer)) return;

    const firstTry = !state.addition.attempted;
    if (firstTry) {
      state.addition.total++;
      state.addition.attempted = true;
    }

    const a = getCount(0), b = getCount(1);
    const correctSum = a + b;
    const isCorrect = answer === correctSum;

    const result = document.getElementById('additionResult');

    if (isCorrect) {
      state.addition.answered = true;
      if (firstTry) state.addition.score++;
      input.disabled = true;
      input.className = 'correct-answer';
      result.className = 'addition-result correct';
      result.textContent = 'Correct! 🎉';
      playCelebration();
      celebrate();

      // Auto-advance only after a correct answer
      setTimeout(() => {
        if (state.mode === 'addition') {
          nextAddition();
          updateDisplay();
        }
      }, 1800);
    } else {
      input.className = 'wrong-answer';
      result.className = 'addition-result wrong';
      result.textContent = 'Try again!';
      playWrong();
      setTimeout(() => {
        input.focus();
        input.select();
      }, 40);
    }

    document.getElementById('additionScore').textContent =
      `Score: ${state.addition.score} / ${state.addition.total}`;
  }

  document.getElementById('addAnswer').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAddition();
  });

  // Compare Quiz
  state.compare = { score: 0, total: 0, answered: false, attempted: false };

  function playWrong() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.15].forEach((delay, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = [300, 220][i];
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
        gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + delay + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.3);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.3);
      });
    } catch(e) {}
  }

  function startCompare() {
    state.compare = { score: 0, total: 0, answered: false, attempted: false };
    nextCompare();
  }

  function nextCompare() {
    state.compare.answered = false;
    state.compare.attempted = false;
    const COLORS = ['#6c5ce7','#e17055','#00b894','#0984e3','#fdcb6e','#e84393'];
    const colorA = COLORS[Math.floor(Math.random() * COLORS.length)];
    let colorB = COLORS[Math.floor(Math.random() * COLORS.length)];
    while (colorB === colorA) colorB = COLORS[Math.floor(Math.random() * COLORS.length)];

    const countA = Math.floor(Math.random() * 10) + 1;
    const countB = Math.random() < 0.2 ? countA : Math.floor(Math.random() * 10) + 1;

    state.frames = [EMPTY_FRAME(), EMPTY_FRAME()];
    for (let i = 0; i < countA; i++) state.frames[0][i] = { color: colorA, shape: state.shape };
    for (let i = 0; i < countB; i++) state.frames[1][i] = { color: colorB, shape: state.shape };

    buildFrames();

    document.getElementById('compareQuestion').textContent = 'Tap the group that has more!';
    document.getElementById('compareResult').textContent = '';
    document.getElementById('compareResult').className = 'compare-result';
    document.getElementById('compareReveal').textContent = '';
    document.getElementById('compareScore').textContent =
      state.compare.total > 0 ? `Score: ${state.compare.score} / ${state.compare.total}` : '';

    // Enable equal button
    const eqBtn = document.getElementById('cmpEqual');
    eqBtn.disabled = false;
    eqBtn.style.opacity = '1';

    // Reset frame wrapper states
    document.querySelectorAll('.ten-frame-wrapper').forEach(w => {
      w.classList.remove('compare-correct', 'compare-wrong', 'compare-dim');
    });
  }

  function checkCompare(answer) {
    if (state.compare.answered) return;
    const firstTry = !state.compare.attempted;
    if (firstTry) {
      state.compare.total++;
      state.compare.attempted = true;
    }

    const a = getCount(0), b = getCount(1);
    let correctAnswer;
    if (a > b) correctAnswer = 'a';
    else if (b > a) correctAnswer = 'b';
    else correctAnswer = 'equal';

    const isCorrect = answer === correctAnswer;

    const wrappers = document.querySelectorAll('.ten-frame-wrapper');
    const result = document.getElementById('compareResult');

    if (isCorrect) {
      state.compare.answered = true;
      if (firstTry) state.compare.score++;
      result.className = 'compare-result correct';
      result.textContent = 'Correct! 🎉';
      playCelebration();
      celebrate();

      // Disable equal button after solving
      const eqBtn = document.getElementById('cmpEqual');
      eqBtn.disabled = true;
      eqBtn.style.opacity = '0.5';

      // Reveal counts under each frame
      const revealA = document.getElementById('countReveal0');
      const revealB = document.getElementById('countReveal1');
      if (revealA) { revealA.textContent = a; revealA.style.color = state.frames[0][0]?.color || '#6c5ce7'; revealA.classList.add('visible'); }
      if (revealB) { revealB.textContent = b; revealB.style.color = state.frames[1][0]?.color || '#e17055'; revealB.classList.add('visible'); }

      // Show comparison
      const symbol = a > b ? '>' : a < b ? '<' : '=';
      document.getElementById('compareReveal').textContent = `${a} ${symbol} ${b}`;

      // Highlight the winning frame
      if (correctAnswer === 'a') {
        wrappers[0]?.classList.add('compare-correct');
        wrappers[1]?.classList.add('compare-dim');
      } else if (correctAnswer === 'b') {
        wrappers[1]?.classList.add('compare-correct');
        wrappers[0]?.classList.add('compare-dim');
      } else {
        wrappers[0]?.classList.add('compare-correct');
        wrappers[1]?.classList.add('compare-correct');
      }

      // Auto-advance after delay
      setTimeout(() => {
        if (state.mode === 'compare') {
          nextCompare();
          updateDisplay();
        }
      }, 1800);
    } else {
      result.className = 'compare-result wrong';
      result.textContent = 'Try again!';
      playWrong();

      // Keep answer hidden until they get it right
      document.getElementById('compareReveal').textContent = '';
      const revealA = document.getElementById('countReveal0');
      const revealB = document.getElementById('countReveal1');
      revealA?.classList.remove('visible');
      revealB?.classList.remove('visible');

      // Shake the wrong choice
      wrappers.forEach(w => w.classList.remove('compare-correct', 'compare-dim', 'compare-wrong'));
      if (answer === 'a' && wrappers[0]) {
        void wrappers[0].offsetWidth;
        wrappers[0].classList.add('compare-wrong');
      } else if (answer === 'b' && wrappers[1]) {
        void wrappers[1].offsetWidth;
        wrappers[1].classList.add('compare-wrong');
      }
    }

    document.getElementById('compareScore').textContent =
      `Score: ${state.compare.score} / ${state.compare.total}`;
  }

  document.getElementById('cmpEqual').addEventListener('click', () => checkCompare('equal'));

  // Init
  buildFrames();
  updateDisplay();
</script>
</body>
</html>
